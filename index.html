<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v10.0 | Singularity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 3rem; }
        .chart-box { background: #000; padding: 2.5rem; border-radius: 3.5rem; margin: 2rem 0; border: 2px solid rgba(99, 102, 241, 0.3); box-shadow: 0 0 60px rgba(0,0,0,0.8); min-height: 400px; }
        .data-table { width: 100%; margin: 2.5rem 0; border-collapse: collapse; border-radius: 1.5rem; overflow: hidden; font-size: 1.1rem; }
        .data-table th { background: linear-gradient(90deg, #4338ca, #6366f1); padding: 20px; color: white; text-align: left; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); }
        .data-table td { background: rgba(255,255,255,0.03); padding: 18px; border: 1px solid rgba(255,255,255,0.05); color: #cbd5e1; }
        .btn-main { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1); }
        .btn-main:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 30px 60px rgba(99, 102, 241, 0.5); }
    </style>
</head>
<body class="p-6 md:p-12 lg:p-24">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-24 px-8">
            <h1 class="text-7xl font-black tracking-tighter italic">Decision<span class="text-indigo-500 font-extrabold text-8xl">OS</span></h1>
            <div class="glass px-10 py-4 text-indigo-400 text-xs font-black uppercase tracking-[0.5em] border-indigo-500/30 shadow-[0_0_30px_rgba(99,102,241,0.2)]">Singularity Core: v10.0</div>
        </header>

        <section class="glass p-12 md:p-16 mb-24 shadow-3xl border-white/5 relative">
            <textarea id="incidentInput" class="w-full h-48 bg-transparent text-slate-100 text-4xl outline-none resize-none placeholder:text-slate-900 font-light" placeholder="Operasyon emri bekliyorum..."></textarea>
            <button onclick="analyzeIncident()" id="actionBtn" class="w-full py-10 rounded-[3rem] btn-main text-white font-black text-4xl mt-12 shadow-2xl tracking-tighter uppercase italic">EXECUTE STRATEGIC ANALYSIS</button>
        </section>

        <div id="resultArea" class="hidden"></div>
    </div>

    <script>
        const ultraRender = (text) => {
            if (!text) return "";
            
            // 1. RADİKAL TEMİZLİK: Grafik motoruna girmeden önce tüm kirliliği yok et
            let raw = text.toString()
                .replace(/\\n/g, "\n")
                .replace(/\\"/g, '"')
                .replace(/<br\s*\/?>/gi, " ") // Br'leri boşluğa çevir
                .replace(/&quot;/g, '"')
                .replace(/\s+/g, " "); // Çift boşlukları tek yap

            let chartSection = "";

            // 2. GRAFİK AVLAYICI (V10 Brute Force)
            const chartMatch = raw.match(/\{"type":\s*"(?:line|bar|pie)"[\s\S]*?\}(?=\s|$)/i) || 
                               raw.match(/\{[\s\S]*?"type"\s*:\s*"(?:line|bar)"[\s\S]*?\}/i);

            if (chartMatch) {
                const id = "chart-" + Math.random().toString(36).substr(2, 5);
                chartSection = `<div class="chart-box"><canvas id="${id}"></canvas></div>`;
                
                const pureConfig = chartMatch[0];
                setTimeout(() => {
                    try {
                        const ctx = document.getElementById(id).getContext('2d');
                        Chart.defaults.color = '#94a3b8';
                        Chart.defaults.font.family = 'Plus Jakarta Sans';
                        new Chart(ctx, JSON.parse(pureConfig));
                    } catch(e) { console.error("Chart Error: ", e); }
                }, 1200);

                raw = raw.replace(chartMatch[0], ""); // Grafiği metinden çıkar
            }

            // 3. TABLO MOTORU
            raw = raw.replace(/(?:^|\n)((?:\|.+?\|(?:\n|$))+)/g, (match, table) => {
                const rows = table.trim().split("\n").filter(r => r.includes("|") && !r.includes("---"));
                const h = rows[0].split("|").filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join("");
                const b = rows.slice(1).map(r => `<tr>${r.split("|").filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join("")}</tr>`).join("");
                return `<div class="overflow-x-auto"><table class="data-table"><thead><tr>${h}</tr></thead><tbody>${b}</tbody></table></div>`;
            });

            // 4. SON TEMİZLİK (Metin Güzelleştirme)
            let finalContent = raw
                .replace(/\"?analysis\"?\s*:\s*\"?/, "")
                .replace(/\"?,?\s*\"?files\"?[\s\S]*?$/, "")
                .replace(/\{/g, "").replace(/\}/g, "").replace(/[\[\]\"\$]/g, "")
                .replace(/options:\s*/g, "") // Sorun çıkaran options etiketini sil
                .replace(/#/g, "")
                .trim();

            return chartSection + `<div class="mt-12 text-slate-300 text-3xl font-light leading-relaxed italic opacity-90">${finalContent}</div>`;
        };

        async function analyzeIncident() {
            const input = document.getElementById('incidentInput').value;
            const resArea = document.getElementById('resultArea');
            const btn = document.getElementById('actionBtn');
            if(!input.trim()) return;

            btn.disabled = true;
            btn.innerHTML = "QUANTUM SYNCING...";
            resArea.classList.remove('hidden');
            resArea.innerHTML = `<div class="glass p-40 text-center animate-pulse text-indigo-500 font-extrabold uppercase text-4xl tracking-[1em]">Core Singularity Online</div>`;

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                const report = data.report || {};

                resArea.innerHTML = `
                    <div id="report-content" class="glass p-20 lg:p-32 border-t-[16px] border-indigo-600 shadow-[0_60px_100px_rgba(0,0,0,0.7)]">
                        <div class="flex justify-between items-center mb-32 px-4">
                            <h2 class="text-7xl font-black italic uppercase tracking-tighter text-white">${report.final_decision || "TACTICAL REPORT"}</h2>
                            <button onclick="downloadPDF()" class="px-14 py-6 bg-indigo-600 text-white rounded-full text-sm font-black uppercase tracking-widest no-print hover:scale-110 transition-all shadow-3xl">EXPORT REPORT</button>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-24">
                            <div class="lg:col-span-8">
                                ${ultraRender(report.analysis || "")}
                            </div>
                            <div class="lg:col-span-4">
                                <div class="glass p-12 sticky top-24 bg-indigo-950/20 border-white/10 shadow-3xl">
                                    <div class="text-[12px] font-black text-indigo-500 mb-8 uppercase tracking-[0.5em] text-center">Confidence Index</div>
                                    <div class="text-9xl font-black text-white mb-12 text-center tracking-tighter">${((report.confidence || 0.95)*100).toFixed(0)}%</div>
                                    <div class="w-full bg-slate-950 h-4 rounded-full overflow-hidden">
                                        <div class="bg-indigo-500 h-full shadow-[0_0_40px_rgba(99,102,241,1)]" style="width:${(report.confidence || 0.95)*100}%"></div>
                                    </div>
                                    <div class="mt-24 pt-12 border-t border-white/5 text-[10px] text-slate-600 font-bold uppercase tracking-[0.4em] space-y-6">
                                        <div class="flex justify-between"><span>Veto Status</span><span class="text-emerald-400">Clear</span></div>
                                        <div class="flex justify-between"><span>Protocol</span><span>v10.0 Singularity</span></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (e) {
                resArea.innerHTML = `<div class="p-32 glass text-red-500 text-center font-black text-2xl uppercase tracking-widest">FATAL_CORE_ERROR: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = "EXECUTE STRATEGIC ANALYSIS";
            }
        }

        function downloadPDF() {
            const element = document.getElementById('report-content');
            html2pdf().set({ margin: 0.5, filename: 'DecisionOS_v10_Final.pdf', html2canvas: { scale: 2, backgroundColor: '#020617' } }).from(element).save();
        }
    </script>
</body>
</html>
