<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v9.5 | The Titan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2.5rem; }
        .chart-box { background: #000; padding: 2.5rem; border-radius: 3rem; margin: 2rem 0; border: 1px solid rgba(99, 102, 241, 0.3); min-height: 380px; }
        .data-table { width: 100%; margin: 2.5rem 0; border-collapse: collapse; border-radius: 1.5rem; overflow: hidden; }
        .data-table th { background: linear-gradient(to right, #3730a3, #4f46e5); padding: 14px; text-align: left; font-size: 0.75rem; text-transform: uppercase; font-weight: 800; }
        .data-table td { background: rgba(255,255,255,0.02); padding: 14px; border: 1px solid rgba(255,255,255,0.05); font-size: 0.95rem; }
        .btn-main { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); transition: 0.4s; }
        .btn-main:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body class="p-6 md:p-12 lg:p-20">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-16">
            <h1 class="text-6xl font-black tracking-tighter italic">Decision<span class="text-indigo-500">OS</span></h1>
            <div class="glass px-6 py-2 text-emerald-400 text-[10px] font-black uppercase tracking-[0.3em] border-emerald-500/20">Titan Sync Engine</div>
        </header>

        <section class="glass p-10 shadow-3xl mb-16 relative">
            <textarea id="incidentInput" class="w-full h-40 bg-transparent text-slate-100 text-2xl outline-none resize-none placeholder:text-slate-900" placeholder="Hedefi girin..."></textarea>
            <button onclick="analyzeIncident()" id="actionBtn" class="w-full py-7 rounded-3xl btn-main text-white font-black text-3xl mt-10 shadow-xl uppercase tracking-tighter italic">Execute Tactical Analysis</button>
        </section>

        <div id="resultArea" class="hidden"></div>
    </div>

    <script>
        const ultraRender = (text) => {
            if (!text) return "";
            
            // 1. TEMİZLİK: Kaçışları çöz
            let clean = text.toString()
                .replace(/\\n/g, "\n")
                .replace(/\\"/g, '"')
                .replace(/<br\s*\/?>/gi, "\n");

            let chartHtml = "";

            // 2. GRAFİK AVLAYICI (En Güçlü Sürüm)
            const chartMatch = clean.match(/\{[\s\S]*?"type"\s*:\s*"(?:line|bar|pie)"[\s\S]*?\}/);
            if (chartMatch) {
                const id = "chart-" + Math.random().toString(36).substr(2, 5);
                
                // KRİTİK: JSON içindeki TÜM <br> ve \n karakterlerini siliyoruz
                let pureJson = chartMatch[0]
                    .replace(/<br\s*\/?>/gi, "")
                    .replace(/\n/g, " ")
                    .replace(/\s+/g, " ");

                chartHtml = `<div class="chart-box"><canvas id="${id}"></canvas></div>`;
                
                setTimeout(() => {
                    try {
                        const ctx = document.getElementById(id).getContext('2d');
                        Chart.defaults.color = '#94a3b8';
                        new Chart(ctx, JSON.parse(pureJson));
                    } catch(e) { 
                        console.error("JSON parse failed. Data was: ", pureJson);
                    }
                }, 1000);

                clean = clean.replace(chartMatch[0], ""); 
            }

            // 3. TABLO MOTORU
            clean = clean.replace(/(?:^|\n)((?:\|.+?\|(?:\n|$))+)/g, (match, table) => {
                const rows = table.trim().split("\n").filter(r => r.includes("|") && !r.includes("---"));
                const h = rows[0].split("|").filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join("");
                const b = rows.slice(1).map(r => `<tr>${r.split("|").filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join("")}</tr>`).join("");
                return `<div class="overflow-x-auto"><table class="data-table"><thead><tr>${h}</tr></thead><tbody>${b}</tbody></table></div>`;
            });

            // 4. METİN ŞIKLAŞTIRICI
            const finalContent = clean
                .replace(/\{[\s\S]*?\}/g, "") // Kalıntı JSON'ları sil
                .replace(/[\{\}\[\]\"\$]/g, "") // Parantez ve tırnakları temizle
                .replace(/\n/g, "<​br>")
                .replace(/```/g, "")
                .trim();

            return chartHtml + `<div class="mt-8 text-slate-300 leading-relaxed text-2xl font-light italic">${finalContent}</div>`;
        };

        async function analyzeIncident() {
            const input = document.getElementById('incidentInput').value;
            const resArea = document.getElementById('resultArea');
            const btn = document.getElementById('actionBtn');
            if(!input.trim()) return;

            btn.disabled = true;
            resArea.classList.remove('hidden');
            resArea.innerHTML = `<div class="glass p-32 text-center animate-pulse text-indigo-500 font-black uppercase text-2xl tracking-[0.6em]">Prometheus Core Syncing...</div>`;

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                const report = data.report || {};

                resArea.innerHTML = `
                    <div id="report-content" class="glass p-16 md:p-24 border-t-[12px] border-indigo-600 shadow-3xl">
                        <div class="flex justify-between items-center mb-16">
                            <h2 class="text-6xl font-black italic uppercase tracking-tighter">${report.final_decision || "STRATEGIC ANALYSIS"}</h2>
                            <button onclick="downloadPDF()" class="px-10 py-4 bg-indigo-600 text-white rounded-full text-[10px] font-black uppercase tracking-widest no-print hover:scale-110 transition-all shadow-xl">EXPORT PDF</button>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
                            <div class="lg:col-span-8">
                                ${ultraRender(report.analysis || "")}
                            </div>
                            <div class="lg:col-span-4">
                                <div class="glass p-10 bg-indigo-950/20 border-white/5 sticky top-16 shadow-2xl">
                                    <div class="text-[10px] font-black text-indigo-500 mb-6 uppercase tracking-widest text-center">Confidence Index</div>
                                    <div class="text-8xl font-black text-white mb-10 text-center tracking-tighter">${((report.confidence || 0.95)*100).toFixed(0)}%</div>
                                    <div class="w-full bg-slate-950 h-3 rounded-full overflow-hidden">
                                        <div class="bg-indigo-500 h-full shadow-[0_0_30px_rgba(99,102,241,1)]" style="width:${(report.confidence || 0.95)*100}%"></div>
                                    </div>
                                    <div class="mt-20 pt-10 border-t border-white/5 text-[10px] text-slate-600 font-bold uppercase tracking-[0.2em] space-y-4">
                                        <div class="flex justify-between"><span>Veto Status</span><span class="text-emerald-400">Clear</span></div>
                                        <div class="flex justify-between"><span>Protocol</span><span>v9.5 Titan</span></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (e) {
                resArea.innerHTML = `<div class="p-20 glass text-red-500 text-center font-black">KERNEL_PANIC: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        function downloadPDF() {
            const element = document.getElementById('report-content');
            html2pdf().set({ margin: 0.5, filename: 'DecisionOS_Titan_Report.pdf', html2canvas: { scale: 2, backgroundColor: '#020617' } }).from(element).save();
        }
    </script>
</body>
</html>
