<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v7.2 | Zero-Constraints Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2.5rem; }
        .ai-card { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 2rem; transition: 0.3s; }
        .chart-box { background: #000; padding: 2rem; border-radius: 2rem; margin: 2rem 0; min-height: 350px; border: 1px solid rgba(99, 102, 241, 0.2); }
        .data-table { width: 100%; margin: 2rem 0; border-radius: 1rem; overflow: hidden; border-collapse: collapse; }
        .data-table th { background: linear-gradient(to right, #4338ca, #6366f1); padding: 15px; color: white; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; }
        .data-table td { background: rgba(255,255,255,0.03); padding: 15px; border: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .btn-main { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body class="p-4 md:p-12 lg:p-20">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-16 animate-fade-in">
            <div>
                <h1 class="text-6xl font-extrabold tracking-tighter">Decision<span class="text-indigo-500">OS</span></h1>
                <p class="text-[10px] uppercase tracking-[0.5em] text-slate-500 mt-2">Bespoke Intelligence v7.2</p>
            </div>
            <div class="flex gap-2 items-center px-4 py-2 glass rounded-full border-emerald-500/20 text-emerald-400 text-[10px] font-bold">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> SYSTEM: ONLINE
            </div>
        </header>

        <section class="glass p-10 mb-12 relative overflow-hidden">
            <textarea id="incidentInput" class="w-full h-40 bg-transparent text-slate-200 text-xl outline-none resize-none placeholder:text-slate-700" placeholder="Bir görev veya kriz senaryosu girin..."></textarea>
            <button onclick="analyzeIncident()" id="actionBtn" class="w-full py-6 rounded-3xl btn-main text-white font-black text-xl mt-6 transition-all active:scale-95">EXECUTE INTELLIGENCE</button>
        </section>

        <div id="resultArea" class="hidden transition-all duration-1000"></div>
    </div>

    <script>
        const ultraRender = (text) => {
            if (!text) return "";

            // AI KARAKTER TEMİZLİĞİ: JSON içinde bozulmuş karakterleri gerçek hallerine döndür
            let clean = text
                .replace(/\\n/g, "\n")
                .replace(/\\"/g, '"')
                .replace(/\\t/g, "    ");

            // 1. Grafik İşleme
            clean = clean.replace(/```chart\s*([\s\S]*?)\s*```/g, (match, config) => {
                const id = `chart-${Math.random().toString(36).substr(2, 9)}`;
                setTimeout(() => {
                    try { 
                        const ctx = document.getElementById(id).getContext('2d');
                        new Chart(ctx, JSON.parse(config.trim())); 
                    } catch(e) { console.error("Chart Render Failed", e); }
                }, 500);
                return `<div class="chart-box"><canvas id="${id}"></canvas></div>`;
            });

            // 2. Tablo İşleme (Gelişmiş)
            clean = clean.replace(/(^|\n)((?:\|.+?\|(?:\n|$))+)/g, (match, prefix, tableContent) => {
                const rows = tableContent.trim().split("\n").filter(r => r.includes("|"));
                if (rows.length < 2) return match;
                const header = rows[0].split("|").filter(c => c.trim().length > 0);
                const body = rows.slice(2).map(r => r.split("|").filter(c => c.trim().length > 0));

                return `${prefix}<div class="overflow-x-auto"><table class="data-table"><thead><tr>${header.map(h => `<th>${h}</th>`).join("")}</tr></thead><tbody>${body.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;
            });

            // 3. LaTeX İşleme
            clean = clean.replace(/\$\$(.*?)\$\$/g, '<div class="text-center my-10 text-3xl font-light text-indigo-400 font-serif">$$$1$$</div>');

            return clean.replace(/\n/g, "<br>");
        };

        async function analyzeIncident() {
            const input = document.getElementById('incidentInput').value;
            const resArea = document.getElementById('resultArea');
            const btn = document.getElementById('actionBtn');
            if(!input.trim()) return;

            btn.disabled = true;
            btn.innerHTML = "DECODING SYMBOLS...";
            resArea.classList.remove('hidden');
            resArea.innerHTML = `<div class="glass p-32 text-center text-indigo-500 italic animate-pulse tracking-widest uppercase text-xs">Accessing Prometheus Core...</div>`;

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                const report = data.report;

                resArea.innerHTML = `
                    <div id="report-content" class="glass p-12 border-b-8 border-indigo-500 shadow-2xl">
                        <div class="flex justify-between items-center mb-16 no-print">
                            <h2 class="text-5xl font-extrabold uppercase italic tracking-tighter">${report.final_decision || "ANALİZ RAPORU"}</h2>
                            <button onclick="downloadPDF()" class="px-8 py-3 bg-white/5 border border-white/10 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-white/10 transition-all">Download PDF</button>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
                            <div class="lg:col-span-8 text-slate-300 leading-relaxed text-lg">
                                ${ultraRender(report.analysis)}
                            </div>
                            <div class="lg:col-span-4">
                                <div class="ai-card p-8 sticky top-10">
                                    <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-6">Strategy Confidence</h4>
                                    <div class="text-4xl font-black text-white mb-3">${((report.confidence || 0.9)*100).toFixed(0)}%</div>
                                    <div class="w-full bg-slate-900 h-1.5 rounded-full"><div class="bg-indigo-500 h-full shadow-lg shadow-indigo-500/50" style="width:${(report.confidence || 0.9)*100}%"></div></div>
                                    <div class="mt-10 p-6 bg-indigo-500/5 rounded-2xl text-[10px] text-indigo-400 uppercase leading-loose border border-indigo-500/20 italic">
                                        PROMETHEUS VETO STATUS: CLEAR
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                if (window.MathJax) MathJax.typeset();
            } catch (e) {
                resArea.innerHTML = `<div class="p-20 text-red-500 text-center font-bold">SYSTEM DISCONNECTED: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = "EXECUTE INTELLIGENCE";
            }
        }

        function downloadPDF() {
            const element = document.getElementById('report-content');
            const btns = document.querySelectorAll('.no-print');
            btns.forEach(b => b.style.display = 'none');
            const opt = { margin: 0.5, filename: 'DecisionOS_v72_Report.pdf', jsPDF: { format: 'a4' }, html2canvas: { scale: 2, useCORS: true, backgroundColor: '#020617' } };
            html2pdf().set(opt).from(element).save().then(() => { btns.forEach(b => b.style.display = 'flex'); });
        }
    </script>
</body>
</html>
