<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS | Neural Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <style>
        :root { --apple-blue: #0071e3; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 40px 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 800px; }
        h1 { font-size: 2.8rem; font-weight: 700; text-align: center; margin-bottom: 5px; letter-spacing: -2px; }
        .sub { text-align: center; color: #86868b; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 40px; }
        .panel { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 30px; margin-bottom: 30px; }
        textarea { width: 100%; background: transparent; border: none; color: #fff; font-size: 1.2rem; outline: none; resize: none; text-align: center; font-family: inherit; }
        button { width: 100%; background: #fff; color: #000; border: none; border-radius: 40px; padding: 18px; font-weight: 700; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:hover { transform: scale(1.02); background: #eee; }
        .result-flow { display: none; }
        .block { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; padding: 35px; margin-bottom: 20px; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th { text-align: left; color: #86868b; font-size: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        td { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .chart-container { height: 320px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>DecisionOS</h1>
    <p class="sub">Neural Intelligence v4.0</p>

    <div class="panel">
        <textarea id="userInput" rows="2" placeholder="Geometri, Sınav veya Kriz yazın..."></textarea>
        <button onclick="runAnalysis()">Analyze Neural Context</button>
    </div>

    <div id="resultFlow" class="result-flow"></div>
</div>

<script>
    let currentChart = null;

    async function runAnalysis() {
        const input = document.getElementById('userInput').value;
        if (!input) return;

        const btn = document.querySelector('button');
        const flow = document.getElementById('resultFlow');
        btn.innerText = "Analyzing Context...";

        try {
            const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: input })
            });
            const data = await response.json();

            // Önceki grafiği temizle
            if (currentChart) {
                currentChart.destroy();
                currentChart = null;
            }

            flow.innerHTML = `
                <div class="block">
                    <h2 style="margin-top:0;">${data.title}</h2>
                    <p style="color:#a1a1a6;">${data.description}</p>
                    <table>
                        <thead><tr><th>PARAMETRE</th><th>DEĞER</th></tr></thead>
                        <tbody>${data.table_data.map(r => `<tr><td>${Object.values(r)[0]}</td><td>${Object.values(r)[1]}</td></tr>`).join('')}</tbody>
                    </table>
                </div>
                <div class="block">
                    <div class="chart-container"><canvas id="mainChart"></canvas></div>
                </div>
                <div class="block">
                    <div id="mathDisplay" style="font-size:1.8rem; text-align:center;"></div>
                    <p style="color:#86868b; text-align:center; mt:15px;">${data.analysis}</p>
                </div>
            `;

            flow.style.display = 'block';
            if(data.math_formula) katex.render(data.math_formula, document.getElementById('mathDisplay'), {displayMode:true});

            const ctx = document.getElementById('mainChart').getContext('2d');
            currentChart = new Chart(ctx, {
                type: data.type || 'line',
                data: {
                    labels: data.chart_labels,
                    datasets: [{
                        label: 'Neural Score',
                        data: data.chart_values,
                        backgroundColor: data.type === 'radar' ? 'rgba(0, 113, 227, 0.2)' : 'rgba(0, 113, 227, 0.4)',
                        borderColor: '#0071e3',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: data.type === 'radar' ? { r: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { display: false } } } : {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#86868b' } },
                        x: { grid: { display: false }, ticks: { color: '#86868b' } }
                    }
                }
            });
            btn.innerText = "Analyze Neural Context";

        } catch (e) {
            alert("Connection reset.");
            btn.innerText = "Analyze Neural Context";
        }
    }
</script>

</body>
</html>
