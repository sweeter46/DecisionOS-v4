<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v4.0 Prometheus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0c; --card: #141417; --accent: #00ff88; --text: #e1e1e6; --danger: #ff4757; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .dashboard { width: 90%; max-width: 900px; background: var(--card); border-radius: 20px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid #2d2d35; }
        h1 { color: var(--accent); font-weight: 600; letter-spacing: -1px; margin-bottom: 5px; }
        #statusLight { font-size: 10px; color: #555; margin-bottom: 15px; font-family: 'JetBrains Mono'; }
        textarea { width: 100%; height: 120px; background: #1c1c21; border: 1px solid #333; border-radius: 12px; color: white; padding: 15px; font-family: inherit; resize: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--accent); color: black; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 15px; }
        .result-container { margin-top: 30px; padding: 20px; background: #1c1c21; border-radius: 12px; border-left: 4px solid var(--accent); display: none; }
        .report-section { margin-bottom: 25px; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 8px; border-left: 3px solid #333; }
        .section-title { color: var(--accent); font-family: 'JetBrains Mono'; font-size: 11px; text-transform: uppercase; margin-bottom: 10px; display: block; border-bottom: 1px solid #2d2d35; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>DecisionOS</h1>
        <div id="statusLight">● SINYAL: <span id="statusText">V4.2.0 - SECURE LINK</span></div>
        <textarea id="userInput" placeholder="Kriz senaryosunu buraya girin..."></textarea>
        <button id="startBtn">PROTOKOLÜ TETİKLE</button>
        <div id="resultArea" class="result-container">
            <div id="reportContent">Analiz sentezleniyor...</div>
        </div>
    </div>

    <script>
       const startBtn = document.getElementById('startBtn');
    const userInput = document.getElementById('userInput');
    const resultArea = document.getElementById('resultArea');
    const reportContent = document.getElementById('reportContent');
    const statusText = document.getElementById('statusText');

    startBtn.addEventListener('click', async () => {
        const text = userInput.value.trim();
        if (text.length < 5) return alert("Senaryo giriniz.");
        resultArea.style.display = 'block';
        statusText.innerText = "SENTEZLENİYOR...";
        reportContent.innerHTML = "DecisionOS v4.0 Strateji Raporu İnşa Ediliyor...";

        try {
            const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });
            const data = await response.json();

            if (data.report) {
                statusText.innerText = "ONLINE - ANALİZ HAZIR";
                statusText.style.color = "#00ff88";

                // --- 1.AŞAMA: TEMİZLİK (Kod bloklarını ve gereksiz boşlukları temizle) ---
                let rawReport = data.report.replace(/```json/g, "").replace(/```/g, "").trim();

                try {
                    // --- 2.AŞAMA: MÜHÜR SÖKÜCÜ (Eğer veri string içindeyse objeye çevir) ---
                    let reportObj = typeof rawReport === 'string' ? JSON.parse(rawReport) : rawReport;
                    
                    // Eğer hala string çıkarsa (Abacus bazen çift mühürler), bir kez daha parse et:
                    if (typeof reportObj === 'string') {
                        reportObj = JSON.parse(reportObj);
                    }

                    // --- 3.AŞAMA: GÖRSEL MAKİNA (Şık kutucukları bas) ---
                    reportContent.innerHTML = `
                        <div style="margin-bottom:20px; padding:15px; background:rgba(0,255,136,0.05); border-left:3px solid #00ff88; border-radius:8px;">
                            <span style="color:#00ff88; font-family:'JetBrains Mono'; font-size:11px; display:block; margin-bottom:8px;">🚨 NİHAİ KARAR</span>
                            <p style="margin:0; font-weight:600; color:#fff;">${reportObj.final_decision}</p>
                        </div>
                        <div style="margin-bottom:20px; padding:15px; background:rgba(255,255,255,0.02); border-left:3px solid #666; border-radius:8px;">
                            <span style="color:#888; font-family:'JetBrains Mono'; font-size:11px; display:block; margin-bottom:8px;">📈 STRATEJİK ANALİZ</span>
                            <p style="margin:0; font-size:14px; line-height:1.7; color:#ccc;">${reportObj.analysis}</p>
                        </div>
                        <div style="margin-bottom:20px; padding:15px; background:rgba(255,255,255,0.02); border-left:3px solid #00ff88; border-radius:8px;">
                            <span style="color:#00ff88; font-family:'JetBrains Mono'; font-size:11px; display:block; margin-bottom:8px;">🛠️ AKSİYON PLANI</span>
                            <ul style="margin:10px 0 0 0; padding-left:20px; font-size:14px; color:#ddd;">
                                ${reportObj.action_plan.map(item => `<li style="margin-bottom:12px;">${item}</li>`).join('')}
                            </ul>
                        </div>
                        <div style="padding:15px; background:rgba(255,71,87,0.05); border-left:3px solid #ff4757; border-radius:8px;">
                            <span style="color:#ff4757; font-family:'JetBrains Mono'; font-size:11px; display:block; margin-bottom:8px;">⚠️ KRİTİK VETO</span>
                            <p style="margin:0; font-size:14px; color:#ffb8b8;">${reportObj.veto}</p>
                        </div>
                    `;
                } catch (parseErr) {
                    // Eğer tüm denemelere rağmen JSON değilse düz metni bas
                    reportContent.style.whiteSpace = "pre-wrap";
                    reportContent.innerText = rawReport;
                }
            }
        } catch (error) {
            statusText.innerText = "BAĞLANTI HATASI";
            reportContent.innerText = "Sistem şu an meşgul. Lütfen 10 saniye sonra tekrar deneyin.";
        }
    });
    </script>
</body>
</html>
