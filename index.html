<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS | Neural Neural Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <style>
        :root { --apple-blue: #0071e3; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 40px 20px; display: flex; justify-content: center; min-height: 100vh; line-height: 1.5; }
        .container { width: 100%; max-width: 800px; text-align: center; }
        h1 { font-size: 3rem; font-weight: 700; margin-bottom: 40px; letter-spacing: -2px; }
        .panel { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 30px; margin-bottom: 40px; }
        textarea { width: 100%; background: transparent; border: none; color: #fff; font-size: 1.2rem; outline: none; resize: none; text-align: center; font-family: inherit; }
        button { background: #fff; color: #000; border: none; border-radius: 30px; padding: 15px 40px; font-weight: 600; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { transform: scale(1.05); }
        .result-card { display: none; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px; text-align: left; }
        #resultArea { white-space: pre-wrap; font-size: 1.1rem; color: #a1a1a6; margin-bottom: 30px; }
        .chart-box { height: 300px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DecisionOS</h1>
        <div class="panel">
            <textarea id="incidentInput" rows="3" placeholder="What's on your mind?"></textarea>
            <button onclick="analyzeIncident()">Analyze</button>
        </div>
        <div id="resultCard" class="result-card">
            <div id="resultArea"></div>
            <div class="chart-box"><canvas id="analysisChart"></canvas></div>
            <div id="mathResult" style="margin-top: 20px; text-align: center;"></div>
        </div>
    </div>
    <script>
        let myChart = null;
        async function analyzeIncident() {
            const input = document.querySelector('#incidentInput').value;
            if (!input) return;
            const btn = document.querySelector('button');
            btn.innerText = "Processing...";
            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                document.getElementById('resultCard').style.display = 'block';
                document.getElementById('resultArea').innerText = data.analysis;
                btn.innerText = "Analyze";
                if(data.math) katex.render(data.math, document.getElementById('mathResult'));
                const ctx = document.getElementById('analysisChart').getContext('2d');
                if (myChart) myChart.destroy();
                myChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['0', '1', '2', '3', '4', '5'],
                        datasets: [{
                            data: [30, 50, 40, 90, 70, 100],
                            borderColor: '#0071e3',
                            tension: 0.4,
                            pointRadius: 0,
                            fill: true,
                            backgroundColor: 'rgba(0,113,227,0.1)'
                        }]
                    },
                    options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
                });
            } catch (e) { alert("Error connecting to neural engine."); btn.innerText = "Analyze"; }
        }
    </script>
</body>
</html>
