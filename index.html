<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v5.0 | Prometheus Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #111111; --accent: #00ff88; --text: #f0f0f0; --danger: #ff4757; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .dashboard { max-width: 1000px; margin: 0 auto; background: var(--card); border-radius: 24px; padding: 40px; border: 1px solid #222; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        h1 { color: var(--accent); font-size: 32px; letter-spacing: -1.5px; margin: 0; }
        .status-bar { font-family: 'JetBrains Mono'; font-size: 11px; color: #555; margin-bottom: 30px; letter-spacing: 1px; }
        textarea { width: 100%; height: 100px; background: #000; border: 1px solid #333; border-radius: 16px; color: #fff; padding: 15px; font-size: 14px; resize: none; margin-bottom: 15px; outline: none; }
        button { width: 100%; padding: 18px; background: var(--accent); color: #000; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 14px; text-transform: uppercase; }
        button:hover { background: #fff; transform: translateY(-2px); }
        
        /* GÖRSEL RAPOR TASARIMI */
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; display: none; }
        .full-width { grid-column: 1 / -1; }
        .card { background: #181818; border-radius: 16px; padding: 20px; border: 1px solid #282828; }
        .risk-badge { background: var(--danger); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; float: right; }
        .label { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--accent); display: block; margin-bottom: 10px; text-transform: uppercase; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        table th, table td { text-align: left; padding: 12px; border-bottom: 1px solid #222; }
        table th { color: #888; font-weight: 400; font-size: 12px; }

        .timeline-item { border-left: 2px solid var(--accent); padding-left: 20px; margin-bottom: 15px; position: relative; }
        .timeline-item::before { content: ''; position: absolute; left: -7px; top: 0; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; }
        .timeline-time { font-family: 'JetBrains Mono'; font-size: 12px; color: var(--accent); display: block; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>DecisionOS</h1>
        <div class="status-bar">SYSTEM STATUS: <span id="statusText" style="color:var(--accent)">READY FOR COMMAND</span></div>
        <textarea id="userInput" placeholder="Kriz senaryosunu, finansal verileri veya stratejik soruyu buraya girin..."></textarea>
        <button id="startBtn">STRATEJİK SENTEZİ BAŞLAT</button>

        <div id="resultArea" class="report-grid">
            <!-- Rapor Elemanları Dinamik Gelecek -->
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const userInput = document.getElementById('userInput');
        const resultArea = document.getElementById('resultArea');
        const statusText = document.getElementById('statusText');

        startBtn.addEventListener('click', async () => {
            const text = userInput.value.trim();
            if (text.length < 5) return alert("Senaryo girilmedi.");
            
            statusText.innerText = "SENTEZLENİYOR...";
            statusText.style.color = "#ffaa00";
            resultArea.style.display = 'none';

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const data = await response.json();

                if (data.is_json) {
                    const r = data.report;
                    statusText.innerText = "ANALİZ TAMAMLANDI";
                    statusText.style.color = var(--accent);
                    resultArea.style.display = 'grid';

                    resultArea.innerHTML = `
                        <div class="card full-width" style="border-color: var(--danger)">
                            <span class="risk-badge">RİSK: CRITICAL</span>
                            <span class="label">🛑 NİHAİ KARAR VE TALİMAT</span>
                            <p style="font-size:18px; font-weight:600; margin:10px 0;">${r.final_decision}</p>
                        </div>

                        <div class="card">
                            <span class="label">📊 STRATEJİK TABLO</span>
                            <table>
                                <tr><th>Kategori</th><th>Durum</th></tr>
                                <tr><td>Operasyonel</td><td>Kritik</td></tr>
                                <tr><td>Yasal Uyum</td><td>İncelemede</td></tr>
                                <tr><td>Finansal</td><td>Donduruldu</td></tr>
                            </table>
                            <p style="font-size:13px; color:#888; margin-top:15px; line-height:1.6;">${r.analysis}</p>
                        </div>

                        <div class="card">
                            <span class="label">🛠️ ZAMAN ÇİZELGELİ AKSİYON PLANI</span>
                            ${r.action_plan.map(p => {
                                const parts = p.split(':');
                                return `
                                    <div class="timeline-item">
                                        <span class="timeline-time">${parts[0] || 'ACİL'}</span>
                                        <span style="font-size:14px;">${parts[1] || p}</span>
                                    </div>
                                `;
                            }).join('')}
                        </div>

                        <div class="card full-width" style="background: rgba(255,71,87,0.1); border-color:#ff4757;">
                            <span class="label" style="color:#ff4757;">⚠️ MUTLAK VETO (YASAL ENGEL)</span>
                            <p style="margin:0; font-size:14px; color:#ffb8b8;">${r.veto}</p>
                        </div>
                    `;
                } else {
                    alert("Veri görselleştirilemedi, ham metin olarak gösteriliyor.");
                    // Fallback (Yedek) buraya düz metin basabilir.
                }
            } catch (e) {
                statusText.innerText = "BAĞLANTI HATASI";
                console.error(e);
            }
        });
    </script>
</body>
</html>
