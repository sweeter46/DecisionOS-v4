<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v7.1 | Ultra-Renderer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        body { background: radial-gradient(circle at top, #1e1b4b, #020617); color: #f1f5f9; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
        .ai-input { background: rgba(2, 6, 23, 0.5); border: 1px solid rgba(99, 102, 241, 0.3); outline: none; transition: 0.3s; }
        .ai-input:focus { border-color: #6366f1; box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); }
        .ai-button { background: linear-gradient(135deg, #6366f1, #4338ca); transition: 0.3s; cursor: pointer; }
        .ai-button:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(99,102,241,0.4); }
        .chart-container { background: rgba(0,0,0,0.4); padding: 1.5rem; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.05); margin: 1.5rem 0; min-height: 300px; }
        .data-table { width: 100%; border-collapse: collapse; margin: 1rem 0; border-radius: 1rem; overflow: hidden; }
        .data-table th { background: rgba(99, 102, 241, 0.3); color: #a5b4fc; padding: 12px; text-align: left; font-size: 0.75rem; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.05); }
        .data-table td { padding: 12px; border: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; color: #cbd5e1; background: rgba(255,255,255,0.02); }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-center gap-6">
            <h1 class="text-5xl font-black tracking-tighter">Decision<span class="text-indigo-500">OS</span> v7.1</h1>
            <div id="kernel-status" class="px-4 py-2 bg-emerald-500/10 border border-emerald-500/20 rounded-full text-emerald-400 text-[10px] uppercase font-bold flex items-center gap-2">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> Kernel Online
            </div>
        </header>

        <main class="glass-panel p-8 mb-10 shadow-2xl">
            <textarea id="incidentInput" class="w-full h-32 ai-input p-6 rounded-3xl text-slate-100 text-lg mb-6 resize-none" placeholder="Analiz görevi girin..."></textarea>
            <button onclick="analyzeIncident()" id="actionBtn" class="w-full py-5 rounded-2xl ai-button text-white font-black text-xl">EXECUTE SYSTEM COMMAND</button>
        </main>

        <div id="resultArea" class="hidden space-y-8"></div>
    </div>

    <script>
        // DAĞINIK VERİYİ AYIKLAYAN GELİŞMİŞ RENDERER
        const ultraRender = (text) => {
            if (!text) return "";
            let html = text;

            // 1. Grafik Ayıkla
            html = html.replace(/```chart\s*([\s\S]*?)\s*```/g, (match, config) => {
                const id = `chart-${Math.random().toString(36).substr(2, 9)}`;
                setTimeout(() => {
                    try { new Chart(document.getElementById(id), JSON.parse(config.trim())); } 
                    catch(e) { console.error("Chart Error", e); }
                }, 500);
                return `<div class="chart-container"><canvas id="${id}"></canvas></div>`;
            });

            // 2. Tablo Ayıkla (En karmaşık metin içi tabloları bile yakalar)
            html = html.replace(/(^|\n)((?:\|.+?\|(?:\n|$))+)/g, (match, prefix, tableContent) => {
                const rows = tableContent.trim().split("\n").filter(r => r.includes("|"));
                if (rows.length < 2) return match;

                const header = rows[0].split("|").filter(c => c.trim() !== "");
                const body = rows.slice(2).map(r => r.split("|").filter(c => c.trim() !== ""));

                return `${prefix}<div class="overflow-x-auto"><table class="data-table">
                    <thead><tr>${header.map(h => `<th>${h.trim()}</th>`).join("")}</tr></thead>
                    <tbody>${body.map(row => `<tr>${row.map(cell => `<td>${cell.trim()}</td>`).join("")}</tr>`).join("")}</tbody>
                </table></div>`;
            });

            // 3. LaTeX Düzenle (Daha belirgin hale getir)
            html = html.replace(/\$\$(.*?)\$\$/g, '<div class="text-center my-8 text-2xl text-indigo-300">$$$1$$</div>');

            return html.replace(/\n/g, "<br>");
        };

        async function analyzeIncident() {
            const input = document.getElementById('incidentInput').value;
            const resArea = document.getElementById('resultArea');
            const btn = document.getElementById('actionBtn');
            if(!input.trim()) return;

            btn.disabled = true;
            btn.innerHTML = "SYSTEM PROCESSING...";
            resArea.classList.remove('hidden');
            resArea.innerHTML = `<div class="glass-panel p-20 text-center animate-pulse text-indigo-400">ARCHITECTING SOLUTION...</div>`;

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                const report = data.report;

                resArea.innerHTML = `
                    <div id="report-content" class="glass-panel p-10 border-b-8 border-indigo-600">
                        <div class="flex justify-between items-center mb-10 no-print">
                            <h2 class="text-4xl font-black uppercase italic">${report.final_decision}</h2>
                            <button onclick="downloadPDF()" class="px-5 py-2 border border-emerald-500/40 text-emerald-400 rounded-full text-[10px] font-black uppercase hover:bg-emerald-500 hover:text-white transition-all">Download Report</button>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <div class="lg:col-span-8 text-slate-300 leading-relaxed">
                                <div class="mb-8 p-6 bg-indigo-500/5 border-l-4 border-indigo-500 italic text-lg">
                                    ${report.analysis ? ultraRender(report.analysis) : ""}
                                </div>
                                <div class="space-y-4">
                                    ${ultraRender((report.action_plan["0-1h"] || []).join("\n"))}
                                    ${ultraRender((report.action_plan["1-24h"] || []).join("\n"))}
                                </div>
                            </div>
                            <div class="lg:col-span-4">
                                <div class="p-6 bg-white/5 rounded-3xl border border-white/10">
                                    <h4 class="text-[10px] font-bold text-slate-500 uppercase mb-4 tracking-tighter">System Confidence</h4>
                                    <div class="text-3xl font-black mb-2">${((report.confidence || 0.9)*100).toFixed(0)}%</div>
                                    <div class="w-full bg-slate-800 h-1 rounded-full"><div class="bg-indigo-500 h-full" style="width:${(report.confidence || 0.9)*100}%"></div></div>
                                    <div class="mt-6 text-[9px] uppercase text-slate-500 tracking-widest leading-loose">
                                        Veto Status: ${report.veto || 'Clear'}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                if (window.MathJax) MathJax.typeset();
            } catch (e) {
                resArea.innerHTML = `<div class="p-20 text-red-500 text-center">${e.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = "EXECUTE SYSTEM COMMAND";
            }
        }

        function downloadPDF() {
            const element = document.getElementById('report-content');
            const btns = document.querySelectorAll('.no-print');
            btns.forEach(b => b.style.display = 'none');
            html2pdf().set({ margin: 0.5, filename: 'DecisionOS_Report.pdf', jsPDF: { format: 'a4' } }).from(element).save().then(() => {
                btns.forEach(b => b.style.display = 'flex');
            });
        }
    </script>
</body>
</html>
