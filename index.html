<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v4.0 | Prometheus Engine</title>
    
    <!-- Google Fonts: Matrix & Cyber Style -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    
    <!-- Chart.js: Profesyonel Grafikler -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- KaTeX: Matematiksel Semboller -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        :root {
            --neon-green: #22c55e;
            --dark-bg: #030712;
            --panel-bg: rgba(17, 24, 39, 0.9);
            --border-glow: inset 0 0 10px rgba(34, 197, 94, 0.2);
        }

        body {
            background-color: var(--dark-bg);
            color: #d1d5db;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 850px;
        }

        .header {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            color: var(--neon-green);
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(34, 197, 94, 0.6);
        }

        .input-panel {
            background: var(--panel-bg);
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            margin-bottom: 40px;
        }

        textarea {
            width: 100%;
            background: #000;
            border: 1px solid #374151;
            color: var(--neon-green);
            font-family: 'Share Tech Mono', monospace;
            padding: 20px;
            border-radius: 8px;
            resize: none;
            box-sizing: border-box;
            outline: none;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 18px;
            margin-top: 20px;
            background: var(--neon-green);
            color: black;
            border: none;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.5);
            transform: translateY(-2px);
        }

        .tactical-summary {
            background: rgba(0,0,0,0.9);
            border: 2px solid var(--neon-green);
            border-radius: 15px;
            padding: 35px;
            display: none;
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.1);
        }

        .summary-header {
            font-family: 'Orbitron', sans-serif;
            border-bottom: 1px solid #14532d;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            color: var(--neon-green);
        }

        #resultArea {
            font-family: 'Share Tech Mono', monospace;
            line-height: 1.8;
            color: #ecfdf5;
            white-space: pre-wrap;
            font-size: 0.95rem;
        }

        .chart-container {
            margin-top: 40px;
            background: rgba(255,255,255,0.03);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #111827;
        }

        #mathResult {
            margin-top: 30px;
            text-align: center;
            padding: 20px;
            background: rgba(34, 197, 94, 0.05);
            border-radius: 8px;
            border: 1px dashed var(--neon-green);
            color: var(--neon-green);
        }

        .loading {
            color: #fbbf24;
            display: none;
            margin-top: 15px;
            font-family: 'Share Tech Mono';
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        canvas {
            max-height: 280px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="header">DecisionOS <span style="color:white">v4.0</span></h1>

        <div class="input-panel">
            <textarea id="incidentInput" rows="5" placeholder="GHOST_PROTOCOL ANALİZİ İÇİN VERİ GİRİŞİ YAPIN..."></textarea>
            <button onclick="analyzeIncident()">Execute Strategic Mission</button>
            <div id="loadingStatus" class="loading">... ANALYZİNG ARCHİTECTURE | ACCESSİNG PACKETS ...</div>
        </div>

        <div id="summaryPanel" class="tactical-summary">
            <div class="summary-header">
                <span>TACTICAL SUMMARY</span>
                <span id="ghostTag" style="font-size: 0.7rem; letter-spacing: 3px;">GHOST_PROTOCOL_ACTIVE</span>
            </div>
            
            <div id="resultArea">Yükleniyor...</div>

            <div class="chart-container">
                <canvas id="analysisChart"></canvas>
            </div>

            <div id="mathResult"></div>
        </div>
    </div>

    <script>
        let myChart = null;

        async function analyzeIncident() {
            const input = document.getElementById('incidentInput').value;
            const resultArea = document.getElementById('resultArea');
            const summaryPanel = document.getElementById('summaryPanel');
            const loading = document.getElementById('loadingStatus');

            if (!input) return alert("Hata: Giriş verisi eksik.");

            loading.style.display = "block";
            summaryPanel.style.display = "none";
            
            try {
                // RENDER ADRESİN ENTEGRE EDİLDİ
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });

                const data = await response.json();
                
                loading.style.display = "none";
                summaryPanel.style.display = "block";

                // 1. Yazılı Analiz Temizliği
                resultArea.innerText = data.analysis.replace('analysis:', '').trim();

                // 2. Matematiksel Semboller (KaTeX) Entegrasyonu
                if (data.math) {
                    const mathDiv = document.getElementById('mathResult');
                    katex.render(data.math, mathDiv, { throwOnError: false, displayMode: true });
                } else {
                    document.getElementById('mathResult').innerText = "Δ = RiskCoefficient(x)";
                }

                // 3. Risk Volatilite Grafiği (Chart.js)
                const ctx = document.getElementById('analysisChart').getContext('2d');
                
                if (myChart) myChart.destroy();

                myChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.chartLabels || ['0min', '10min', '20min', '30min', '40min', '50min'],
                        datasets: [{
                            label: 'STRATEGIC RISK VOLATILITY',
                            data: data.chartData || [40, 75, 45, 90, 60, 85],
                            borderColor: '#22c55e',
                            backgroundColor: 'rgba(34, 197, 94, 0.15)',
                            borderWidth: 2,
                            pointBackgroundColor: '#22c55e',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: { 
                                beginAtZero: true, 
                                grid: { color: '#111827' },
                                ticks: { color: '#4b5563', font: { family: 'Share Tech Mono' } }
                            },
                            x: { 
                                grid: { color: '#111827' },
                                ticks: { color: '#4b5563', font: { family: 'Share Tech Mono' } }
                            }
                        },
                        plugins: {
                            legend: { 
                                labels: { color: '#22c55e', font: { family: 'Orbitron', size: 10 } } 
                            }
                        }
                    }
                });

            } catch (error) {
                loading.style.display = "none";
                console.error("Link Hatası:", error);
                alert("Bağlantı Hatası: Render sunucusu yanıt vermedi.");
            }
        }
    </script>
</body>
</html>
