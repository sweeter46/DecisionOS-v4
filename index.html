<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DecisionOS v14.0 | Omega Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #010409; color: #f0f6fc; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 3rem; }
        .chart-box { background: #000; padding: 2rem; border-radius: 3rem; margin: 2rem 0; border: 2px solid #58a6ff; min-height: 380px; box-shadow: 0 0 40px rgba(88, 166, 255, 0.1); }
        .data-table { width: 100%; border-collapse: collapse; margin: 2rem 0; font-size: 1rem; border-radius: 12px; overflow: hidden; }
        .data-table th { background: #161b22; padding: 15px; text-align: left; border: 1px solid #30363d; color: #58a6ff; }
        .data-table td { padding: 12px; border: 1px solid #30363d; background: #0d1117; }
        .btn-main { background: linear-gradient(135deg, #2ea043 0%, #238636 100%); transition: 0.3s; font-weight: 800; }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(46, 160, 67, 0.3); }
    </style>
</head>
<body class="p-4 lg:p-20 italic">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-16">
            <h1 class="text-6xl font-black tracking-tighter italic">Decision<span class="text-green-500 font-extrabold text-7xl">OS</span></h1>
            <div class="glass px-6 py-2 text-green-500 text-[9px] font-black uppercase tracking-[0.4em] border-green-500/20 shadow-lg">OMEGA_CORE_STABLE_V14</div>
        </header>

        <section class="glass p-10 shadow-2xl mb-16 border-white/5 bg-slate-950/50">
            <textarea id="incidentInput" class="w-full h-32 bg-transparent text-slate-100 text-2xl outline-none resize-none placeholder:text-slate-900" placeholder="Bir görev emri bekliyorum..."></textarea>
            <button onclick="analyzeIncident()" id="actionBtn" class="w-full py-7 rounded-3xl btn-main text-white text-3xl mt-8 uppercase tracking-tighter">Execute Mission</button>
        </section>

        <div id="resultArea" class="hidden"></div>
    </div>

    <script>
        const omegaRender = (rawInput) => {
            if (!rawInput) return "";
            
            // 1. SÜPER-AGRESİF TEMİZLİK: Ters çizgileri ve kaçış karakterlerini parçala
            let text = rawInput.toString()
                .replace(/\\n/g, "\n")
                .replace(/\\t/g, " ")
                .replace(/\\/g, "")
                .replace(/&quot;/g, '"')
                .replace(/\"/g, "");

            // 2. VERİ MADENCİSİ: Tablo formatındaki ayları ve rakamları bul
            const months = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
            const labels = [];
            const values = [];

            months.forEach(m => {
                // regex: Ay adından sonra gelen ilk sayısal değeri bulur (örn: Şubat 2026 | 3.15)
                const regex = new RegExp(m + ".*?([0-9]+\\.[0-9]+|[0-9]+)", "i");
                const match = text.match(regex);
                if (match) {
                    labels.push(m);
                    values.push(parseFloat(match[1]));
                }
            });

            let chartHtml = "";
            if (labels.length > 0) {
                const id = "chart-" + Math.random().toString(36).substr(2, 5);
                chartHtml = `<div class="chart-box"><canvas id="${id}"></canvas></div>`;
                setTimeout(() => {
                    const ctx = document.getElementById(id).getContext('2d');
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Veri Trendi',
                                data: values,
                                borderColor: '#2ea043',
                                backgroundColor: 'rgba(46, 160, 67, 0.1)',
                                tension: 0.4,
                                fill: true,
                                borderWidth: 5,
                                pointBackgroundColor: '#fff',
                                pointRadius: 6
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#8b949e' } },
                                x: { grid: { display: false }, ticks: { color: '#8b949e' } }
                            }
                        }
                    });
                }, 800);
            }

            // 3. METİN KURTARMA: JSON kalıntılarını sil, okunabilir metni bırak
            let cleanText = text
                .replace(/report_content:/gi, "")
                .replace(/analysis:/gi, "")
                .replace(/\{.*?\}/g, "")
                .split("status:")[0]
                .replace(/\n/g, "<​br>")
                .trim();

            return chartHtml + `<div class="mt-8 text-slate-300 text-2xl font-light leading-relaxed">${cleanText}</div>`;
        };

        async function analyzeIncident() {
            const input = document.getElementById('incidentInput').value;
            const resArea = document.getElementById('resultArea');
            const btn = document.getElementById('actionBtn');
            if(!input.trim()) return;

            btn.disabled = true;
            resArea.classList.remove('hidden');
            resArea.innerHTML = `<div class="glass p-32 text-center animate-pulse text-green-500 font-black uppercase text-2xl tracking-[1em]">OMEGA CORE SYNCING...</div>`;

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                
                // Ham datanın tümünü render motoruna gönder
                const fullResponseString = JSON.stringify(data);

                resArea.innerHTML = `
                    <div id="report-content" class="glass p-12 lg:p-20 border-t-[16px] border-green-600 shadow-3xl bg-black/40">
                        <div class="flex justify-between items-center mb-16 italic">
                            <h2 class="text-6xl font-black text-white italic tracking-tighter">TACTICAL ANALYSIS</h2>
                            <button onclick="downloadPDF()" class="px-8 py-3 bg-green-600 text-white rounded-full text-[10px] uppercase font-black tracking-widest hover:scale-110 transition-all shadow-xl">EXPORT PDF</button>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
                            <div class="lg:col-span-8">${omegaRender(fullResponseString)}</div>
                            <div class="lg:col-span-4 italic">
                                <div class="glass p-10 sticky top-24 bg-green-950/10 border-green-500/10 text-center">
                                    <div class="text-[10px] font-black text-green-500 mb-6 uppercase tracking-widest italic">Confidence</div>
                                    <div class="text-9xl font-black text-white mb-6">95%</div>
                                    <div class="w-full bg-slate-900 h-2 rounded-full overflow-hidden">
                                        <div class="bg-green-500 h-full w-[95%] shadow-[0_0_20px_#2ea043]"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (e) {
                resArea.innerHTML = `<div class="p-20 glass text-red-500 text-center font-black">FATAL_ERROR: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        function downloadPDF() {
            const element = document.getElementById('report-content');
            html2pdf().set({ margin: 0.5, filename: 'DecisionOS_v14.pdf', html2canvas: { scale: 2, backgroundColor: '#010409' } }).from(element).save();
        }
    </script>
</body>
</html>
