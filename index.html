<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v7.0 | Agentic Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PDF Export Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&family=Plus+Jakarta+Sans:wght@800&display=swap');

        :root { --primary: #6366f1; --accent: #10b981; --bg: #020617; }

        body { 
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #020617 100%); 
            color: #f1f5f9; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
        }

        .glass-panel { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .ai-input { 
            background: rgba(2, 6, 23, 0.4); 
            border: 1px solid rgba(99, 102, 241, 0.2); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ai-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        .ai-button {
            background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .ai-button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.4); }

        .chart-container { background: rgba(0,0,0,0.3); padding: 1.5rem; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.05); margin: 1rem 0; }

        .data-table th { background: rgba(99, 102, 241, 0.15); color: #818cf8; padding: 14px; text-align: left; font-size: 0.75rem; text-transform: uppercase; }
        .data-table td { padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.9rem; }

        .export-btn {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            transition: all 0.2s ease;
        }
        .export-btn:hover { background: #10b981; color: white; }

        /* PDF Optimize */
        #report-content { background: transparent; }
    </style>
</head>
<body class="p-4 md:p-10 lg:p-16">
    <div class="max-w-6xl mx-auto">
        <header class="mb-12 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-center md:text-left">
                <h1 class="text-6xl font-black tracking-tight leading-none">
                    Decision<span class="text-indigo-500 italic">OS</span>
                </h1>
                <div class="flex items-center gap-3 mt-3 justify-center md:justify-start">
                    <span class="h-px w-8 bg-indigo-500/50"></span>
                    <p class="text-slate-500 font-medium tracking-widest text-[10px] uppercase">v7.0 Agent-Base & PDF Engine</p>
                </div>
            </div>
            <div class="flex gap-4">
                <div id="status-dot" class="flex items-center gap-2 px-4 py-2 glass-panel border-emerald-500/20">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                    <span class="text-[10px] font-bold text-emerald-400 uppercase tracking-tighter">System: Ready</span>
                </div>
            </div>
        </header>

        <main class="glass-panel p-6 md:p-10 mb-12">
            <div class="relative group">
                <textarea id="incidentInput" 
                    class="w-full h-44 ai-input p-6 rounded-3xl text-slate-100 text-lg placeholder:text-slate-600 outline-none scrollbar-hide resize-none" 
                    placeholder="Görev tanımı yapın (Örn: 'Son çeyrek satış verilerini analiz et ve strateji üret.')"></textarea>
                <div class="absolute bottom-4 right-4 text-[10px] text-slate-600 font-mono">Agent Mode: Active</div>
            </div>

            <button onclick="analyzeIncident()" id="actionBtn" 
                class="w-full mt-8 py-6 rounded-3xl ai-button text-white font-black text-xl shadow-2xl flex items-center justify-center gap-3">
                <i class="fas fa-microchip"></i> INITIALIZE INTELLIGENCE
            </button>
        </main>

        <!-- Result Section -->
        <section id="resultArea" class="hidden transition-all duration-700">
            <!-- Rapor Başı ve Export Butonu Dinamik Gelecek -->
        </section>
    </div>

    <script>
        const formatContent = (arr) => {
            let items = Array.isArray(arr) ? arr : [arr];
            if (items.length === 1 && typeof items[0] === 'string' && !items[0].includes("```")) {
                const parts = items[0].split(/(?=\d+[\.\)])/g).filter(p => p.trim().length > 0);
                if (parts.length > 1) items = parts;
            }

            return `<div class="space-y-6">
                ${items.map(item => {
                    const content = item.trim();
                    if (content.includes("```chart")) {
                        const canvasId = `chart-${Math.random().toString(36).substr(2, 9)}`;
                        const configStr = content.replace(/```chart/g, "").replace(/```/g, "").trim();
                        setTimeout(() => {
                            try { new Chart(document.getElementById(canvasId), JSON.parse(configStr)); } catch(e) {}
                        }, 300);
                        return `<div class="chart-container"><canvas id="${canvasId}"></canvas></div>`;
                    }
                    if (content.includes("```mermaid") || content.startsWith("graph ")) {
                        const code = content.replace(/```mermaid/g, "").replace(/```/g, "").trim();
                        return `<div class="mermaid">${code}</div>`;
                    }
                    if (content.includes("|") && content.includes("---")) {
                        const rows = content.split("\n").filter(r => r.includes("|"));
                        return `<div class="overflow-x-auto rounded-2xl border border-white/5 my-4"><table class="data-table w-full"><thead><tr>${rows[0].split("|").filter(c=>c.trim()).map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${rows.slice(2).map(r => `<tr>${r.split("|").filter(c=>c.trim()).map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
                    }
                    return `<div class="p-6 bg-slate-800/20 rounded-3xl border border-white/5 text-slate-300 text-sm leading-relaxed">${content.replace(/\n/g, '<br>')}</div>`;
                }).join('')}
            </div>`;
        };

        async function analyzeIncident() {
            const input = document.getElementById('incidentInput').value;
            const resArea = document.getElementById('resultArea');
            const btn = document.getElementById('actionBtn');
            if(!input.trim()) return;

            btn.disabled = true;
            btn.innerHTML = `<span class="animate-pulse italic uppercase">Agent processing...</span>`;
            resArea.classList.remove('hidden');
            resArea.innerHTML = `<div class="glass-panel p-20 text-center text-indigo-400 font-mono tracking-widest animate-pulse">GENERATING STRATEGIC ARCHITECTURE...</div>`;

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                let report = data.report;

                if(typeof report === 'string') {
                   const match = report.match(/\{[\s\S]*\}/);
                   if(match) report = JSON.parse(match[0]);
                }

                resArea.innerHTML = `
                    <div id="report-content" class="glass-panel p-8 md:p-12 border-b-8 border-indigo-500 shadow-2xl overflow-hidden">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12 no-print">
                            <h2 class="text-4xl md:text-5xl font-black text-white uppercase tracking-tighter">${report.final_decision}</h2>
                            <button onclick="downloadReport()" class="export-btn px-6 py-3 rounded-full text-xs font-black uppercase tracking-widest flex items-center gap-2">
                                Export PDF Report
                            </button>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                            <div class="lg:col-span-8">
                                <h3 class="text-[10px] font-bold text-indigo-400 uppercase tracking-[0.4em] mb-8">Executive Summary & Output</h3>
                                <div class="mb-10 text-slate-400 italic text-lg leading-relaxed border-l-2 border-indigo-500/30 pl-6">
                                    ${report.analysis}
                                </div>
                                ${formatContent(report.action_plan?.["1-24h"] || report.action_plan?.["0-1h"])}
                            </div>

                            <div class="lg:col-span-4 space-y-6">
                                <div class="p-6 bg-white/5 rounded-3xl border border-white/10">
                                    <h4 class="text-[10px] font-bold text-slate-500 uppercase mb-4">Precision Metric</h4>
                                    <div class="flex justify-between items-center text-xs mb-2">
                                        <span class="text-slate-400">Score</span>
                                        <span class="text-indigo-400 font-black">${((report.confidence || 0.9)*100).toFixed(0)}%</span>
                                    </div>
                                    <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                                        <div class="bg-indigo-500 h-full" style="width: ${(report.confidence || 0.9)*100}%"></div>
                                    </div>
                                </div>

                                <div class="p-6 bg-rose-500/5 rounded-3xl border border-rose-500/10 text-[10px] uppercase tracking-widest text-slate-500 leading-relaxed">
                                    Veto Status: ${report.veto || 'Safe Protocol active'}
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                setTimeout(() => {
                    if (window.MathJax) MathJax.typesetPromise();
                    if (window.mermaid) { try { mermaid.contentLoaded(); mermaid.run(); } catch(e) {}}
                }, 500);

            } catch (e) {
                resArea.innerHTML = `<div class="glass-panel p-20 text-red-500 text-center font-bold">SYSTEM OVERLOAD: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = "INITIALIZE INTELLIGENCE";
            }
        }

        function downloadReport() {
            const element = document.getElementById('report-content');
            const btns = document.querySelectorAll('.no-print');

            const opt = {
                margin:       0.3,
                filename:     'DecisionOS_Agent_Report.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, backgroundColor: '#020617' },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            // Butonu gizleyip basıyoruz
            btns.forEach(b => b.style.display = 'none');
            html2pdf().set(opt).from(element).save().then(() => {
                btns.forEach(b => b.style.display = 'flex');
            });
        }
    </script>
</body>
</html>
