<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v6.2 | Universal Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- LaTeX Desteği -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- Grafik/Şema Desteği -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({ 
            startOnLoad: false, 
            theme: 'dark',
            securityLevel: 'loose',
            fontFamily: 'Inter'
        });
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Plus+Jakarta+Sans:wght@700&display=swap');
        body { background: radial-gradient(circle at top right, #0f172a, #020617); color: #f1f5f9; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .ai-input { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(99, 102, 241, 0.3); outline: none; }
        .ai-button { background: linear-gradient(135deg, #6366f1, #4f46e5); box-shadow: 0 10px 30px -10px rgba(79, 70, 229, 0.5); }
        .mermaid { background: rgba(0,0,0,0.3); padding: 1.5rem; border-radius: 1rem; margin: 1rem 0; overflow-x: auto; display: flex; justify-content: center; }
        .question-card { transition: transform 0.2s ease, border-color 0.2s ease; }
        .question-card:hover { border-color: rgba(99, 102, 241, 0.5); transform: translateY(-2px); }
        /* MathJax Scroll Fix */
        .mjx-container { overflow-x: auto; overflow-y: hidden; max-width: 100%; }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-end gap-4">
            <div>
                <h1 class="text-5xl font-extrabold tracking-tighter">Decision<span class="text-indigo-500">OS</span> <span class="text-xs bg-indigo-500/20 px-2 py-1 rounded text-indigo-400 font-mono">v6.2 FINAL</span></h1>
                <p class="text-slate-500 mt-2 font-light italic">Universal Multi-Expert Orchestrator & Research Engine</p>
            </div>
            <div id="status-tag" class="text-[10px] font-bold text-emerald-400 border border-emerald-500/30 px-3 py-1 rounded-full uppercase tracking-widest bg-emerald-500/5">System: Online</div>
        </header>

        <div class="glass-panel p-8 mb-10 shadow-2xl">
            <textarea id="incidentInput" class="w-full h-40 ai-input p-6 rounded-2xl text-slate-200 text-lg mb-6 transition-all focus:ring-2 focus:ring-indigo-500 placeholder:text-slate-600" placeholder="Kriz senaryosu, akademik sınav talebi veya teknik analiz isteğinizi detaylıca girin..."></textarea>
            <button onclick="analyzeIncident()" id="actionBtn" class="w-full py-5 rounded-2xl ai-button text-white font-bold text-xl active:scale-[0.98] transition-all">INITIALIZE ANALYTICS</button>
        </div>

        <div id="resultArea" class="hidden space-y-10 pb-20"></div>
    </div>

    <script>
        // Akıllı Liste Ve Görsel Ayırıcı
        const formatContent = (arr) => {
            let items = Array.isArray(arr) ? arr : [arr];

            // Eğer tek bir string içinde numaralı listeler varsa onları ayır (Soru tespiti)
            if (items.length === 1 && typeof items[0] === 'string') {
                const pattern = /(?=\d+[\.\)])/g; 
                const parts = items[0].split(pattern).filter(p => p.trim().length > 0);
                if (parts.length > 1) items = parts;
            }

            return `<div class="space-y-4">
                ${items.map(item => {
                    const content = item.trim();

                    // Mermaid Grafik Tespiti
                    if (content.includes("```mermaid") || content.startsWith("graph ") || content.startsWith("sequenceDiagram")) {
                        const code = content.replace(/```mermaid/g, "").replace(/```/g, "").trim();
                        return `<div class="mermaid">${code}</div>`;
                    }

                    // Standart Madde veya Soru Kartı
                    return `
                        <div class="question-card p-5 bg-white/5 rounded-xl border border-white/10 text-sm text-slate-200 leading-relaxed">
                            ${content.replace(/\n/g, '<br>')}
                        </div>`;
                }).join('')}
            </div>`;
        };

        async function analyzeIncident() {
            const input = document.getElementById('incidentInput').value;
            const resArea = document.getElementById('resultArea');
            const btn = document.getElementById('actionBtn');
            if(!input.trim()) return;

            btn.disabled = true;
            btn.innerHTML = `<span class="animate-pulse">SYNTHESIZING EXPERT LAYERS...</span>`;
            resArea.classList.remove('hidden');
            resArea.innerHTML = `<div class="glass-panel p-24 text-center text-indigo-300 italic text-xl">Prometheus Kernel is orchestrating 28 modules...</div>`;

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                let report = data.report;

                if(typeof report === 'string') {
                   const match = report.match(/\{[\s\S]*\}/);
                   report = JSON.parse(match ? match[0] : report);
                }

                resArea.innerHTML = `
                    <div class="glass-panel p-10 md:p-16 border-t-8 border-indigo-600 shadow-2xl">
                        <div class="mb-12 text-center">
                            <h2 class="text-5xl font-black text-white tracking-tighter uppercase mb-4">${report.final_decision}</h2>
                            <div class="h-1 w-24 bg-indigo-500 mx-auto rounded-full mb-6"></div>
                            <p class="max-w-3xl mx-auto text-slate-400 text-lg italic leading-relaxed">${report.analysis}</p>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                            <!-- Sol Kolon: Aksiyon ve Sorular -->
                            <div class="lg:col-span-8 space-y-10">
                                <div class="p-8 bg-slate-900/50 rounded-3xl border border-white/5">
                                    <h3 class="text-xs font-bold text-indigo-400 uppercase tracking-[0.4em] mb-8 flex items-center gap-2">
                                        <span class="w-2 h-2 bg-indigo-500 rounded-full animate-ping"></span>
                                        Primary Output Feed
                                    </h3>
                                    ${formatContent(report.action_plan?.["1-24h"] || report.action_plan?.["0-1h"])}
                                </div>
                            </div>

                            <!-- Sağ Kolon: Özet ve Risk -->
                            <div class="lg:col-span-4 space-y-6">
                                <div class="p-6 bg-indigo-500/5 rounded-2xl border border-indigo-500/20">
                                    <h4 class="text-[10px] font-bold text-slate-500 uppercase mb-4 tracking-widest">Metadata</h4>
                                    <div class="space-y-4">
                                        <div class="flex justify-between items-center text-xs">
                                            <span class="text-slate-400">Confidence</span>
                                            <span class="text-white font-bold">${(report.confidence || 0.9)*100}%</span>
                                        </div>
                                        <div class="w-full bg-slate-800 h-1 rounded-full overflow-hidden">
                                            <div class="bg-indigo-500 h-full" style="width: ${(report.confidence || 0.9)*100}%"></div>
                                        </div>
                                        <p class="text-[10px] text-slate-500 mt-4 leading-relaxed italic">
                                            ${report.disclaimer || 'Profesyonel danışmanlık uyarısı aktif.'}
                                        </p>
                                    </div>
                                </div>

                                <div class="p-6 bg-rose-500/5 rounded-2xl border border-rose-500/20">
                                    <h4 class="text-[10px] font-bold text-rose-400 uppercase mb-2 tracking-widest">Veto Status</h4>
                                    <p class="text-xs text-slate-300 font-light italic">${report.veto || 'Güvenli protokol: İhlal saptanmadı.'}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                // Render İşlemini Tetikle
                setTimeout(() => {
                    if (window.MathJax) MathJax.typesetPromise();
                    if (window.mermaid) {
                        try {
                            mermaid.contentLoaded();
                            mermaid.run();
                        } catch(err) { console.error("Mermaid Render Error:", err); }
                    }
                }, 500);

            } catch (e) {
                resArea.innerHTML = `<div class="glass-panel p-20 text-red-500 text-center font-bold">SYSTEM OVERLOAD: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = "INITIALIZE ANALYTICS";
            }
        }
    </script>
</body>
</html>
