<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v5.0 | Prometheus Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #111111; --accent: #00ff88; --text: #f0f0f0; --danger: #ff4757; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .dashboard { max-width: 1000px; margin: 0 auto; background: var(--card); border-radius: 24px; padding: 40px; border: 1px solid #222; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        h1 { color: var(--accent); font-size: 32px; letter-spacing: -1.5px; margin: 0; }
        .status-bar { font-family: 'JetBrains Mono'; font-size: 11px; color: #555; margin-bottom: 30px; letter-spacing: 1px; }
        textarea { width: 100%; height: 100px; background: #000; border: 1px solid #333; border-radius: 16px; color: #fff; padding: 15px; font-size: 14px; resize: none; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 18px; background: var(--accent); color: #000; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 14px; text-transform: uppercase; }
        button:hover { background: #fff; transform: translateY(-2px); }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; display: none; }
        .full-width { grid-column: 1 / -1; }
        .card { background: #181818; border-radius: 16px; padding: 20px; border: 1px solid #282828; }
        .risk-badge { background: var(--danger); color: white; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; float: right; }
        .label { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--accent); display: block; margin-bottom: 10px; text-transform: uppercase; }
        .timeline-item { border-left: 2px solid var(--accent); padding-left: 20px; margin-bottom: 15px; position: relative; }
        .timeline-item::before { content: ''; position: absolute; left: -7px; top: 0; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; }
        .timeline-time { font-family: 'JetBrains Mono'; font-size: 12px; color: var(--accent); display: block; font-weight: 600; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>DecisionOS</h1>
        <div class="status-bar">SYSTEM STATUS: <span id="statusText" style="color:#00ff88">V5.1 ONLINE</span></div>
        <textarea id="userInput" placeholder="Kriz senaryosunu buraya girin..."></textarea>
        <button id="startBtn">STRATEJİK SENTEZİ BAŞLAT</button>
        <div id="resultArea" class="report-grid"></div>
    </div>
    <script>
        const startBtn = document.getElementById('startBtn');
        const userInput = document.getElementById('userInput');
        const resultArea = document.getElementById('resultArea');
        const statusText = document.getElementById('statusText');

        startBtn.addEventListener('click', async () => {
            const text = userInput.value.trim();
            if (text.length < 5) return alert("Lütfen senaryo giriniz.");
            statusText.innerText = "SENTEZLENİYOR...";
            statusText.style.color = "#ffaa00";
            resultArea.style.display = 'none';

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const data = await response.json();

                if (data.status === "success") {
                    const r = data.report;
                    statusText.innerText = "ANALİZ TAMAMLANDI";
                    statusText.style.color = "#00ff88";
                    resultArea.style.display = 'grid';

                    let actionHtml = "";
                    r.action_plan.forEach(p => {
                        const pts = p.split(':');
                        actionHtml += `<div class="timeline-item"><span class="timeline-time">${pts[0] || 'ACİL'}</span><span style="font-size:13px; color:#ddd;">${pts[1] || p}</span></div>`;
                    });

                    resultArea.innerHTML = `
                        <div class="card full-width" style="border-left:5px solid #ff4757"><span class="risk-badge">RİSK: KRİTİK</span><span class="label">🛑 NİHAİ KARAR</span><p style="font-size:17px; font-weight:600; margin:10px 0;">${r.final_decision}</p></div>
                        <div class="card"><span class="label">📊 STRATEJİK ANALİZ</span><p style="font-size:13px; color:#ccc; line-height:1.6;">${r.analysis}</p></div>
                        <div class="card"><span class="label">🛠️ AKSİYON PLANI</span><div style="margin-top:15px;">${actionHtml}</div></div>
                        <div class="card full-width" style="border-left:5px solid #ff4757; background:rgba(255,71,87,0.05);"><span class="label" style="color:#ff4757;">⚠️ MUTLAK VETO</span><p style="margin:0; font-size:13px; color:#ffb8b8;">${r.veto}</p></div>
                    `;
                } else {
                    statusText.innerText = "API YANITI BEKLENİYOR";
                    resultArea.style.display = 'block';
                    resultArea.innerHTML = `<div class="card full-width" style="color:#ffaa00; border-color:#ffaa00;">Sistem geçici bir gecikme yaşıyor. Lütfen 5 saniye sonra tekrar deneyin veya girdinizi kontrol edin. <br><br> Sunucu Yanıtı: ${data.report}</div>`;
                }
            } catch (e) {
                statusText.innerText = "BAĞLANTI HATASI";
                statusText.style.color = "#ff4757";
            }
        });
    </script>
</body>
</html>
