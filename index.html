<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DecisionOS v12.0 | Gods' Eye</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 3rem; }
        .chart-box { background: #000; padding: 2rem; border-radius: 3.5rem; margin: 2rem 0; border: 2px solid #6366f1; min-height: 420px; box-shadow: 0 0 50px rgba(99, 102, 241, 0.15); }
        .data-table { width: 100%; border-collapse: collapse; margin: 2rem 0; font-size: 0.9rem; }
        .data-table th { background: #1e1b4b; padding: 15px; text-align: left; border: 1px border-indigo-500/20; color: #818cf8; }
        .data-table td { padding: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-main { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); transition: 0.5s; font-weight: 900; }
        .btn-main:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body class="p-8 lg:p-24 italic">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-20 italic">
            <h1 class="text-7xl font-black tracking-tighter italic">Decision<span class="text-indigo-500">OS</span></h1>
            <div class="glass px-8 py-3 text-indigo-400 text-[10px] font-black uppercase tracking-[0.5em]">System: Gods' Eye v12.0</div>
        </header>

        <section class="glass p-12 mb-20 shadow-2xl">
            <textarea id="incidentInput" class="w-full h-40 bg-transparent text-slate-100 text-3xl outline-none resize-none placeholder:text-slate-900" placeholder="Bir hedef analiz emri girin..."></textarea>
            <button onclick="analyzeIncident()" id="actionBtn" class="w-full py-8 rounded-[3rem] btn-main text-white text-3xl mt-10 uppercase tracking-tighter italic">Execute Strategic Analysis</button>
        </section>

        <div id="resultArea" class="hidden"></div>
    </div>

    <script>
        const ultraRender = (text) => {
            if (!text) return "";
            
            // 1. ELEK: Tüm kaçış karakterlerini ve kirlilikleri temizle
            let clean = text.toString()
                .replace(/\n/g, "\n")
                .replace(/\\/g, "") // Tüm backslash'leri yok et
                .replace(/&quot;/g, '"')
                .replace(/```chart|```/g, "")
                .replace(/<br\s*\/?>/gi, "\n");

            let chartSection = "";

            // 2. VERİ MADENCİSİ: Sayıları ve Ayları metinden cımbızla çek
            // Screenshot'ta görülen "Şubat 2026 | 3.15" formatını yakalar
            const months = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
            const labels = [];
            const dataPoints = [];

            months.forEach(m => {
                const regex = new RegExp(m + "\s*2026\s*\\|\s*([0-9.]+)", "i");
                const match = clean.match(regex);
                if (match) {
                    labels.push(m);
                    dataPoints.push(parseFloat(match[1]));
                }
            });

            // Eğer metinden veri çekebildiysek grafiği kur
            if (labels.length > 0) {
                const id = "chart-" + Math.random().toString(36).substr(2, 5);
                chartSection = `<div class="chart-box"><canvas id="${id}"></canvas></div>`;
                
                setTimeout(() => {
                    const ctx = document.getElementById(id).getContext('2d');
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Enflasyon Tahmini',
                                data: dataPoints,
                                borderColor: '#6366f1',
                                backgroundColor: 'rgba(99, 102, 241, 0.2)',
                                tension: 0.4,
                                fill: true,
                                borderWidth: 6,
                                pointRadius: 8,
                                pointBackgroundColor: '#fff'
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8', font: { size: 14 } } },
                                x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 14 } } }
                            }
                        }
                    });
                }, 1000);
            }

            // 3. TABLO MOTORU (v12.0)
            clean = clean.replace(/(?:^|\n)((?:\|.+?\|(?:\n|$))+)/g, (match, table) => {
                const rows = table.trim().split("\n").filter(r => r.includes("|") && !r.includes("---"));
                const h = rows[0].split("|").filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join("");
                const b = rows.slice(1).map(r => `<tr>${r.split("|").filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join("")}</tr>`).join("");
                return `<div class="overflow-x-auto"><table class="data-table"><thead><tr>${h}</tr></thead><tbody>${b}</tbody></table></div>`;
            });

            // 4. SON TEMİZLİK
            const finalContent = clean.split("analysis:")[0].split("status:")[0] // gereksiz JSON kalıntılarını kes
                .replace(/\{[\s\S]*?\}/g, "")
                .replace(/[$$$$\"\$]/g, "")
                .replace(/\n/g, "<​br>")
                .trim();

            return chartSection + `<div class="mt-12 text-slate-300 text-3xl font-light leading-relaxed italic">${finalContent}</div>`;
        };

        async function analyzeIncident() {
            const input = document.getElementById('incidentInput').value;
            const resArea = document.getElementById('resultArea');
            const btn = document.getElementById('actionBtn');
            if(!input.trim()) return;

            btn.disabled = true;
            resArea.classList.remove('hidden');
            resArea.innerHTML = `<div class="glass p-32 text-center animate-pulse text-indigo-500 font-black uppercase text-2xl tracking-[1em]">Scanning Reality...</div>`;

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                resArea.innerHTML = `
                    <div id="report-content" class="glass p-20 lg:p-24 border-t-[16px] border-indigo-600 shadow-3xl">
                        <div class="flex justify-between items-center mb-20 italic">
                            <h2 class="text-6xl font-black text-white italic tracking-tighter">TACTICAL REPORT</h2>
                            <button onclick="downloadPDF()" class="px-10 py-4 bg-indigo-600 text-white rounded-full text-[10px] font-black uppercase no-print hover:scale-110 transition-all shadow-xl">EXPORT PDF</button>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
                            <div class="lg:col-span-8">${ultraRender(JSON.stringify(data))}</div>
                            <div class="lg:col-span-4">
                                <div class="glass p-12 sticky top-24 bg-indigo-950/20 border-white/10 text-center">
                                    <div class="text-[10px] font-black text-indigo-500 mb-6 uppercase tracking-widest italic">Confidence Index</div>
                                    <div class="text-9xl font-black text-white mb-10 tracking-tighter">95%</div>
                                    <div class="w-full bg-slate-950 h-3 rounded-full overflow-hidden shadow-[0_0_20px_rgba(99,102,241,0.5)]">
                                        <div class="bg-indigo-500 h-full w-[95%]"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (e) {
                resArea.innerHTML = `<div class="p-20 glass text-red-500 text-center font-black">SYNC_ERROR: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        function downloadPDF() {
            const element = document.getElementById('report-content');
            html2pdf().set({ margin: 0.5, filename: 'DecisionOS_v12.pdf', html2canvas: { scale: 2, backgroundColor: '#020617' } }).from(element).save();
        }
    </script>
</body>
</html>
