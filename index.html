<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v4.0 Prometheus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #141417;
            --accent: #00ff88;
            --text: #e1e1e6;
            --danger: #ff4757;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .dashboard {
            width: 90%;
            max-width: 900px;
            background: var(--card);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #2d2d35;
        }
        h1 {
            color: var(--accent);
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }
        #statusLight {
            font-size: 10px; 
            color: #555; 
            margin-bottom: 15px; 
            font-family: 'JetBrains Mono';
        }
        p.subtitle {
            color: #888;
            margin-bottom: 30px;
        }
        textarea {
            width: 100%;
            height: 120px;
            background: #1c1c21;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            padding: 15px;
            font-family: inherit;
            resize: none;
            box-sizing: border-box;
            transition: border 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: black;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, opacity 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        .result-container {
            margin-top: 30px;
            padding: 20px;
            background: #1c1c21;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
            display: none;
        }
        .report-header {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--accent);
            margin-bottom: 15px;
        }
        #reportContent {
            line-height: 1.6;
            white-space: pre-wrap;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>DecisionOS</h1>
        <div id="statusLight">● SINYAL: <span id="statusText">V4.1.2 - READY</span></div>
        <p class="subtitle">Kriz senaryosunu girin, AI stratejinizi sentezlesin.</p>
        
        <textarea id="userInput" placeholder="Problemi buraya detaylandırın..."></textarea>
        <button id="startBtn">PROTOKOLÜ TETİKLE</button>

        <div id="resultArea" class="result-container">
            <div id="bootLog" class="report-header">⚙️ STRATEJİK ANALİZ AKTİF</div>
            <div id="reportContent">Lütfen bekleyin, kriz stratejisi kurgulanıyor...</div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const userInput = document.getElementById('userInput');
        const resultArea = document.getElementById('resultArea');
        const reportContent = document.getElementById('reportContent');
        const statusText = document.getElementById('statusText');

        startBtn.addEventListener('click', async () => {
            const text = userInput.value.trim();
            if (text.length < 5) return alert("Lütfen daha detaylı bir senaryo girin.");

            // Arayüz Hazırlığı
            resultArea.style.display = 'block';
            statusText.innerText = "SENTEZLENİYOR...";
            statusText.style.color = "#ffaa00";
            reportContent.innerText = "Abacus AI Core (V4.1.2) kriz verilerini işliyor...";

                try {
                // VERİYİ ÖNCE KENDİ İÇİNDE PAKETLEYELİM (BAZI API'LER BUNU İSTER)
                const payload = {
                    "deploymentToken": "f3baa2a32be542f9af98a81aa71da611",
                    "deploymentId": "63a2ddb70",
                    "messages": [
                        {
                            "is_user": true,
                            "text": text
                        }
                    ]
                };

                const response = await fetch('https://api.abacus.ai/api/v0/getChatResponse', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                        // Eğer gerekirse buraya 'Accept': 'application/json' eklenebilir
                    },
                    body: JSON.stringify(payload)
                    });

                if (data.success && data.result) {
                    statusText.innerText = "ONLINE - ANALİZ HAZIR";
                    statusText.style.color = "#00ff88"; // Yeşil
                    reportContent.style.whiteSpace = "pre-wrap";
                    // Verinin hem 'content' hem de 'text' alanını kontrol ediyoruz
                    reportContent.innerText = data.result.content || data.result.text || "Başarılı bağlantı, ancak analiz metni boş döndü.";
                } else {
                    statusText.innerText = "ABACUS REDDETTİ";
                    statusText.style.color = "#ff4757"; // Kırmızı
                    reportContent.innerText = "Hata Detayı: " + (data.error || JSON.stringify(data));
                }

            } catch (error) {
                statusText.innerText = "BAĞLANTI/CORS HATASI";
                statusText.style.color = "#ff4757";
                reportContent.innerText = "Tarayıcı güvenlik engeli. Abacus panelinde web sitenize izin vermeniz gerekebilir. \nHata: " + error.message;
            }
        });
    </script>
</body>
</html>
