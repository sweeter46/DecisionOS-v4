<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v4.0 - Prometheus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>DecisionOS <span>v4.0 Prometheus</span></h1>
            <p>Sistem Durumu: ÇEVRİMİÇİ | Risk Seviyesi: İzleniyor</p>
        </header>

        <main class="input-section">
            <textarea id="incidentInput" placeholder="Acil durum senaryosunu veya olayı buraya girin..."></textarea>
            <button id="startBtn">PROTOKOLÜ BAŞLAT</button>
        </main>

        <div id="resultArea" class="result-area hidden">
            <div class="boot-log" id="bootLog"></div>
            
            <div class="decision-box">
                <h3>🚨 NİHAİ KARAR: <span id="finalDecision"></span></h3>
                <p id="analysisText"></p>
            </div>

            <div class="action-plan-box">
                <h4>🛠️ EYLEM PLANI (SAVAŞ KABİNESİ)</h4>
                <ul id="actionPlanList"></ul>
            </div>

            <div class="veto-box">
                <p>⚠️ <strong>VETO KARARI:</strong> <span id="vetoText"></span></p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startBtn = document.getElementById('startBtn');
            const textArea = document.querySelector('textarea');
            const bootLog = document.getElementById('bootLog');
            const resultArea = document.getElementById('resultArea');
            const actionPlanList = document.getElementById('actionPlanList');
            const finalDecision = document.getElementById('finalDecision');
            const analysisText = document.getElementById('analysisText');
            const vetoText = document.getElementById('vetoText');

            startBtn.addEventListener('click', async () => {
                const userInput = textArea.value.trim();
                
                // Kontrol 1: Metin girişi var mı?
                if (userInput.length < 5) {
                    alert("Lütfen en az 5 karakterlik bir olay girin!");
                    return;
                }

                console.log("Süreç Başladı. Giriş:", userInput);

                // Ekran Hazırlığı
                resultArea.classList.remove('hidden');
                bootLog.innerText = "⚙️ Protokol başlatılıyor... AI Sentezleme Birimi Bağlanıyor...";
                actionPlanList.innerHTML = "<li>Analiz yapılıyor, lütfen bekleyin...</li>"; 

                try {
                    // RENDER BAĞLANTISI
                    const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: userInput })
                    });

                    if (!response.ok) throw new Error("Sunucu hatası: " + response.status);

                    const data = await response.json();
                    console.log("AI'dan Gelen Veri:", data);

                    // 1. Boot Log ve Karar Yazdırma
                    bootLog.innerText = data.boot_log || "[OK] Sistem Yanıtı Alındı";
                    finalDecision.innerText = data.final_decision || "KARAR ÜRETİLDİ";
                    analysisText.innerText = data.analysis || "Detaylı analiz metni hazırlanıyor...";
                    vetoText.innerText = data.veto || "Veto kararı bulunmuyor.";

                    // 2. Eylem Planı Yazdırma (Esnek Döngü)
                    actionPlanList.innerHTML = ""; // Temizle
                    
                    if (data.action_plan && Array.isArray(data.action_plan)) {
                        // Eğer verimiz bir listeyse (İstediğimiz format)
                        data.action_plan.forEach(item => {
                            let li = document.createElement("li");
                            li.innerText = item;
                            actionPlanList.appendChild(li);
                        });
                    } else if (data.action_plan) {
                        // Eğer veri hata verip düz metin geldiyse
                        let li = document.createElement("li");
                        li.innerText = data.action_plan;
                        actionPlanList.appendChild(li);
                    } else {
                        actionPlanList.innerHTML = "<li>Aksiyon planı oluşturulamadı.</li>";
                    }

                } catch (error) {
                    console.error("KRİTİK HATA:", error);
                    bootLog.innerText = "❌ SİSTEM HATASI: Bağlantı koptu veya zaman aşımına uğradı.";
                    actionPlanList.innerHTML = "<li>Hata Detayı: " + error.message + "<​/li>";
                }
            });
        });
    </script>
</body>
</html>
