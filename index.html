<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v9.1 | Final Masterpiece</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2.5rem; }
        .chart-box { background: #000; padding: 2rem; border-radius: 2.5rem; margin: 2rem 0; border: 1px solid #6366f144; min-height: 350px; }
        .data-table { width: 100%; margin: 2rem 0; border-collapse: collapse; border-radius: 1.5rem; overflow: hidden; }
        .data-table th { background: linear-gradient(to right, #3730a3, #4f46e5); padding: 14px; text-align: left; font-size: 0.75rem; text-transform: uppercase; font-weight: 800; }
        .data-table td { background: rgba(255,255,255,0.02); padding: 14px; border: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .btn-main { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); transition: 0.3s; }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body class="p-6 md:p-12 lg:p-20">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-16">
            <h1 class="text-6xl font-black tracking-tighter italic">Decision<span class="text-indigo-500">OS</span></h1>
            <div class="glass px-6 py-2 text-emerald-400 text-[10px] uppercase font-black tracking-widest">Final Stable Sync</div>
        </header>

        <section class="glass p-10 shadow-2xl mb-16">
            <textarea id="incidentInput" class="w-full h-40 bg-transparent text-slate-200 text-2xl outline-none resize-none" placeholder="Talimat verin..."></textarea>
            <button onclick="analyzeIncident()" id="actionBtn" class="w-full py-6 rounded-3xl btn-main text-white font-black text-2xl mt-8">EXECUTE ANALYSIS</button>
        </section>

        <div id="resultArea" class="hidden"></div>
    </div>

    <script>
        const ultraRender = (text) => {
            if (!text) return "";
            
            // 1. TEMİZLİK VE VERİ KURTARMA
            let raw = text.toString();
            if (raw.includes('"analysis":')) {
                const match = raw.match(/"analysis":\s*"([\s\S]*?)"(?=\s*[,\}])/);
                if (match) raw = match[1];
            }
            
            let clean = raw.replace(/\\n/g, "\n").replace(/\\"/g, '"').replace(/<br\s*\/?>/gi, "\n");
            let chartHtml = "";

            // 2. GRAFİK AVLAYICI (VE KUTUYU OLUŞTURUCU)
            const chartMatch = clean.match(/\{[\s\S]*?"type"\s*:\s*"(?:line|bar)"[\s\S]*?\}/);
            if (chartMatch) {
                const id = "chart-" + Math.random().toString(36).substr(2, 5);
                const configStr = chartMatch[0].replace(/<br>/gi, "").replace(/\n/g, "").replace(/\s+/g, " ");
                
                chartHtml = `<div class="chart-box"><canvas id="${id}"></canvas></div>`;
                
                setTimeout(() => {
                    try {
                        const ctx = document.getElementById(id).getContext('2d');
                        new Chart(ctx, JSON.parse(configStr));
                    } catch(e) { console.error("Chart Error"); }
                }, 800);

                clean = clean.replace(chartMatch[0], ""); // JSON'u metinden çıkar
            }

            // 3. TABLO MOTORU
            clean = clean.replace(/(?:^|\n)((?:\|.+?\|(?:\n|$))+)/g, (match, table) => {
                const rows = table.trim().split("\n").filter(r => r.includes("|") && !r.includes("---"));
                const h = rows[0].split("|").filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join("");
                const b = rows.slice(1).map(r => `<tr>${r.split("|").filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join("")}</tr>`).join("");
                return `<div class="overflow-x-auto"><table class="data-table"><thead><tr>${h}</tr></thead><tbody>${b}</tbody></table></div>`;
            });

            // 4. BAŞLIK VE SON TEMİZLİK
            clean = clean.replace(/\$/g, "").replace(/\{/g, "").replace(/\}/g, "").replace(/\[/g, "").replace(/\]/g, "").replace(/\"/g, "");
            
            // GRAFİĞİ EN ÜSTE EKLE VE DÖNDÜR
            return chartHtml + clean.replace(/\n/g, "<​br>");
        };

        async function analyzeIncident() {
            const input = document.getElementById('incidentInput').value;
            const resArea = document.getElementById('resultArea');
            const btn = document.getElementById('actionBtn');
            if(!input.trim()) return;

            btn.disabled = true;
            resArea.classList.remove('hidden');
            resArea.innerHTML = `<div class="glass p-20 text-center animate-pulse text-indigo-500 font-black">ANALYSIS IN PROGRESS...</div>`;

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                const report = data.report || {};

                resArea.innerHTML = `
                    <div id="report-content" class="glass p-12 border-t-8 border-indigo-600 shadow-2xl">
                        <div class="flex justify-between items-center mb-10">
                            <h2 class="text-4xl font-black italic uppercase">${report.final_decision || "STRATEGIC REPORT"}</h2>
                            <button onclick="downloadPDF()" class="px-6 py-2 bg-indigo-600 rounded-full text-[10px] font-black no-print">EXPORT</button>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                            <div class="lg:col-span-8 text-slate-300 text-xl leading-relaxed">
                                ${ultraRender(report.analysis || "")}
                            </div>
                            <div class="lg:col-span-4">
                                <div class="glass p-8 sticky top-12 shadow-xl border-white/5">
                                    <div class="text-[10px] font-black text-indigo-500 mb-4 uppercase">Confidence</div>
                                    <div class="text-6xl font-black text-white mb-6">${((report.confidence || 0.95)*100).toFixed(0)}%</div>
                                    <div class="w-full bg-slate-950 h-2 rounded-full overflow-hidden">
                                        <div class="bg-indigo-500 h-full" style="width:${(report.confidence || 0.95)*100}%"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (e) {
                resArea.innerHTML = `<div class="p-10 text-red-500">Error: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        function downloadPDF() {
            const element = document.getElementById('report-content');
            html2pdf().set({ margin: 0.5, filename: 'Report.pdf', html2canvas: { scale: 2, backgroundColor: '#020617' } }).from(element).save();
        }
    </script>
</body>
</html>
