<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v6.0 | Universal AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- LaTeX Desteği -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- Grafik/Şema Desteği -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>mermaid.initialize({ startOnLoad: false, theme: 'dark' });</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Plus+Jakarta+Sans:wght@700&display=swap');
        body { background: radial-gradient(circle at top right, #0f172a, #020617); color: #f1f5f9; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .ai-input { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(99, 102, 241, 0.3); outline: none; }
        .ai-button { background: linear-gradient(135deg, #6366f1, #4f46e5); box-shadow: 0 10px 30px -10px rgba(79, 70, 229, 0.5); }
        .mermaid { background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 1rem; margin: 1rem 0; overflow-x: auto; }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 text-center md:text-left">
            <h1 class="text-5xl font-extrabold tracking-tighter tracking-tight">Decision<span class="text-indigo-500">OS</span> <span class="text-xs bg-indigo-500/20 px-2 py-1 rounded text-indigo-400">V6 UNIVERSAL</span></h1>
            <p class="text-slate-500 mt-2 font-light italic">Universal Multi-Expert Orchestrator & Strategic Engine</p>
        </header>

        <div class="glass-panel p-8 mb-10">
            <textarea id="incidentInput" class="w-full h-32 ai-input p-6 rounded-2xl text-slate-200 text-lg mb-6 transition-all focus:ring-2 focus:ring-indigo-500" placeholder="Kriz senaryosu, Finansal analiz veya Sınav talebi girin..."></textarea>
            <button onclick="analyzeIncident()" id="actionBtn" class="w-full py-5 rounded-2xl ai-button text-white font-bold text-xl active:scale-95 transition-transform">INITIALIZE ANALYTICS</button>
        </div>

        <div id="resultArea" class="hidden space-y-10"></div>
    </div>

    <script>
        async function analyzeIncident() {
            const input = document.getElementById('incidentInput').value;
            const resArea = document.getElementById('resultArea');
            const btn = document.getElementById('actionBtn');
            if(!input.trim()) return;

            btn.disabled = true;
            btn.innerHTML = "ORCHESTRATING DATA...";
            resArea.classList.remove('hidden');
            resArea.innerHTML = `<div class="glass-panel p-20 text-center animate-pulse text-indigo-300 italic text-xl">DecisionOS is processing multiple expert layers...</div>`;

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                let report = data.report;

                if(typeof report === 'string') {
                   const match = report.match(/\{[\s\S]*\}/);
                   report = JSON.parse(match ? match[0] : report);
                }

                const listItems = (arr) => {
                    if(!Array.isArray(arr)) return `<p class="text-slate-300 text-sm leading-relaxed">${arr}</p>`;
                    return `<ul class="space-y-4">${arr.map(item => {
                        // Mermaid/Grafik kontrolü
                        if(item.includes("```mermaid")) {
                            const code = item.replace(/```mermaid/g, "").replace(/```/g, "").trim();
                            return `<div class="mermaid">${code}</div>`;
                        }
                        return `<li class="flex items-start gap-3 p-3 bg-white/5 rounded-lg border border-white/5"><span class="text-indigo-500 font-bold">•</span><span class="text-sm text-slate-200 leading-relaxed">${item}</span></li>`;
                    }).join('')}</ul>`;
                };

                resArea.innerHTML = `
                    <div class="glass-panel p-12 border-t-8 border-indigo-500">
                        <h2 class="text-5xl font-black text-white text-center mb-6 tracking-tighter uppercase">${report.final_decision}</h2>
                        <div class="max-w-3xl mx-auto text-center text-slate-400 text-lg leading-relaxed mb-10 italic">${report.analysis}</div>
                        
                        <div class="grid grid-cols-1 gap-10">
                            <div class="glass-panel p-8 bg-slate-900/40">
                                <h3 class="text-xs font-black text-indigo-400 uppercase tracking-[0.3em] mb-8 border-b border-indigo-500/20 pb-4">Multi-Expert Output Feed</h3>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    <div class="space-y-4">
                                        <p class="text-[10px] font-bold text-slate-500 uppercase">Phase I</p>
                                        ${listItems(report.action_plan?.["0-1h"])}
                                    </div>
                                    <div class="space-y-4">
                                        <p class="text-[10px] font-bold text-slate-500 uppercase">Phase II</p>
                                        ${listItems(report.action_plan?.["1-24h"])}
                                    </div>
                                    <div class="space-y-4">
                                        <p class="text-[10px] font-bold text-slate-500 uppercase">Phase III</p>
                                        ${listItems(report.action_plan?.["24-72h"])}
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mt-10 flex flex-col md:flex-row justify-between items-center gap-6 pt-10 border-t border-white/5 text-[10px] text-slate-600">
                            <div class="flex gap-4">
                                <span class="bg-indigo-500/10 text-indigo-400 px-3 py-1 rounded">CONFIDENCE: ${(report.confidence*100).toFixed(0)}%</span>
                                <span class="bg-rose-500/10 text-rose-400 px-3 py-1 rounded italic">${report.veto || 'Safe Protocol'}</span>
                            </div>
                            <div class="italic max-w-[400px] text-right">${report.disclaimer || ''}</div>
                        </div>
                    </div>
                `;

                // Render Math & Diagrams
                MathJax.typeset();
                mermaid.run();

            } catch (e) {
                resArea.innerHTML = `<div class="glass-panel p-20 text-red-500 text-center font-bold">CRITICAL ORCHESTRATION ERROR: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = "INITIALIZE ANALYTICS";
            }
        }
    </script>
</body>
</html>
