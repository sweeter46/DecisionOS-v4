<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v7.1 | Prime</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #111; --accent: #0f8; --danger: #f47; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .dashboard { max-width: 900px; margin: 0 auto; background: var(--card); border-radius: 20px; padding: 30px; border: 1px solid #222; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        h1 { color: var(--accent); margin: 0; font-size: 28px; letter-spacing: -1px; }
        .status { font-family: 'JetBrains Mono'; font-size: 10px; color: #555; margin-bottom: 20px; text-transform: uppercase; }
        textarea { width: 100%; height: 100px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; padding: 15px; margin-bottom: 15px; box-sizing: border-box; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--accent); }
        button { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #fff; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; display: none; }
        .full { grid-column: 1 / -1; }
        .card { background: #181818; padding: 20px; border-radius: 12px; border: 1px solid #222; }
        .label { color: var(--accent); font-size: 10px; font-family: 'JetBrains Mono'; display: block; margin-bottom: 8px; }
        .tl-item { border-left: 2px solid var(--accent); padding-left: 15px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>DecisionOS</h1>
        <div class="status">KERNEL: <span id="st" style="color:#0f8">CORE_v7.1_READY</span></div>
        <textarea id="inp" placeholder="Senaryoyu detaylıca buraya girin..."></textarea>
        <button id="btn">ANALİZİ BAŞLAT</button>
        <div id="res" class="grid"></div>
    </div>

    <!-- JavaScript Başlangıcı -->
    <script>
        document.getElementById('btn').onclick = async function() {
            const userInput = document.getElementById('inp').value.trim();
            if(!userInput) return;

            const resDiv = document.getElementById('res');
            const statusText = document.getElementById('st');
            
            statusText.innerText = "YAPAY ZEKA ANALİZ EDİYOR (BU İŞLEM 30-60 SN SÜREBİLİR)...";
            statusText.style.color = "#0f8";
            resDiv.style.display = 'none';

            try {
                // RENDER ADRESİNİN DOĞRULUĞUNDAN EMİN OLUN
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: userInput })
                });

                const d = await response.json();

                if (d.status === "success") {
                    statusText.innerText = "STRATEJİK ANALİZ TAMAMLANDI";
                    resDiv.style.display = 'grid';
                    
                    let actHtml = "";
                    if(d.report.action_plan) {
                        d.report.action_plan.forEach(function(a) {
                            actHtml += '<div class="tl-item"><span style="font-size:13px; color:#ddd">' + a + '</span></div>';
                        });
                    }

                    resDiv.innerHTML = `
                        <div class="card full" style="border-left:4px solid #f47"><span class="label">NİHAİ KARAR</span><b style="font-size:17px">${d.report.final_decision}</b></div>
                        <div class="card"><span class="label">STRATEJİK ANALİZ</span><p style="font-size:13px;line-height:1.6;margin:0;color:#ccc">${d.report.analysis}</p></div>
                        <div class="card"><span class="label">AKSİYON PLANI</span>${actHtml}</div>
                        <div class="card full" style="background:rgba(255,71,87,0.05); border-color:#522"><span class="label" style="color:#f47">VETO KARARI</span><p style="font-size:13px;margin:0;color:#ffb8b8">${d.report.veto}</p></div>
                    `;
                } else if (d.status === "text") {
                    // Eğer AI doğrudan metin döndürdüyse
                    statusText.innerText = "ANALİZ TAMAMLANDI (DÜZ METİN)";
                    resDiv.style.display = 'block';
                    resDiv.innerHTML = `<div class="card full" style="white-space: pre-wrap;">${d.report}</div>`;
                } else {
                    // Hata durumu
                    statusText.innerText = "SİSTEM HATASI";
                    statusText.style.color = "#f47";
                    resDiv.style.display = 'block';
                    resDiv.innerHTML = `<div class="card full" style="color:#f47; font-family:monospace; font-size:12px;">HATA: ${d.report}</div>`;
                }
            } catch (e) {
                statusText.innerText = "SUNUCU BAĞLANTISI KESİLDİ";
                statusText.style.color = "#f47";
                console.error(e);
            }
        };
    </script>
</body>
</html>
