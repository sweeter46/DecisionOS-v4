<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v7.1 | Prime</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #111; --accent: #0f8; --danger: #f47; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .dashboard { max-width: 900px; margin: 0 auto; background: var(--card); border-radius: 20px; padding: 30px; border: 1px solid #222; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        h1 { color: var(--accent); margin: 0; font-size: 28px; letter-spacing: -1px; }
        .status { font-family: 'JetBrains Mono'; font-size: 10px; color: #555; margin-bottom: 20px; text-transform: uppercase; }
        textarea { width: 100%; height: 100px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; padding: 15px; margin-bottom: 15px; box-sizing: border-box; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--accent); }
        button { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #fff; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; display: none; }
        .full { grid-column: 1 / -1; }
        .card { background: #181818; padding: 20px; border-radius: 12px; border: 1px solid #222; }
        .label { color: var(--accent); font-size: 10px; font-family: 'JetBrains Mono'; display: block; margin-bottom: 8px; }
        .tl-item { border-left: 2px solid var(--accent); padding-left: 15px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>DecisionOS</h1>
        <div class="status">KERNEL: <span id="st" style="color:#0f8">CORE_v7.1_READY</span></div>
        <textarea id="inp" placeholder="Senaryoyu detaylıca buraya girin..."></textarea>
        <button id="btn">ANALİZİ BAŞLAT</button>
        <div id="res" class="grid"></div>
    </div>

    <!-- JavaScript Başlangıcı -->
    <script>
async function analyzeIncident() {
    const incidentText = document.getElementById('incidentInput').value;
    const resultArea = document.getElementById('resultArea');
    const brief = document.getElementById('brief');
    
    if (!incidentText) return alert("Lütfen bir senaryo girin.");

    resultArea.classList.remove('hidden');
    brief.innerHTML = '<div class="animate-pulse text-green-500">BOOTING DecisionOS v4.0... Veri paketleri analiz ediliyor...</div>';

    try {
        const response = await fetch('https://decisionos-api.onrender.com/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: incidentText })
        });

        const data = await response.json();
        let report;

        // EĞER VERİ JSON GEÇMİŞSE DOĞRUDAN KULLAN
        if (data.status === "success") {
            report = data.report;
        } else {
            // EĞER METİN GELMİŞSE (EKRAN GÖRÜNTÜSÜNDEKİ GİBİ), İÇİNDEKİ JSON'U BURADA AYIKLA
            const rawText = typeof data.report === 'string' ? data.report : JSON.stringify(data.report);
            const jsonMatch = rawText.match(/\{[\s\S]*\}/);
            if (jsonMatch) {
                report = JSON.parse(jsonMatch[0]);
            } else {
                brief.innerHTML = `<div class="p-4 text-red-400">KRİTİK HATA: Veri formatı dashboard'a uygun değil. <br> Gelen Yanıt: ${rawText}</div>`;
                return;
            }
        }

        // DASHBOARD ŞABLONU (DÜZENLİ GÖRÜNÜM)
        brief.innerHTML = `
            <div class="space-y-6">
                <div class="border-l-4 border-blue-500 pl-4 py-2 bg-blue-900 bg-opacity-20">
                    <div class="text-xs text-blue-400 font-bold mb-1">⚙️ BOOT LOG:</div>
                    <div class="text-sm italic">${report.boot_log}</div>
                </div>

                <div class="border-l-4 border-red-500 pl-4 py-2 bg-red-900 bg-opacity-20">
                    <div class="text-xs text-red-400 font-bold mb-1">🚨 NİHAİ KARAR:</div>
                    <div class="text-xl font-bold uppercase tracking-widest">${report.final_decision}</div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="p-3 border border-green-800 bg-black bg-opacity-50">
                        <div class="text-xs text-green-500 font-bold border-b border-green-800 mb-2 pb-1">UZMAN ANALİZİ:</div>
                        <div class="text-xs leading-relaxed opacity-90">${report.analysis}</div>
                    </div>
                    <div class="p-3 border border-yellow-800 bg-black bg-opacity-50">
                        <div class="text-xs text-yellow-500 font-bold border-b border-yellow-800 mb-2 pb-1">VETO & UYARI:</div>
                        <div class="text-xs leading-relaxed ${report.veto ? 'text-red-400 font-bold' : 'opacity-90'}">${report.veto || 'VETO YOK'}</div>
                    </div>
                </div>

                <div class="p-3 border border-green-800">
                    <div class="text-xs text-green-500 font-bold border-b border-green-800 mb-2 pb-1">🛠️ EYLEM PLANI:</div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                        <div class="text-[10px]"><span class="text-green-400">[0-1h]:</span> ${report.action_plan["0-1h"].join(", ")}</div>
                        <div class="text-[10px]"><span class="text-green-400">[1-24h]:</span> ${report.action_plan["1-24h"].join(", ")}</div>
                        <div class="text-[10px]"><span class="text-green-400">[24-72h]:</span> ${report.action_plan["24-72h"].join(", ")}</div>
                    </div>
                </div>
                
                <div class="text-[10px] opacity-40 italic border-t border-green-900 pt-2">
                    CONFIDENCE: %${(report.confidence * 100).toFixed(0)} | DISCLAIMER: ${report.disclaimer}
                </div>
            </div>
        `;

    } catch (error) {
        brief.innerHTML = `<div class="p-4 text-red-500">SYSTEM FAILURE: ${error.message}</div>`;
    }
}
    </script>
</body>
</html>
