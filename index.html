<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS | Neural Command</title>
    
    <!-- Modern Pro Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <!-- Kütüphaneler -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <style>
        :root {
            --apple-blue: #0071e3;
            --ai-purple: #8e2de2;
            --ai-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at top center, #1a1a2e 0%, #0a0a0a 100%);
            color: #f5f5f7;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            font-size: 2.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(to bottom, #ffffff, #a1a1a6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em;
        }

        .sub-header {
            text-align: center;
            color: #86868b;
            font-size: 0.9rem;
            margin-bottom: 40px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Apple Style Glass Panel */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 20px;
            border-radius: 16px;
            resize: none;
            box-sizing: border-box;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }

        textarea:focus {
            border-color: var(--apple-blue);
            background: rgba(0, 0, 0, 0.4);
        }

        .action-button {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .action-button:hover {
            transform: scale(1.02);
            background: #f5f5f7;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* Response Area Styles */
        .response-container {
            margin-top: 40px;
            display: none;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--apple-blue);
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 0.1em;
        }

        #resultArea {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #e8e8ed;
            white-space: pre-wrap;
        }

        .chart-box {
            margin-top: 30px;
            height: 300px;
        }

        #mathResult {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 113, 227, 0.05);
            border-radius: 12px;
            color: #fff;
            font-size: 1.2rem;
        }

        .status-pill {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(0, 255, 157, 0.1);
            color: #00ff9d;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="header">DecisionOS</h1>
        <p class="sub-header">Neural Intelligence v4.0</p>

        <div class="glass-panel">
            <textarea id="incidentInput" rows="4" placeholder="How can I help you with your decision today?"></textarea>
            <button class="action-button" onclick="analyzeIncident()">Generate Decision Brief</button>
        </div>

        <div id="responseContainer" class="response-container">
            <div class="card">
                <div class="status-pill">PROMETHEUS ENGINE ACTIVE</div>
                <div class="card-title">Neural Analysis Report</div>
                <div id="resultArea">Processing signals...</div>
                
                <div class="chart-box">
                    <canvas id="analysisChart"></canvas>
                </div>

                <div id="mathResult"></div>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;

        async function analyzeIncident() {
            const input = document.getElementById('incidentInput').value;
            const container = document.getElementById('responseContainer');
            const resultArea = document.getElementById('resultArea');
            const btn = document.querySelector('.action-button');

            if (!input) return;

            btn.innerText = "Analyzing...";
            btn.style.opacity = "0.7";
            
            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });

                const data = await response.json();
                
                btn.innerText = "Generate Decision Brief";
                btn.style.opacity = "1";
                container.style.display = "block";

                resultArea.innerText = data.analysis;

                if (data.math) {
                    katex.render(data.math, document.getElementById('mathResult'), { displayMode: true });
                }

                const ctx = document.getElementById('analysisChart').getContext('2d');
                if (myChart) myChart.destroy();

                myChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['0m', '10m', '20m', '30m', '40m', '50m'],
                        datasets: [{
                            label: 'Confidence Interval',
                            data: [30, 45, 60, 85, 70, 95],
                            borderColor: '#0071e3',
                            borderWidth: 3,
                            pointRadius: 0,
                            tension: 0.4,
                            fill: true,
                            backgroundColor: (context) => {
                                const ctx = context.chart.ctx;
                                const gradient = ctx.createLinearGradient(0, 0, 0, 300);
                                gradient.addColorStop(0, 'rgba(0, 113, 227, 0.3)');
                                gradient.addColorStop(1, 'rgba(0, 113, 227, 0)');
                                return gradient;
                            }
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { display: false },
                            x: { grid: { display: false }, ticks: { color: '#86868b' } }
                        }
                    }
                });

            } catch (error) {
                btn.innerText = "Generate Decision Brief";
                alert("Neural link failed.");
            }
        }
    </script>
</body>
</html>
