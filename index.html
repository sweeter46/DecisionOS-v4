<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v5.0 | AI Decision Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Plus+Jakarta+Sans:wght@700&display=swap');
        
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(23, 32, 53, 0.6);
            --accent-color: #6366f1; /* Indigo AI Color */
            --text-main: #f1f5f9;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0b0f19);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100 screen;
        }

        h1 { font-family: 'Plus Jakarta Sans', sans-serif; }

        /* Glassmorphism Effect */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .ai-input {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(99, 102, 241, 0.2);
            transition: all 0.3s ease;
        }

        .ai-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.15);
            outline: none;
        }

        .ai-button {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .ai-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);
        }

        .decision-badge {
            background: linear-gradient(90deg, #ef4444, #f43f5e);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        /* Modern Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-12">
    
    <div class="max-w-5xl mx-auto">
        <!-- HEADER -->
        <header class="mb-12 flex flex-col md:flex-row justify-between items-end md:items-center gap-4">
            <div>
                <h1 class="text-4xl font-bold tracking-tight">Decision<span class="text-indigo-400">OS</span></h1>
                <p class="text-slate-400 text-sm mt-1 font-light tracking-wide italic">Next-Gen Decision Intelligence System</p>
            </div>
            <div class="flex items-center gap-3 bg-slate-800 bg-opacity-40 px-4 py-2 rounded-full border border-slate-700">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span id="conn-status" class="text-[11px] font-medium tracking-widest text-slate-300">SYSTEM: ONLINE</span>
            </div>
        </header>

        <!-- MAIN LAYOUT -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- INPUT (LEFT SIDE) -->
            <div class="lg:col-span-12">
                <div class="glass-panel p-8">
                    <h2 class="text-sm font-semibold text-indigo-300 mb-4 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                        NEW INCIDENT ANALYSIS
                    </h2>
                    <textarea id="incidentInput" class="w-full h-32 ai-input p-5 rounded-2xl text-slate-200 text-base leading-relaxed mb-6" placeholder="Describe the crisis or decision scenario in detail..."></textarea>
                    <button onclick="analyzeIncident()" id="actionBtn" class="w-full py-4 rounded-xl ai-button text-white font-semibold text-lg flex justify-center items-center gap-3">
                        GENERATE ANALYSIS
                    </button>
                </div>
            </div>

            <!-- RESULT (SHOWN ON SUCCESS) -->
            <div id="resultArea" class="hidden lg:col-span-12 animate-in fade-in slide-in-from-bottom-8 duration-700">
                <div id="brief" class="space-y-8">
                    <!-- Dashboard AI Generated Content -->
                </div>
            </div>
        </div>
    </div>

    <script>
        async function analyzeIncident() {
            const inputField = document.getElementById('incidentInput');
            const incidentText = inputField.value;
            const resultArea = document.getElementById('resultArea');
            const brief = document.getElementById('brief');
            const actionBtn = document.getElementById('actionBtn');
            const connStatus = document.getElementById('conn-status');
            
            if (!incidentText.trim()) return;

            actionBtn.disabled = true;
            actionBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                AI KERNEL ANALYZING...`;

            resultArea.classList.remove('hidden');
            brief.innerHTML = `
                <div class="glass-panel p-12 text-center">
                    <div class="flex justify-center mb-6">
                        <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                    </div>
                    <p class="text-indigo-200 text-lg font-light italic">Synthesizing multiple experts and strategic frameworks...</p>
                </div>
            `;

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: incidentText })
                });

                const data = await response.json();
                let report = null;

                try {
                    let rawReport = data.report;
                    if (typeof rawReport === 'string') {
                        let cleaned = rawReport.trim();
                        if (cleaned.startsWith('"') && cleaned.endsWith('"')) cleaned = cleaned.substring(1, cleaned.length - 1);
                        cleaned = cleaned.replace(/\\r/g, "").replace(/\\n/g, "\n").replace(/\\"/g, '"').replace(/\\\\/g, "\\");
                        const jsonMatch = cleaned.match(/\{[\s\S]*\}/);
                        report = jsonMatch ? JSON.parse(jsonMatch[0]) : JSON.parse(cleaned);
                    } else report = rawReport;
                } catch (e) {
                    brief.innerHTML = `<div class="glass-panel p-8 text-red-400">Analysis parsing failed. Raw data received.</div>`;
                    return;
                }

                const safeJoin = (arr) => Array.isArray(arr) ? arr.join(" • ") : (arr || "Pending");

                // FINAL MINIMAL DASHBOARD
                brief.innerHTML = `
                    <div class="space-y-8 fade-in-ready">
                        
                        <!-- HERO DECISION CARD -->
                        <div class="glass-panel p-10 relative overflow-hidden border-t-4 border-indigo-500">
                            <div class="flex flex-col items-center text-center">
                                <span class="bg-indigo-500 bg-opacity-10 text-indigo-400 px-4 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase mb-4">Final Strategic Verdict</span>
                                <h2 class="text-5xl font-extrabold tracking-tighter text-white mb-6 uppercase">${report.final_decision}</h2>
                                <p class="text-slate-400 text-sm max-w-2xl leading-relaxed">${report.analysis}</p>
                            </div>
                        </div>

                        <!-- SUB-DETAILS -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <!-- ACTION PLAN -->
                            <div class="glass-panel p-8">
                                <h3 class="text-indigo-400 text-xs font-bold uppercase tracking-widest mb-6 border-b border-white border-opacity-10 pb-3">Operational Roadmap</h3>
                                <div class="space-y-6">
                                    <div class="flex gap-4">
                                        <div class="h-10 w-1 pt-1 bg-indigo-500 rounded-full"></div>
                                        <div>
                                            <p class="text-[10px] text-slate-500 font-bold">IMMEDIATE (0-1h)</p>
                                            <p class="text-sm text-slate-200 mt-1">${safeJoin(report.action_plan?.["0-1h"])}</p>
                                        </div>
                                    </div>
                                    <div class="flex gap-4">
                                        <div class="h-10 w-1 pt-1 bg-slate-600 rounded-full"></div>
                                        <div>
                                            <p class="text-[10px] text-slate-500 font-bold">SHORT-TERM (1-24h)</p>
                                            <p class="text-sm text-slate-200 mt-1">${safeJoin(report.action_plan?.["1-24h"])}</p>
                                        </div>
                                    </div>
                                    <div class="flex gap-4">
                                        <div class="h-10 w-1 pt-1 bg-slate-800 rounded-full"></div>
                                        <div>
                                            <p class="text-[10px] text-slate-500 font-bold">STRATEGIC (24-72h)</p>
                                            <p class="text-sm text-slate-200 mt-1">${safeJoin(report.action_plan?.["24-72h"])}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- RISK & VETO -->
                            <div class="glass-panel p-8 bg-opacity-40">
                                <h3 class="text-rose-400 text-xs font-bold uppercase tracking-widest mb-6 border-b border-white border-opacity-10 pb-3">Risk Assessment & Veto</h3>
                                <div class="mb-6">
                                    <p class="text-[10px] text-slate-500 font-bold border-l-2 border-rose-500 pl-2 mb-2">CRITICAL VETO</p>
                                    <p class="text-sm text-rose-200 font-medium">${report.veto || 'No blocking veto detected.'}</p>
                                </div>
                                <div>
                                    <p class="text-[10px] text-slate-500 font-bold border-l-2 border-indigo-500 pl-2 mb-2">SYSTEM BOOT LOG</p>
                                    <p class="text-[11px] text-slate-400 italic font-light">${report.boot_log}</p>
                                </div>
                                <div class="mt-8 pt-6 border-t border-white border-opacity-5 flex justify-between items-center text-[10px] text-slate-500">
                                    <span>CONFIDENCE: ${(report.confidence * 100).toFixed(0)}%</span>
                                    <span class="italic max-w-[60%] text-right">${report.disclaimer || ''}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

            } catch (error) {
                brief.innerHTML = `<div class="glass-panel p-8 text-rose-500">System Error: ${error.message}</div>`;
            } finally {
                actionBtn.disabled = false;
                actionBtn.innerHTML = "GENERATE ANALYSIS";
            }
        }
    </script>
</body>
</html>
