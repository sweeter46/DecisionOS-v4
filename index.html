<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v4.0 - Prometheus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>DecisionOS <span>v4.0 Prometheus</span></h1>
            <p>Sistem Durumu: ÇEVRİMİÇİ | Risk Seviyesi: İzleniyor</p>
        </header>

        <main class="input-section">
            <textarea id="incidentInput" placeholder="Acil durum senaryosunu veya olayı buraya girin..."></textarea>
            <button id="startBtn">PROTOKOLÜ BAŞLAT</button>
        </main>

        <div id="resultArea" class="result-area hidden">
            <div class="boot-log" id="bootLog"></div>
            
            <div class="decision-box">
                <h3>🚨 NİHAİ KARAR: <span id="finalDecision"></span></h3>
                <p id="analysisText"></p>
            </div>

            <div class="action-plan-box">
                <h4>🛠️ EYLEM PLANI (SAVAŞ KABİNESİ)</h4>
                <ul id="actionPlanList"></ul>
            </div>

            <div class="veto-box">
                <p>⚠️ <strong>VETO KARARI:</strong> <span id="vetoText"></span></p>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const startBtn = document.getElementById('startBtn');
        const textArea = document.querySelector('textarea');
        const bootLog = document.getElementById('bootLog');
        const resultArea = document.getElementById('resultArea');

        startBtn.addEventListener('click', async () => {
            const userInput = textArea.value.trim();
            
            console.log("1. ADIM: Buton tetiklendi. Metin:", userInput);

            if (userInput.length < 5) {
                alert("Lütfen en az 5 karakterlik bir olay girin!");
                return;
            }

            // Arayüzü hazırla
            resultArea.classList.remove('hidden');
            bootLog.innerText = "⚙️ Protokol başlatılıyor... Sunucuya bağlanılıyor...";

            try {
                console.log("2. ADIM: Fetch isteği yola çıkıyor...");
                
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: userInput })
                });

                console.log("3. ADIM: Sunucudan cevap geldi. Durum:", response.status);

                if (!response.ok) {
                    throw new Error("Sunucu hata döndürdü: " + response.status);
                }

                const data = await response.json();
                console.log("4. ADIM: Veri başarıyla çözüldü:", data);

                // Ekrana Yazdırma
                bootLog.innerText = data.boot_log;
                document.getElementById('finalDecision').innerText = data.final_decision;
                document.getElementById('analysisText').innerText = data.analysis;
                document.getElementById('vetoText').innerText = data.veto;

                const actionPlanList = document.getElementById('actionPlanList');
                actionPlanList.innerHTML = "";
                data.action_plan.forEach(item => {
                    let li = document.createElement("li");
                    li.innerText = item;
                    actionPlanList.appendChild(li);
                });

            } catch (error) {
                console.error("KRİTİK HATA:", error);
                bootLog.innerText = "❌ HATA: " + error.message;
            }
        });
    });
</script>
</body>
</html>
