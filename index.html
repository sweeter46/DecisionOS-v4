<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v4.0 - Prometheus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>DecisionOS <span>v4.0 Prometheus</span></h1>
            <p>Sistem Durumu: ÇEVRİMİÇİ | Risk Seviyesi: İzleniyor</p>
        </header>

        <main class="input-section">
            <textarea id="incidentInput" placeholder="Acil durum senaryosunu veya olayı buraya girin..."></textarea>
            <button id="startBtn">PROTOKOLÜ BAŞLAT</button>
        </main>

        <div id="resultArea" class="result-area hidden">
            <div class="boot-log" id="bootLog"></div>
            
            <div class="decision-box">
                <h3>🚨 NİHAİ KARAR: <span id="finalDecision"></span></h3>
                <p id="analysisText"></p>
            </div>

            <div class="action-plan-box">
                <h4>🛠️ EYLEM PLANI (SAVAŞ KABİNESİ)</h4>
                <ul id="actionPlanList"></ul>
            </div>

            <div class="veto-box">
                <p>⚠️ <strong>VETO KARARI:</strong> <span id="vetoText"></span></p>
            </div>
        </div>
    </div>

    <script>
                document.addEventListener('DOMContentLoaded', () => {
            const startBtn = document.getElementById('startBtn');
            const textArea = document.querySelector('textarea');
            const bootLog = document.getElementById('bootLog');
            const resultArea = document.getElementById('resultArea');
            const analysisText = document.getElementById('analysisText'); // undefined yazan yer

            startBtn.addEventListener('click', async () => {
                const userInput = textArea.value.trim();
                if (userInput.length < 5) return alert("Lütfen metin girin.");

                resultArea.classList.remove('hidden');
                bootLog.innerText = "⚙️ Protokol Başlatıldı. AI Verisi Sentezleniyor...";
                analysisText.innerText = "AI cevap üretiyor, bu işlem 5-10 saniye sürebilir...";

                try {
                    const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: userInput })
                    });

                    const data = await response.json();
                    console.log("Sunucudan Gelen Ham Veri:", data);

                    // --- GARANTİCİ VERİ OKUMA ---
                    // Eğer data.raw_ai_answer yoksa, gelen objenin içindeki ilk değeri bulmaya çalış
                    const finalContent = data.raw_ai_answer || data.result || Object.values(data)[0];

                    bootLog.innerText = "⚙️ ANALİZ TAMAMLANDI";
                    document.getElementById('finalDecision').innerText = "STRATEJİK RAPOR OLUŞTURULDU";
                    
                    // Eğer gelen veri hala undefined ise hata mesajı bas
                    analysisText.innerText = finalContent || "Cevap formatı çözülemedi, ancak bağlantı başarılı!";
                    
                    document.getElementById('actionPlanList').innerHTML = "<li>Aksiyon planı yukarıdaki raporun içindedir.</li>";
                    document.getElementById('vetoText').innerText = "Rapor içeriğini inceleyin.";

                } catch (error) {
                    console.error("HATA:", error);
                    analysisText.innerText = "Bağlantı Hatası: Sunucuya ulaşılamadı.";
                }
            });
        });
    </script>
</body>
</html>
