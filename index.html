<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v4.0 Prometheus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0c; --card: #141417; --accent: #00ff88; --text: #e1e1e6; --danger: #ff4757; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .dashboard { width: 90%; max-width: 900px; background: var(--card); border-radius: 20px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid #2d2d35; }
        h1 { color: var(--accent); font-weight: 600; letter-spacing: -1px; margin-bottom: 5px; }
        #statusLight { font-size: 10px; color: #555; margin-bottom: 15px; font-family: 'JetBrains Mono'; }
        textarea { width: 100%; height: 120px; background: #1c1c21; border: 1px solid #333; border-radius: 12px; color: white; padding: 15px; font-family: inherit; resize: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--accent); color: black; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 15px; }
        .result-container { margin-top: 30px; padding: 20px; background: #1c1c21; border-radius: 12px; border-left: 4px solid var(--accent); display: none; }
        .report-section { margin-bottom: 25px; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 8px; border-left: 3px solid #333; }
        .section-title { color: var(--accent); font-family: 'JetBrains Mono'; font-size: 11px; text-transform: uppercase; margin-bottom: 10px; display: block; border-bottom: 1px solid #2d2d35; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>DecisionOS</h1>
        <div id="statusLight">● SINYAL: <span id="statusText">V4.2.0 - SECURE LINK</span></div>
        <textarea id="userInput" placeholder="Kriz senaryosunu buraya girin..."></textarea>
        <button id="startBtn">PROTOKOLÜ TETİKLE</button>
        <div id="resultArea" class="result-container">
            <div id="reportContent">Analiz sentezleniyor...</div>
        </div>
    </div>

    <script>
            const startBtn = document.getElementById('startBtn');
            const userInput = document.getElementById('userInput');
            const resultArea = document.getElementById('resultArea');
            const reportContent = document.getElementById('reportContent');
            const statusText = document.getElementById('statusText');

            startBtn.addEventListener('click', async () => {
                const text = userInput.value.trim();
                if (text.length < 5) return alert("Lütfen bir senaryo giriniz.");

                // Arayüzü hazırla
                resultArea.style.display = 'block';
                statusText.innerText = "SENTEZLENİYOR...";
                statusText.style.color = "#ffaa00";
                reportContent.innerHTML = "<p style='color:#888; font-family:JetBrains Mono;'>Protokol aktif. Strateji raporu AI Core üzerinden inşa ediliyor...</p>";

                try {
                    const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: text })
                    });
                    
                    const data = await response.json();

                    if (data.is_json) {
                        const r = data.report;
                        statusText.innerText = "ONLINE - ANALİZ BAŞARILI";
                        statusText.style.color = "#00ff88";
                        
                        // ŞAMPİYONLUK TASARIMI: Sadece temizlenmiş kutuları basıyoruz
                        reportContent.innerHTML = `
                            <div style="border-left:4px solid #00ff88; padding:15px; background:rgba(0,255,136,0.05); margin-bottom:20px; border-radius:8px;">
                                <strong style="color:#00ff88; display:block; font-size:11px; margin-bottom:8px; font-family:'JetBrains Mono'; text-transform:uppercase;">🚨 NİHAİ KARAR</strong>
                                <p style="margin:0; font-weight:600; font-size:15px; color:#fff; line-height:1.5;">${r.final_decision}</p>
                            </div>

                            <div style="border-left:4px solid #888; padding:15px; background:rgba(255,255,255,0.02); margin-bottom:20px; border-radius:8px;">
                                <strong style="color:#888; display:block; font-size:11px; margin-bottom:8px; font-family:'JetBrains Mono'; text-transform:uppercase;">📊 STRATEJİK ANALİZ</strong>
                                <p style="margin:0; font-size:14px; line-height:1.7; color:#ccc;">${r.analysis}</p>
                            </div>

                            <div style="border-left:4px solid #00ff88; padding:15px; background:rgba(255,255,255,0.02); margin-bottom:20px; border-radius:8px;">
                                <strong style="color:#00ff88; display:block; font-size:11px; margin-bottom:8px; font-family:'JetBrains Mono'; text-transform:uppercase;">🛠️ AKSİYON PLANI</strong>
                                <ul style="margin:10px 0 0 0; padding-left:20px; font-size:14px; color:#ddd;">
                                    ${r.action_plan.map(item => `<li style="margin-bottom:12px; line-height:1.5;">${item}</li>`).join('')}
                                </ul>
                            </div>

                            <div style="border-left:4px solid #ff4757; padding:15px; background:rgba(255,71,87,0.05); border-radius:8px;">
                                <strong style="color:#ff4757; display:block; font-size:11px; margin-bottom:8px; font-family:'JetBrains Mono'; text-transform:uppercase;">⚠️ KRİTİK VETO</strong>
                                <p style="margin:0; font-size:14px; color:#ffb8b8; line-height:1.5;">${r.veto}</p>
                            </div>
                        `;
                    } else {
                        // Eğer veri bir şekilde JSON değilse, düz metni şık bir kutuda göster
                        statusText.innerText = "ONLINE - ANALİZ HAZIR";
                        statusText.style.color = "#00ff88";
                        reportContent.innerHTML = `
                            <div style="padding:20px; background:rgba(255,255,255,0.03); border-radius:8px; white-space:pre-wrap; font-size:14px; line-height:1.7; color:#ccc; border:1px solid #2d2d35;">
                                ${data.report}
                            </div>
                        `;
                    }

                } catch (error) {
                    statusText.innerText = "BAĞLANTI HATASI";
                    statusText.style.color = "#ff4757";
                    reportContent.innerHTML = "<p style='color:#ff4757;'>Sunucuyla bağlantı kurulamadı. Lütfen Render sunucusunun 'Live' olduğundan emin olun.</p>";
                }
            });
    </script>
</body>
</html>
