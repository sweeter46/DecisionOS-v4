<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS | Geometry Neural Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <style>
        :root { --apple-blue: #0071e3; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 40px 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 850px; }
        h1 { font-size: 2.8rem; font-weight: 700; text-align: center; margin-bottom: 10px; letter-spacing: -2px; }
        .sub { text-align: center; color: #86868b; font-size: 0.9rem; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }
        .glass-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 30px; margin-bottom: 40px; backdrop-filter: blur(20px); }
        textarea { width: 100%; background: transparent; border: none; color: #fff; font-size: 1.2rem; outline: none; resize: none; text-align: center; font-family: inherit; }
        button { width: 100%; background: #fff; color: #000; border: none; border-radius: 40px; padding: 18px; font-weight: 700; cursor: pointer; margin-top: 20px; transition: 0.3s; font-size: 1rem; }
        button:hover { transform: scale(1.02); background: #f5f5f7; }
        
        .result-flow { display: none; animation: fadeIn 1s ease; }
        .block { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; padding: 40px; margin-bottom: 25px; }
        .tag { display: inline-block; padding: 4px 12px; background: rgba(0,113,227,0.15); color: var(--apple-blue); border-radius: 20px; font-size: 0.75rem; font-weight: 800; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin: 25px 0; }
        th { text-align: left; color: #86868b; font-size: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; }
        td { padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.95rem; }
        .chart-holder { height: 350px; margin: 30px 0; }
        #mathBox { font-size: 1.8rem; text-align: center; margin: 30px 0; color: #fff; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>DecisionOS</h1>
        <p class="sub">Neural Exam Intelligence</p>
        
        <div class="glass-box">
            <textarea id="userInput" rows="2" placeholder="Geometri sorusu veya konu başlığı girin..."></textarea>
            <button onclick="generateExam()">Generate Geometry Problem</button>
        </div>
        
        <div id="resultFlow" class="result-flow"></div>
    </div>

    <script>
        let myChart = null;

        async function generateExam() {
            const input = document.getElementById('userInput').value;
            if(!input) return;
            const flow = document.getElementById('resultFlow');
            const btn = document.querySelector('button');
            
            btn.innerText = "Generating Problems...";
            
            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                
                flow.innerHTML = `
                    <div class="block">
                        <div class="tag">PROBLEM STATEMENT</div>
                        <h2 style="margin-top:0;">${data.title}</h2>
                        <p style="color:#a1a1a6; font-size:1.1rem; line-height:1.6;">${data.description}</p>
                        
                        <table>
                            <thead><tr><th>BİLEŞEN</th><th>KOORDİNAT / DEĞER</th></tr></thead>
                            <tbody>
                                ${data.table_data.map(row => `
                                    <tr><td>${row.Bileşen}</td><td>${row.Değer}</td></tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>

                    <div class="block">
                        <div class="tag">SPATIAL VISUALIZATION</div>
                        <div class="chart-holder"><canvas id="geoChart"></canvas></div>
                    </div>

                    <div class="block">
                        <div class="tag">MATHEMATICAL SOLUTION</div>
                        <div id="mathBox"></div>
                        <p style="color:#86868b; text-align:center; font-style:italic;">${data.analysis}</p>
                    </div>
                `;
                
                flow.style.display = 'block';
                btn.innerText = "Generate Geometry Problem";

                if(data.math_formula) {
                    katex.render(data.math_formula, document.getElementById('mathBox'), { displayMode: true });
                }

                const ctx = document.getElementById('geoChart').getContext('2d');
                if(myChart) myChart.destroy();
                myChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.chart_labels,
                        datasets: [{
                            data: data.chart_values,
                            borderColor: '#0071e3',
                            backgroundColor: 'rgba(0, 113, 227, 0.2)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 6,
                            pointBackgroundColor: '#fff'
                        }]
                    },
                    options: { 
                        maintainAspectRatio: false, 
                        plugins: { legend: { display: false } },
                        scales: { 
                            y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#86868b' } },
                            x: { grid: { display: false }, ticks: { color: '#86868b' } }
                        }
                    }
                });

            } catch (e) {
                alert("Neural link failed. Check Render server.");
                btn.innerText = "Generate Geometry Problem";
            }
        }
    </script>
</body>
</html>
