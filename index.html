<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DecisionOS v10.5 | Final Singularity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 3rem; }
        .chart-box { background: #000; padding: 2.5rem; border-radius: 3.5rem; margin: 2rem 0; border: 2px solid rgba(99, 102, 241, 0.3); min-height: 400px; }
        .btn-main { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); transition: 0.5s; }
        .btn-main:hover { transform: translateY(-8px); box-shadow: 0 30px 60px rgba(99, 102, 241, 0.5); }
    </style>
</head>
<body class="p-6 md:p-12 lg:p-24 italic">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-24">
            <h1 class="text-7xl font-black tracking-tighter">Decision<span class="text-indigo-500">OS</span></h1>
            <div class="glass px-8 py-3 text-indigo-400 text-[10px] font-black uppercase tracking-[0.5em] border-indigo-500/30">FINAL_STABLE: v10.5</div>
        </header>

        <section class="glass p-12 mb-24 shadow-3xl">
            <textarea id="incidentInput" class="w-full h-48 bg-transparent text-slate-100 text-4xl outline-none resize-none placeholder:text-slate-900 font-light" placeholder="Operasyon hedefi girin..."></textarea>
            <button onclick="analyzeIncident()" id="actionBtn" class="w-full py-10 rounded-[3rem] btn-main text-white font-black text-4xl mt-12 shadow-2xl uppercase tracking-tighter">EXECUTE STRATEGIC ANALYSIS</button>
        </section>

        <div id="resultArea" class="hidden"></div>
    </div>

    <script>
        // MANUEL GRAFİK KURUCU (JSON.parse bağımlılığını öldüren teknoloji)
        const ultraRender = (text) => {
            if (!text) return "";
            
            let raw = text.toString().replace(/<br\s*\/?>/gi, " ");
            let chartHtml = "";

            // Grafiği "type", "labels" ve "data" kelimelerinden yakala
            if (raw.includes("type") && raw.includes("data")) {
                const id = "chart-" + Math.random().toString(36).substr(2, 5);
                chartHtml = `<div class="chart-box"><canvas id="${id}"></canvas></div>`;
                
                // Regex ile verileri JSON'dan bağımsız çek
                const labelsMatch = raw.match(/labels\s*:\s*\[([\s\S]*?)\]/);
                const dataMatch = raw.match(/data\s*:\s*\[([\s\S]*?)\]/);
                
                if (labelsMatch && dataMatch) {
                    setTimeout(() => {
                        try {
                            const ctx = document.getElementById(id).getContext('2d');
                            // Verileri array'e çevir (tırnak ve boşlukları temizle)
                            const labels = labelsMatch[1].split(",").map(item => item.trim().replace(/['"]/g, ""));
                            const data = dataMatch[1].split(",").map(item => parseFloat(item.trim()));

                            new Chart(ctx, {
                                type: 'line',
                                data: {
                                    labels: labels,
                                    datasets: [{
                                        label: 'Analiz Verisi',
                                        data: data,
                                        borderColor: '#6366f1',
                                        backgroundColor: 'rgba(99, 102, 241, 0.2)',
                                        tension: 0.4,
                                        fill: true,
                                        borderWidth: 4
                                    }]
                                },
                                options: {
                                    responsive: true,
                                    maintainAspectRatio: false,
                                    plugins: { legend: { display: false } },
                                    scales: {
                                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                                    }
                                }
                            });
                        } catch(e) { console.error("Chart Build Error:", e); }
                    }, 1000);
                }
            }

            // Metin temizleme
            let finalOutput = raw.replace(/\{[\s\S]*?\}/g, "").replace(/[\[\]\"\$]/g, "").trim();
            return chartHtml + `<div class="mt-12 text-slate-300 text-3xl font-light leading-relaxed opacity-90">${finalOutput}</div>`;
        };

        async function analyzeIncident() {
            const input = document.getElementById('incidentInput').value;
            const resArea = document.getElementById('resultArea');
            const btn = document.getElementById('actionBtn');
            if(!input.trim()) return;

            btn.disabled = true;
            resArea.classList.remove('hidden');
            resArea.innerHTML = `<div class="glass p-40 text-center animate-pulse text-indigo-500 font-black uppercase text-3xl tracking-[1em]">SYSTEM SYNC ACTIVE...</div>`;

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                const report = data.report || {};

                resArea.innerHTML = `
                    <div id="report-content" class="glass p-20 lg:p-32 border-t-[16px] border-indigo-600 shadow-3xl">
                        <div class="flex justify-between items-center mb-24">
                            <h2 class="text-7xl font-black italic uppercase tracking-tighter italic text-white">${report.final_decision || "TACTICAL REPORT"}</h2>
                            <button onclick="downloadPDF()" class="px-12 py-5 bg-indigo-600 text-white rounded-full text-xs font-black uppercase no-print hover:scale-110 transition-all shadow-3xl">EXPORT</button>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
                            <div class="lg:col-span-8">${ultraRender(report.analysis || "")}</div>
                            <div class="lg:col-span-4 italic">
                                <div class="glass p-12 sticky top-24 bg-indigo-950/20 border-white/10 shadow-3xl text-center">
                                    <div class="text-[12px] font-black text-indigo-500 mb-8 uppercase tracking-[0.4em]">Confidence</div>
                                    <div class="text-9xl font-black text-white mb-12">${((report.confidence || 0.95)*100).toFixed(0)}%</div>
                                    <div class="w-full bg-slate-950 h-3 rounded-full overflow-hidden">
                                        <div class="bg-indigo-500 h-full shadow-[0_0_40px_rgba(99,102,241,1)]" style="width:${(report.confidence || 0.95)*100}%"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (e) {
                resArea.innerHTML = `<div class="p-32 glass text-red-500 text-center font-black">FATAL_SYNC_ERROR: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        function downloadPDF() {
            const element = document.getElementById('report-content');
            html2pdf().set({ margin: 0.5, filename: 'DecisionOS_Final_Report.pdf', html2canvas: { scale: 2, backgroundColor: '#020617' } }).from(element).save();
        }
    </script>
</body>
</html>
