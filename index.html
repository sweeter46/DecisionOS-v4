<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v8.2 | Final Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
        .chart-box { background: #000; padding: 2rem; border-radius: 2.5rem; margin: 2rem 0; border: 1px solid rgba(99, 102, 241, 0.3); }
        .data-table { width: 100%; margin: 2rem 0; border-collapse: collapse; border-radius: 1rem; overflow: hidden; }
        .data-table th { background: #4338ca; padding: 12px; color: white; text-align: left; font-size: 0.75rem; text-transform: uppercase; }
        .data-table td { background: rgba(255,255,255,0.03); padding: 12px; border: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .btn-main { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); transition: 0.3s; }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body class="p-6 md:p-12 lg:p-20">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-16">
            <h1 class="text-6xl font-black tracking-tighter">Decision<span class="text-indigo-500">OS</span></h1>
            <div class="glass px-6 py-2 text-emerald-400 text-[10px] uppercase font-black">Sync: Stable</div>
        </header>

        <section class="glass p-8 md:p-12 mb-16 shadow-2xl">
            <textarea id="incidentInput" class="w-full h-40 bg-transparent text-slate-200 text-2xl outline-none resize-none" placeholder="Görevi buraya girin..."></textarea>
            <button onclick="analyzeIncident()" id="actionBtn" class="w-full py-6 rounded-3xl btn-main text-white font-black text-2xl mt-8">Execute Analysis</button>
        </section>

        <div id="resultArea" class="hidden"></div>
    </div>

    <script>
        const ultraRender = (text) => {
            if (!text) return "";
            let clean = text.replace(/\\n/g, "\n").replace(/\\"/g, '"');

            // 1. GRAFİK YAKALAYICI
            const chartMatch = clean.match(/\{[\s\S]*?"type"\s*:\s*"(?:line|bar)"[\s\S]*?\}/);
            if (chartMatch) {
                const id = "chart-" + Math.random().toString(36).substr(2, 5);
                const config = chartMatch[0];
                setTimeout(() => {
                    try { new Chart(document.getElementById(id), JSON.parse(config)); } 
                    catch(e) { console.error("Chart Error"); }
                }, 1000);
                clean = clean.replace(config, `<div class="chart-box"><canvas id="${id}"></canvas></div>`);
            }

            // 2. TABLO YAKALAYICI
            clean = clean.replace(/(?:^|\n)((?:\|.+?\|(?:\n|$))+)/g, (match, table) => {
                const rows = table.trim().split("\n").filter(r => r.includes("|") && !r.includes("---"));
                const h = rows[0].split("|").filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join("");
                const b = rows.slice(1).map(r => `<tr>${r.split("|").filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join("")}</tr>`).join("");
                return `<div class="overflow-x-auto"><table class="data-table"><thead><tr>${h}</tr></thead><tbody>${b}</tbody></table></div>`;
            });

            return clean.replace(/\n/g, "<​br>").replace(/```/g, "");
        };

        async function analyzeIncident() {
            const input = document.getElementById('incidentInput').value;
            const resArea = document.getElementById('resultArea');
            const btn = document.getElementById('actionBtn');
            if(!input.trim()) return;

            btn.disabled = true;
            resArea.classList.remove('hidden');
            resArea.innerHTML = `<div class="glass p-20 text-center animate-pulse text-indigo-500 font-black">CORE ENGINE SYNCING...</div>`;

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                const report = data.report;

                resArea.innerHTML = `
                    <div id="report-content" class="glass p-12 border-t-8 border-indigo-600 shadow-2xl">
                        <div class="flex justify-between items-center mb-10">
                            <h2 class="text-4xl font-black italic">${report.final_decision}</h2>
                            <button onclick="downloadPDF()" class="px-6 py-2 bg-indigo-500 text-white rounded-full text-[10px] no-print">Export</button>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                            <div class="lg:col-span-8 text-slate-300 text-xl leading-relaxed">
                                ${ultraRender(report.analysis)}
                            </div>
                            <div class="lg:col-span-4">
                                <div class="glass p-8 sticky top-10">
                                    <div class="text-[10px] font-black text-indigo-500 uppercase mb-4">Confidence</div>
                                    <div class="text-6xl font-black text-white mb-6">${((report.confidence || 0.95)*100).toFixed(0)}%</div>
                                    <div class="w-full bg-slate-900 h-2 rounded-full overflow-hidden">
                                        <div class="bg-indigo-500 h-full" style="width:${(report.confidence || 0.95)*100}%"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (e) {
                resArea.innerHTML = `<div class="p-10 text-red-500">Error: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        function downloadPDF() {
            const element = document.getElementById('report-content');
            html2pdf().set({ margin: 0.5, filename: 'DecisionOS_Report.pdf' }).from(element).save();
        }
    </script>
</body>
</html>
