<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DecisionOS v7.0 | Fixed</title>
    <style>
        :root { --bg: #050505; --card: #111; --accent: #0f8; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 20px; }
        .dashboard { max-width: 800px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #333; }
        textarea { width: 100%; height: 100px; background: #000; color: #fff; border: 1px solid #444; border-radius: 10px; margin-bottom: 20px; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; display: none; }
        .full { grid-column: 1 / -1; }
        .card { background: #181818; padding: 15px; border-radius: 10px; border: 1px solid #222; }
        .label { color: var(--accent); font-size: 11px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>DecisionOS</h1>
        <p id="st" style="font-size:12px; color:#555">SİSTEM HAZIR</p>
        <textarea id="inp" placeholder="Senaryoyu girin..."></textarea>
        <button id="btn">ANALİZİ BAŞLAT</button>
        <div id="res" class="grid"></div>
    </div>
    <script>
        document.getElementById('btn').onclick = async function() {
            const t = document.getElementById('inp').value;
            const res = document.getElementById('res');
            const st = document.getElementById('st');
            
            st.innerText = "İŞLENİYOR...";
            res.style.display = 'none';

            try {
                // KESİN URL: Render üzerindeki adresin bu olduğundan emin ol
                const r = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: t })
                });
                const d = await r.json();

                if (d.status === "success" || d.status === "text") {
                    st.innerText = "ANALİZ TAMAMLANDI";
                    res.style.display = 'grid';
                    
                    // Eğer d.report bir objeyse (success durumu)
                    if (typeof d.report === 'object') {
                        res.innerHTML = `
                            <div class="card full"><span class="label">NİHAİ KARAR</span><b>${d.report.final_decision}</b></div>
                            <div class="card"><span class="label">ANALİZ</span>${d.report.analysis}</div>
                            <div class="card"><span class="label">AKSİYON PLANI</span>${d.report.action_plan.join('<br>')}</div>
                            <div class="card full"><span class="label">VETO</span>${d.report.veto}</div>
                        `;
                    } else {
                        // Eğer düz metinse (text durumu)
                        res.innerHTML = `<div class="card full">${d.report}</div>`;
                    }
                } else {
                    st.innerText = "HATA OLUŞTU";
                    res.style.display = 'block';
                    res.innerHTML = `<div class="card full">Hata Mesajı: ${JSON.stringify(d.report)}</div>`;
                }
            } catch (e) { 
                st.innerText = "BAĞLANTI KESİLDİ"; 
                console.error(e);
            }
        };
    </script>
</body>
</html>
