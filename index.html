<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v4.0 - Prometheus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>DecisionOS <span>v4.0 Prometheus</span></h1>
            <p>Sistem Durumu: ÇEVRİMİÇİ | Risk Seviyesi: İzleniyor</p>
        </header>

        <main class="input-section">
            <textarea id="incidentInput" placeholder="Acil durum senaryosunu veya olayı buraya girin..."></textarea>
            <button id="startBtn">PROTOKOLÜ BAŞLAT</button>
        </main>

        <div id="resultArea" class="result-area hidden">
            <div class="boot-log" id="bootLog"></div>
            
            <div class="decision-box">
                <h3>🚨 NİHAİ KARAR: <span id="finalDecision"></span></h3>
                <p id="analysisText"></p>
            </div>

            <div class="action-plan-box">
                <h4>🛠️ EYLEM PLANI (SAVAŞ KABİNESİ)</h4>
                <ul id="actionPlanList"></ul>
            </div>

            <div class="veto-box">
                <p>⚠️ <strong>VETO KARARI:</strong> <span id="vetoText"></span></p>
            </div>
        </div>
    </div>

    <script>
            document.addEventListener('DOMContentLoaded', () => {
            const startBtn = document.getElementById('startBtn');
            const textArea = document.querySelector('textarea');
            const bootLog = document.getElementById('bootLog');
            const resultArea = document.getElementById('resultArea');
            const analysisText = document.getElementById('analysisText');

            startBtn.addEventListener('click', async () => {
                const userInput = textArea.value.trim();
                if (userInput.length < 5) return alert("Lütfen metin girin.");

                resultArea.classList.remove('hidden');
                bootLog.innerText = "⚙️ AI Sentezleme Birimi Bağlanıyor...";
                analysisText.innerText = "Yapay zeka analiz ediyor, lütfen bekleyin...";

                try {
                    const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: userInput })
                    });

                    const data = await response.json();
                    
                    // AI'dan gelen ham cevabı Analiz kutusuna yazdır
                    bootLog.innerText = "⚙️ ANALİZ TAMAMLANDI";
                    document.getElementById('finalDecision').innerText = "STRATEJİK RAPOR OLUŞTURULDU";
                    analysisText.innerText = data.raw_ai_answer; // TÜM CEVAP BURAYA GELİR
                    
                    // Diğer kutuları temizle veya kısa bilgi yaz
                    document.getElementById('actionPlanList').innerHTML = "<li>Detaylı aksiyon planı yukarıdaki raporun içindedir.</li>";
                    document.getElementById('vetoText').innerText = "Raporun sonundaki yasal uyarıları inceleyin.";

                } catch (error) {
                    analysisText.innerText = "Hata: " + error.message;
                }
            });
        });
    </script>
</body>
</html>
