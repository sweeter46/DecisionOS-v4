<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v7.0 | Agent Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>mermaid.initialize({ startOnLoad: false, theme: 'dark' });</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        body { background: radial-gradient(circle at top, #1e1b4b, #020617); color: #f1f5f9; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 2rem; }
        .ai-input { background: rgba(2, 6, 23, 0.5); border: 1px solid rgba(99, 102, 241, 0.3); outline: none; transition: 0.3s; }
        .ai-input:focus { border-color: #6366f1; box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); }
        .ai-button { background: linear-gradient(135deg, #6366f1, #4338ca); transition: 0.3s; cursor: pointer; }
        .ai-button:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(99,102,241,0.4); }
        .chart-container { background: rgba(0,0,0,0.4); padding: 1.5rem; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.05); margin: 1.5rem 0; height: 350px; width: 100%; position: relative; }
        .data-table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; }
        .data-table th { background: rgba(99, 102, 241, 0.2); color: #818cf8; padding: 12px; text-align: left; font-size: 0.7rem; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1); }
        .data-table td { padding: 12px; border: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; color: #cbd5e1; }
        .export-btn { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.4); color: #10b981; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <header class="mb-12 flex flex-col md:flex-row justify-between items-center gap-6">
            <h1 class="text-6xl font-black tracking-tighter">Decision<span class="text-indigo-500 italic">OS</span> <span class="text-xs bg-indigo-500/20 px-2 py-1 rounded text-indigo-400 font-mono tracking-widest ml-2 uppercase">Agent-V7</span></h1>
            <div class="flex items-center gap-2 px-4 py-2 border border-emerald-500/30 rounded-full bg-emerald-500/5 text-emerald-400 text-[10px] uppercase font-black"><span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-ping"></span> Kernel: Online</div>
        </header>

        <section class="glass-panel p-8 md:p-12 mb-12 shadow-2xl">
            <textarea id="incidentInput" class="w-full h-44 ai-input p-6 rounded-3xl text-slate-100 text-lg mb-8 resize-none" placeholder="Analiz görevi verin (Örn: GSYH tablosu ve grafiği üret.)"></textarea>
            <button onclick="analyzeIncident()" id="actionBtn" class="w-full py-6 rounded-3xl ai-button text-white font-black text-xl shadow-xl">RUN STRATEGIC ANALYTICS</button>
        </section>

        <section id="resultArea" class="hidden transition-all duration-1000"></section>
    </div>

    <script>
        const formatContent = (arr) => {
            let items = Array.isArray(arr) ? arr : [arr];
            if (items.length === 1 && typeof items[0] === 'string' && !items[0].includes("```")) {
                const parts = items[0].split(/(?=\d+[\.\)])/g).filter(p => p.trim().length > 0);
                if (parts.length > 1) items = parts;
            }

            return `<div class="space-y-8">
                ${items.map(item => {
                    const content = item.trim();
                    // 1. Chart.js
                    if (content.includes("```chart")) {
                        const canvasId = `chart-${Math.random().toString(36).substr(2, 9)}`;
                        const configStr = content.replace(/```chart/g, "").replace(/```/g, "").trim();
                        setTimeout(() => {
                            try { 
                                const ctx = document.getElementById(canvasId).getContext('2d');
                                new Chart(ctx, JSON.parse(configStr)); 
                            } catch(e) { console.error("Chart Error:", e); }
                        }, 500);
                        return `<div class="chart-container"><canvas id="${canvasId}"></canvas></div>`;
                    }
                    // 2. Mermaid
                    if (content.includes("```mermaid") || content.startsWith("graph ")) {
                        const code = content.replace(/```mermaid/g, "").replace(/```/g, "").trim();
                        return `<div class="mermaid">${code}</div>`;
                    }
                    // 3. Tablo
                    if (content.includes("|") && content.includes("---")) {
                        const rows = content.split("\n").filter(r => r.includes("|"));
                        return `<div class="overflow-x-auto my-6"><table class="data-table"><thead><tr>${rows[0].split("|").filter(c=>c.trim()).map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${rows.slice(2).map(r => `<tr>${r.split("|").filter(c=>c.trim()).map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
                    }
                    return `<div class="p-6 bg-white/5 rounded-3xl border border-white/5 text-slate-300 text-sm leading-relaxed">${content.replace(/\n/g, '<br>')}</div>`;
                }).join('')}
            </div>`;
        };

        async function analyzeIncident() {
            const input = document.getElementById('incidentInput').value;
            const resArea = document.getElementById('resultArea');
            const btn = document.getElementById('actionBtn');
            if(!input.trim()) return;

            btn.disabled = true;
            btn.innerHTML = "ORCHESTRATING AGENTS...";
            resArea.classList.remove('hidden');
            resArea.innerHTML = `<div class="glass-panel p-24 text-center text-indigo-400 italic font-mono tracking-widest animate-pulse">Filtering Noise & Extracting Data...</div>`;

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                let report = data.report;

                if(typeof report === 'string') {
                   const match = report.match(/\{[\s\S]*\}/);
                   if(match) report = JSON.parse(match[0]);
                }

                resArea.innerHTML = `
                    <div id="report-content" class="glass-panel p-10 md:p-16 border-b-8 border-indigo-600 shadow-2xl relative">
                        <div class="flex justify-between items-center mb-12 no-print">
                            <h2 class="text-5xl font-black text-white uppercase tracking-tighter">${report.final_decision}</h2>
                            <button onclick="downloadReport()" class="export-btn px-6 py-3 rounded-full text-[10px] font-black uppercase tracking-widest hover:scale-105 active:scale-95 transition-all">Export Analysis PDF</button>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                            <div class="lg:col-span-8">
                                <p class="text-slate-400 italic text-xl border-l-4 border-indigo-500 pl-6 mb-12 leading-relaxed">${report.analysis}</p>
                                ${formatContent(report.action_plan?.["1-24h"] || report.action_plan?.["0-1h"])}
                            </div>
                            <div class="lg:col-span-4 flex flex-col gap-6">
                                <div class="p-8 bg-indigo-500/5 rounded-3xl border border-indigo-500/20">
                                    <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Precision Metric</h4>
                                    <div class="flex justify-between items-end mb-2"><span class="text-2xl font-black text-white">${((report.confidence || 0.9)*100).toFixed(0)}%</span><span class="text-[10px] text-indigo-400 uppercase font-mono">Accuracy</span></div>
                                    <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden"><div class="bg-indigo-500 h-full transition-all duration-1000" style="width: ${(report.confidence || 0.9)*100}%"></div></div>
                                </div>
                                <div class="p-6 bg-rose-500/5 rounded-3xl border border-rose-500/20 text-[10px] uppercase text-slate-500 italic tracking-widest leading-relaxed">
                                    Status: ${report.veto || 'Safe Protocol Active'}
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                setTimeout(() => {
                    if (window.MathJax) MathJax.typesetPromise();
                    if (window.mermaid) { try { mermaid.contentLoaded(); mermaid.run(); } catch(e) {} }
                }, 600);

            } catch (e) {
                resArea.innerHTML = `<div class="glass-panel p-20 text-red-500 text-center font-bold">SYSTEM ERROR: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = "RUN STRATEGIC ANALYTICS";
            }
        }

        function downloadReport() {
            const element = document.getElementById('report-content');
            const btns = document.querySelectorAll('.no-print');
            btns.forEach(b => b.style.display = 'none');

            const opt = {
                margin: 0.3,
                filename: 'DecisionOS_Strategy_Report.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, backgroundColor: '#020617' },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                btns.forEach(b => b.style.display = 'flex');
            });
        }
    </script>
</body>
</html>
