<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v8.3 | Masterpiece</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
        .chart-box { background: #000; padding: 2rem; border-radius: 2.5rem; margin: 2rem 0; border: 1px solid rgba(99, 102, 241, 0.3); box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        .data-table { width: 100%; margin: 2rem 0; border-collapse: collapse; border-radius: 1rem; overflow: hidden; }
        .data-table th { background: linear-gradient(to right, #4338ca, #6366f1); padding: 14px; text-align: left; font-size: 0.75rem; text-transform: uppercase; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); }
        .data-table td { background: rgba(255,255,255,0.03); padding: 14px; border: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; color: #cbd5e1; }
        .btn-main { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-main:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body class="p-6 md:p-12 lg:p-20">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-16">
            <h1 class="text-6xl font-black tracking-tighter">Decision<span class="text-indigo-500">OS</span></h1>
            <div class="glass px-6 py-2 text-emerald-400 text-[10px] font-black uppercase tracking-widest">Masterpiece Active</div>
        </header>

        <section class="glass p-8 md:p-12 mb-16 shadow-2xl">
            <textarea id="incidentInput" class="w-full h-40 bg-transparent text-slate-200 text-2xl outline-none resize-none font-light" placeholder="Analiz emri bekliyorum..."></textarea>
            <button onclick="analyzeIncident()" id="actionBtn" class="w-full py-6 rounded-3xl btn-main text-white font-black text-2xl mt-8 italic shadow-xl uppercase">Execute Tactical Analysis</button>
        </section>

        <div id="resultArea" class="hidden"></div>
    </div>

    <script>
        const ultraRender = (text) => {
            if (!text) return "";
            
            // 1. TEMEL TEMİZLİK (Kaçışları Çöz)
            let clean = text
                .replace(/\\n/g, "\n")
                .replace(/\\"/g, '"')
                .replace(/<br\s*\/?>/gi, "\n")
                .replace(/\\t/g, "    ");

            // 2. GRAFİK KURTARMA (Gelişmiş JSON Parser)
            const chartMatch = clean.match(/\{[\s\S]*?"type"\s*:\s*"(?:line|bar|pie|doughnut)"[\s\S]*?\}/);
            if (chartMatch) {
                const id = "chart-" + Math.random().toString(36).substr(2, 5);
                let configStr = chartMatch[0].replace(/\n/g, " ").replace(/\s+/g, " "); // JSON içindeki gizli satır sonlarını temizle
                
                setTimeout(() => {
                    try {
                        const ctx = document.getElementById(id).getContext('2d');
                        new Chart(ctx, JSON.parse(configStr));
                    } catch(e) { 
                        console.error("Grafik Hatası:", e);
                        document.getElementById(id).parentElement.innerHTML = "<p class='p-4 text-slate-500 text-xs text-center'>GRAFİK VERİSİ AYIKLANIYOR...</p>";
                    }
                }, 1000);
                clean = clean.replace(chartMatch[0], `<div class="chart-box"><canvas id="${id}"></canvas></div>`);
            }

            // 3. TABLO MOTORU
            clean = clean.replace(/(?:^|\n)((?:\|.+?\|(?:\n|$))+)/g, (match, table) => {
                const rows = table.trim().split("\n").filter(r => r.includes("|") && !r.includes("---"));
                if (rows.length < 1) return match;
                const h = rows[0].split("|").filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join("");
                const b = rows.slice(1).map(r => `<tr>${r.split("|").filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join("")}</tr>`).join("");
                return `<div class="overflow-x-auto"><table class="data-table"><thead><tr>${h}</tr></thead><tbody>${b}</tbody></table></div>`;
            });

            return clean.replace(/\n/g, "<​br>").replace(/```/g, "").replace(/\{/g, " ").replace(/\}/g, " ");
        };

        async function analyzeIncident() {
            const input = document.getElementById('incidentInput').value;
            const resArea = document.getElementById('resultArea');
            const btn = document.getElementById('actionBtn');
            if(!input.trim()) return;

            btn.disabled = true;
            btn.innerHTML = "INTERCEPTING DATA...";
            resArea.classList.remove('hidden');
            resArea.innerHTML = `<div class="glass p-24 text-center animate-pulse text-indigo-500 font-black uppercase text-xl tracking-[0.5em]">Prometheus Core Active</div>`;

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                const report = data.report || {};

                // Başlığın undefined olmasını engelle
                const decision = report.final_decision || "TACTICAL ANALYSIS";

                resArea.innerHTML = `
                    <div id="report-content" class="glass p-12 md:p-16 border-t-8 border-indigo-600 shadow-2xl">
                        <div class="flex justify-between items-center mb-16">
                            <h2 class="text-4xl font-black italic uppercase text-white tracking-tighter">${decision}</h2>
                            <button onclick="downloadPDF()" class="px-8 py-3 bg-indigo-500 text-white rounded-full text-[10px] uppercase font-black tracking-widest no-print hover:scale-110 transition-all">Export PDF</button>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
                            <div class="lg:col-span-8 text-slate-300 leading-relaxed text-xl font-light">
                                ${ultraRender(report.analysis || "")}
                            </div>
                            <div class="lg:col-span-4">
                                <div class="glass p-8 sticky top-12 border-white/5 shadow-xl">
                                    <div class="text-[10px] font-black text-indigo-500 mb-4 uppercase tracking-widest">Confidence Index</div>
                                    <div class="text-6xl font-black text-white mb-6 tracking-tighter">${((report.confidence || 0.95)*100).toFixed(0)}%</div>
                                    <div class="w-full bg-slate-950 h-3 rounded-full overflow-hidden">
                                        <div class="bg-indigo-500 h-full shadow-[0_0_20px_#6366f1]" style="width:${(report.confidence || 0.95)*100}%"></div>
                                    </div>
                                    <div class="mt-12 pt-8 border-t border-white/5 text-[9px] text-slate-500 font-bold uppercase tracking-[0.2em] space-y-3">
                                        <div class="flex justify-between font-black"><span>Veto Status</span><span class="text-emerald-400">Clear</span></div>
                                        <div class="flex justify-between font-black"><span>Protocol</span><span>v8.3 Final</span></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (e) {
                resArea.innerHTML = `<div class="p-20 text-red-500 text-center glass font-bold">KERNEL ERROR: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Execute Tactical Analysis";
            }
        }

        function downloadPDF() {
            const element = document.getElementById('report-content');
            html2pdf().set({ margin: 0.5, filename: 'DecisionOS_Report.pdf', html2canvas: { scale: 2, backgroundColor: '#020617' } }).from(element).save();
        }
    </script>
</body>
</html>
