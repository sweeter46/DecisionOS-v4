<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v7.4.2 | Stabilizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
        .chart-box { background: #000; padding: 2rem; border-radius: 2rem; margin: 2rem 0; min-height: 350px; border: 1px solid #6366f133; }
        .data-table { width: 100%; margin: 2rem 0; border-collapse: collapse; border-radius: 1rem; overflow: hidden; }
        .data-table th { background: #4338ca; padding: 12px; color: white; text-align: left; font-size: 0.7rem; text-transform: uppercase; }
        .data-table td { background: rgba(255,255,255,0.02); padding: 12px; border: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        .btn-main { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); transition: 0.3s; }
        .btn-main:hover { transform: scale(1.01); box-shadow: 0 0 30px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body class="p-6 md:p-12 lg:p-20">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <h1 class="text-5xl font-black tracking-tighter">Decision<span class="text-indigo-500 italic">OS</span></h1>
            <div class="text-[10px] glass px-4 py-2 border-emerald-500/20 text-emerald-400 font-bold uppercase tracking-widest leading-none">Kernel: Stable</div>
        </header>

        <section class="glass p-8 md:p-12 mb-12 shadow-2xl relative">
            <textarea id="incidentInput" class="w-full h-40 bg-transparent text-slate-200 text-xl outline-none resize-none placeholder:text-slate-800" placeholder="Analiz görevi girin..."></textarea>
            <button onclick="analyzeIncident()" id="actionBtn" class="w-full py-6 rounded-2xl btn-main text-white font-black text-xl mt-6 uppercase italic">Analyze Data Now</button>
        </section>

        <div id="resultArea" class="hidden"></div>
    </div>

    <script>
        const ultraRender = (text) => {
            if (!text) return "";
            
            // 1. Temel Temizlik (JSON kirliliği varsa)
            let raw = text;
            if (raw.trim().startsWith('{')) {
                try {
                    const p = JSON.parse(raw.replace(/\\n/g, "\n").replace(/\\"/g, '"'));
                    raw = p.analysis || p.report_output || raw;
                } catch(e) {}
            }

            let clean = raw.replace(/\\n/g, "\n").replace(/\\"/g, '"');

            // 2. BASİT GRAFİK YAKALAYICI (Döngüye girmeyen güvenli versiyon)
            // ```chart ve ``` blokları arasını yakalar
            clean = clean.replace(/```(?:chart|json)?([\s\S]*?)```/gi, (match, config) => {
                if (!config.includes("type")) return match;
                const id = `chart-${Math.random().toString(36).substr(2, 5)}`;
                setTimeout(() => {
                    try {
                        const ctx = document.getElementById(id).getContext('2d');
                        new Chart(ctx, JSON.parse(config.trim()));
                    } catch(e) { console.error("Chart Fail", e); }
                }, 500);
                return `<div class="chart-box"><canvas id="${id}"></canvas></div>`;
            });

            // 3. BASİT TABLO 
            clean = clean.replace(/(?:^|\n)((?:\|.+?\|(?:\n|$))+)/g, (match, table) => {
                const rows = table.trim().split("\n").filter(r => r.includes("|") && !r.includes("---"));
                if (rows.length < 1) return match;
                const h = rows[0].split("|").filter(c => c.trim()).map(c => `<th>${c}</th>`).join("");
                const b = rows.slice(1).map(r => `<tr>${r.split("|").filter(c => c.trim()).map(c => `<td>${c}</td>`).join("")}</tr>`).join("");
                return `<table class="data-table"><thead><tr>${h}</tr></thead><tbody>${b}</tbody></table>`;
            });

            return clean.replace(/\n/g, "<​br>");
        };

        async function analyzeIncident() {
            const input = document.getElementById('incidentInput').value;
            const resArea = document.getElementById('resultArea');
            const btn = document.getElementById('actionBtn');
            if(!input.trim()) return;

            btn.disabled = true;
            btn.innerHTML = "PROCESSING...";
            resArea.classList.remove('hidden');
            resArea.innerHTML = `<div class="glass p-20 text-center animate-pulse text-indigo-500 font-bold tracking-widest uppercase">Analyzing Data Engine...</div>`;

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                const report = data.report;

                resArea.innerHTML = `
                    <div id="report-content" class="glass p-10 md:p-14 border-t-4 border-indigo-600 shadow-2xl">
                        <div class="flex justify-between items-center mb-10 no-print">
                            <h2 class="text-3xl font-black italic uppercase">${report.final_decision || "REPORT"}</h2>
                            <button onclick="downloadPDF()" class="px-6 py-2 bg-indigo-600 rounded-full text-[9px] font-bold uppercase">PDF</button>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                            <div class="lg:col-span-8 text-slate-300 leading-relaxed text-lg italic">
                                ${ultraRender(report.analysis)}
                            </div>
                            <div class="lg:col-span-4">
                                <div class="glass p-6 sticky top-10 border-white/5">
                                    <div class="text-[9px] font-bold text-indigo-500 mb-2 uppercase">Confidence</div>
                                    <div class="text-5xl font-black text-white mb-4">${((report.confidence || 0.95)*100).toFixed(0)}%</div>
                                    <div class="w-full bg-slate-900 h-2 rounded-full overflow-hidden">
                                        <div class="bg-indigo-500 h-full" style="width:${(report.confidence || 0.95)*100}%"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (e) {
                resArea.innerHTML = `<div class="p-10 text-red-500">Error: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Analyze Data Now";
            }
        }

        function downloadPDF() {
            const element = document.getElementById('report-content');
            html2pdf().set({ margin: 0.2, filename: 'Report.pdf', html2canvas: { scale: 2, backgroundColor: '#020617' } }).from(element).save();
        }
    </script>
</body>
</html>
