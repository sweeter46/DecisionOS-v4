<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v4.0 Prometheus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #141417;
            --accent: #00ff88;
            --text: #e1e1e6;
            --danger: #ff4757;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .dashboard {
            width: 90%;
            max-width: 900px;
            background: var(--card);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #2d2d35;
        }
        h1 {
            color: var(--accent);
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }
        p.subtitle {
            color: #888;
            margin-bottom: 30px;
        }
        textarea {
            width: 100%;
            height: 120px;
            background: #1c1c21;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            padding: 15px;
            font-family: inherit;
            resize: none;
            box-sizing: border-box;
            transition: border 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: black;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, opacity 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        .result-container {
            margin-top: 30px;
            padding: 20px;
            background: #1c1c21;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
            display: none;
        }
        .report-header {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--accent);
            margin-bottom: 15px;
        }
        #reportContent {
            line-height: 1.6;
            white-space: pre-wrap;
            font-size: 15px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>DecisionOS <span style="font-weight:300; font-size:14px; color:#888;">v4.0 Prometheus</span></h1>
        <p class="subtitle">Kriz senaryosunu girin, AI stratejinizi sentezlesin.</p>
        
        <textarea id="userInput" placeholder="Dubai offshore transferi, veri sızıntısı veya fidye saldırısı... Problemi detaylandırın."></textarea>
        <button id="startBtn">PROTOKOLÜ TETİKLE</button>

        <div id="resultArea" class="result-container">
            <div id="bootLog" class="report-header">⚙️ SİSTEM ANALİZİ AKTİF</div>
            <div id="reportContent">Lütfen bekleyin, kriz stratejisi kurgulanıyor...</div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const userInput = document.getElementById('userInput');
        const resultArea = document.getElementById('resultArea');
        const reportContent = document.getElementById('reportContent');
        const bootLog = document.getElementById('bootLog');

        startBtn.addEventListener('click', async () => {
            const text = userInput.value.trim();
            if (text.length < 5) return alert("Lütfen geçerli bir senaryo girin.");

            resultArea.style.display = 'block';
            reportContent.innerText = "Yapay zeka verileri tarıyor, hukuk ve finans paketleri işleniyor...";
            bootLog.innerText = "⚙️ ANALİZ BAŞLATILDI";

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();
                
                // Sunucudan ne gelirse gelsin (report, result veya hata mesajı) ekrana basıyoruz
                const finalResult = data.report || data.raw_ai_answer || data.result || JSON.stringify(data, null, 2);
                
                bootLog.innerText = "⚙️ STRATEJİK RAPOR OLUŞTURULDU";
                reportContent.innerText = finalResult;

            } catch (error) {
                reportContent.innerText = "Hata: Sunucu bağlantısı kurulamadı. Render uyanıyor olabilir, lütfen 30sn sonra tekrar deneyin.";
            }
        });
    </script>
</body>
</html>
