<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v4.0 | Prometheus Kernel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&display=swap');
        
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Fira Code', monospace;
            background-image: radial-gradient(#0a2a0a 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        .cyber-input {
            background: rgba(0, 20, 0, 0.8);
            border: 1px solid #00ff41;
            color: #00ff41;
            box-shadow: inset 0 0 10px #003300;
        }

        .cyber-button {
            background: #00ff41;
            color: #050505;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .cyber-button:hover {
            box-shadow: 0 0 20px #00ff41;
            transform: scale(1.02);
        }

        .terminal-box {
            border: 1px solid #007722;
            background: rgba(0, 5, 0, 0.9);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.1);
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.1);
            position: absolute;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="scanline"></div>
    
    <div class="max-w-4xl mx-auto">
        <!-- HEADER -->
        <header class="mb-8 border-b border-green-900 pb-4">
            <h1 class="text-3xl font-bold tracking-tighter">DECISION<span class="text-white">OS</span> <span class="text-xs border border-green-500 px-1">v4.0 PROMETHEUS</span></h1>
            <p class="text-xs opacity-60 mt-1">SİSTEM DURUMU: ÇEVRİMİÇİ | KERNEL: ACTIVE_THREAT_ANALYSIS</p>
        </header>

        <!-- INPUT SECTION -->
        <div class="mb-8">
            <textarea id="incidentInput" class="w-full h-40 cyber-input p-4 rounded-none focus:outline-none focus:ring-1 focus:ring-green-400 text-sm" placeholder="KRİZ SENARYOSUNU BURAYA GİRİN... (Örn: Vergi denetimi, siber saldırı, nakit krizi...)"></textarea>
            <button onclick="analyzeIncident()" id="actionBtn" class="w-full mt-4 py-4 cyber-button">ANALİZİ BAŞLAT</button>
        </div>

        <!-- RESULT SECTION (Gizli başlar) -->
        <div id="resultArea" class="hidden terminal-box p-6 relative overflow-hidden">
            <div id="brief">
                <!-- Burası JavaScript ile dolacak -->
            </div>
        </div>
    </div>

    <script>
        async function analyzeIncident() {
            const incidentText = document.getElementById('incidentInput').value;
            const resultArea = document.getElementById('resultArea');
            const brief = document.getElementById('brief');
            const actionBtn = document.getElementById('actionBtn');
            
            if (!incidentText) return alert("Lütfen bir senaryo girin.");

            // Arayüz Hazırlığı
            actionBtn.disabled = true;
            actionBtn.innerHTML = "İŞLENİYOR...";
            resultArea.classList.remove('hidden');
            brief.innerHTML = '<div class="animate-pulse text-green-500 text-sm uppercase">>> DecisionOS v4.0 Booting...<br>>> Multi-Expert Council Calling...<br>>> Risk Score Calculating...</div>';

            try {
                // Backend'e İstek Gönder (Render API URL)
                const response = await fetch('https://decisionos-v4.onrender.com/analyze',{
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: incidentText })
                });

                const data = await response.json();
                let report;

                // Veri Ayıklama (String veya Obje gelme durumuna göre)
                try {
                    if (data.status === "success") {
                        report = data.report;
                    } else {
                        // Eğer ham metin geldiyse içindeki JSON'u bul
                        const rawText = typeof data.report === 'string' ? data.report : JSON.stringify(data.report);
                        const jsonMatch = rawText.match(/\{[\s\S]*\}/);
                        if (jsonMatch) {
                            report = JSON.parse(jsonMatch[0]);
                        } else {
                            throw new Error("JSON formatı bulunamadı.");
                        }
                    }
                } catch (e) {
                    brief.innerHTML = `<div class="p-4 text-red-500 border border-red-900">VERİ AYIKLAMA HATASI: Sunucudan dashboard uyumlu olmayan bir yanıt geldi.<br><br>Gelen Yanıt: ${JSON.stringify(data.report)}</div>`;
                    actionBtn.disabled = false;
                    actionBtn.innerHTML = "ANALİZİ BAŞLAT";
                    return;
                }

                // DASHBOARD RENDER
                brief.innerHTML = `
                    <div class="space-y-6 animate-in fade-in duration-1000">
                        <!-- BOOT LOG -->
                        <div class="border-l-2 border-blue-500 pl-4 py-1 bg-blue-900 bg-opacity-10 text-[10px]">
                            <span class="text-blue-400 font-bold">SYSTEM_LOG ></span> ${report.boot_log}
                        </div>

                        <!-- DECISION -->
                        <div class="border border-red-500 p-4 bg-red-900 bg-opacity-10 text-center">
                            <div class="text-[0.6rem] text-red-500 font-bold mb-1 tracking-widest uppercase">NİHAİ KARAR PROTOKOLÜ</div>
                            <div class="text-2xl font-black uppercase tracking-tighter text-white">${report.final_decision}</div>
                        </div>

                        <!-- ANALYSIS & VETO -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="p-3 border border-green-900 bg-black">
                                <div class="text-[10px] text-green-500 font-bold border-b border-green-900 mb-2 pb-1">UZMAN KONSEYİ ANALİZİ</div>
                                <div class="text-[11px] leading-relaxed opacity-80">${report.analysis}</div>
                            </div>
                            <div class="p-3 border ${report.veto ? 'border-red-600' : 'border-yellow-900'} bg-black">
                                <div class="text-[10px] ${report.veto ? 'text-red-500' : 'text-yellow-600'} font-bold border-b border-green-900 mb-2 pb-1 text-red-100">VETO & KRİTİK UYARI</div>
                                <div class="text-[11px] leading-relaxed ${report.veto ? 'text-red-400 font-bold' : 'opacity-80'}">${report.veto || 'HUKUKİ VETO TESPİT EDİLMEDİ'}</div>
                            </div>
                        </div>

                        <!-- ACTION PLAN -->
                        <div class="p-3 border border-green-800 bg-green-900 bg-opacity-5">
                            <div class="text-[10px] text-green-500 font-bold border-b border-green-800 mb-3 pb-1">TAKTİKSEL EYLEM PLANI</div>
                            <div class="space-y-3">
                                <div><span class="text-[10px] text-green-400 font-bold">[0-1 SAAT]:</span> <span class="text-[10px] opacity-90">${report.action_plan["0-1h"].join(" | ")}</span></div>
                                <div><span class="text-[10px] text-green-400 font-bold">[1-24 SAAT]:</span> <span class="text-[10px] opacity-90">${report.action_plan["1-24h"].join(" | ")}</span></div>
                                <div><span class="text-[10px] text-green-400 font-bold">[24-72 SAAT]:</span> <span class="text-[10px] opacity-90">${report.action_plan["24-72h"].join(" | ")}</span></div>
                            </div>
                        </div>
                        
                        <!-- FOOTER INFO -->
                        <div class="flex justify-between items-center text-[9px] opacity-40 border-t border-green-900 pt-2">
                            <span>CONFIDENCE: %${(report.confidence * 100).toFixed(0)}</span>
                            <span class="max-w-[70%] text-right">${report.disclaimer || ''}</span>
                        </div>
                    </div>
                `;

            } catch (error) {
                brief.innerHTML = `<div class="p-4 text-red-500 border border-red-900">KRİTİK SİSTEM HATASI: ${error.message}</div>`;
            } finally {
                actionBtn.disabled = false;
                actionBtn.innerHTML = "ANALİZİ BAŞLAT";
            }
        }
    </script>
</body>
</html>
