<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v7.4.1 | Integrator Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2.5rem; }
        .chart-box { background: rgba(0,0,0,0.6); padding: 2.5rem; border-radius: 2.5rem; margin: 2rem 0; min-height: 400px; border: 1px solid rgba(99, 102, 241, 0.3); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .data-table { width: 100%; margin: 2.5rem 0; border-radius: 1.5rem; overflow: hidden; border-collapse: collapse; }
        .data-table th { background: linear-gradient(135deg, #4338ca 0%, #6366f1 100%); padding: 18px; color: white; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1.5px; text-align: left; }
        .data-table td { background: rgba(255,255,255,0.03); padding: 18px; border: 1px solid rgba(255,255,255,0.05); font-size: 0.95rem; color: #cbd5e1; }
        .btn-main { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-main:hover { transform: translateY(-5px); box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.5); }
    </style>
</head>
<body class="p-4 md:p-12 lg:p-20">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-16 gap-8">
            <div class="text-center md:text-left">
                <h1 class="text-7xl font-extrabold tracking-tighter">Decision<span class="text-indigo-500 italic">OS</span></h1>
                <p class="text-[10px] uppercase tracking-[0.6em] text-slate-500 mt-3 font-bold opacity-70">INTEGRATOR v7.4.1</p>
            </div>
            <div class="flex items-center gap-4 px-6 py-3 glass rounded-full border-emerald-500/20 text-emerald-400 text-xs font-black">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_10px_#10b981]"></span> KERNEL: ACTIVE
            </div>
        </header>

        <section class="glass p-10 md:p-14 mb-14 shadow-2xl relative">
            <textarea id="incidentInput" class="w-full h-44 bg-transparent text-slate-200 text-2xl outline-none resize-none placeholder:text-slate-800 font-light leading-relaxed" placeholder="Veri analizi emri girin..."></textarea>
            <button onclick="analyzeIncident()" id="actionBtn" class="w-full py-7 rounded-[2rem] btn-main text-white font-black text-2xl mt-8 tracking-tighter uppercase italic shadow-2xl">Execute Tactical Analysis</button>
        </section>

        <div id="resultArea" class="hidden space-y-12 pb-20"></div>
    </div>

    <script>
        const ultraRender = (text) => {
            if (!text) return "";
            
            // 1. Temel Temizlik ve JSON Karakter Onarımı
            let clean = text
                .replace(/\\n/g, "\n")
                .replace(/\\r/g, "")
                .replace(/\\"/g, '"')
                .replace(/\\t/g, "    ");

            // 2. GRAFİK AVLAYICI (GELİŞMİŞ)
            // Hem chart kelimesini hem de JSON yapısını yakalar
            clean = clean.replace(/(?:chart)?\s*\{(?:[^{}]*|\{[^{}]*\})*"type"\s*:\s*"(?:line|bar|pie|doughnut)"[\s\S]*?\}/gi, (match) => {
                const id = `chart-${Math.random().toString(36).substr(2, 9)}`;
                
                // Regex ile sadece JSON kısmını ayıkla
                const jsonMatch = match.match(/\{[\s\S]*\}/);
                if (!jsonMatch) return match;

                setTimeout(() => {
                    try { 
                        const ctx = document.getElementById(id).getContext('2d');
                        // Tırnakları ve gereksiz kaçış karakterlerini temizleyerek parse et
                        let configStr = jsonMatch[0].trim();
                        new Chart(ctx, JSON.parse(configStr)); 
                    } catch(e) { console.error("Chart Error:", e); }
                }, 800);
                return `<div class="chart-box"><canvas id="${id}"></canvas></div>`;
            });

            // 3. TABLO AVLAYICI
            clean = clean.replace(/(^|\n)((?:\|.+?\|(?:\n|$))+)/g, (match, prefix, tableContent) => {
                const rows = tableContent.trim().split("\n").filter(r => r.includes("|") && !r.includes("---"));
                if (rows.length < 1) return match;
                const header = rows[0].split("|").filter(c => c.trim().length > 0);
                const body = rows.slice(1).map(r => r.split("|").filter(c => c.trim().length > 0));
                return `${prefix}<div class="overflow-x-auto"><table class="data-table"><thead><tr>${header.map(h => `<th>${h.trim()}</th>`).join("")}</tr></thead><tbody>${body.map(row => `<tr>${row.map(cell => `<td>${cell.trim()}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;
            });

            // 4. LATEX
            clean = clean.replace(/\$\$(.*?)\$\$/g, '<div class="text-center my-12 text-4xl font-light text-indigo-400">$$$1$$</div>');

            return clean.replace(/\n/g, "<​br>");
        };

        async function analyzeIncident() {
            const input = document.getElementById('incidentInput').value;
            const resArea = document.getElementById('resultArea');
            const btn = document.getElementById('actionBtn');
            if(!input.trim()) return;

            btn.disabled = true;
            btn.innerHTML = "INTERCEPTING DATA STREAMS...";
            resArea.classList.remove('hidden');
            resArea.innerHTML = `<div class="glass p-32 text-center text-indigo-500 font-extrabold tracking-[0.5em] animate-pulse">PROMETHEUS CORE ACTIVE</div>`;

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                const report = data.report;

                resArea.innerHTML = `
                    <div id="report-content" class="glass p-12 md:p-20 shadow-2xl border-t-8 border-indigo-600">
                        <div class="flex flex-col md:flex-row justify-between items-center mb-20 no-print gap-8">
                            <h2 class="text-6xl font-black uppercase italic tracking-tighter text-white">${report.final_decision || "ANALYSIS COMPLETE"}</h2>
                            <button onclick="downloadPDF()" class="px-10 py-4 bg-indigo-600 text-white rounded-full text-xs font-black uppercase tracking-widest shadow-lg hover:scale-110 transition-all">Export PDF</button>
                        </div>
                        
                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
                            <div class="lg:col-span-8">
                                <div class="text-slate-300 leading-relaxed text-2xl font-light">
                                    ${ultraRender(report.analysis)}
                                </div>
                            </div>
                            <div class="lg:col-span-4">
                                <div class="ai-card p-10 sticky top-16 border border-white/5 shadow-2xl">
                                    <div class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-4">Precision Index</div>
                                    <div class="text-6xl font-black text-white mb-6 tracking-tighter">${((report.confidence || 0.95)*100).toFixed(0)}%</div>
                                    <div class="w-full bg-slate-900 h-3 rounded-full overflow-hidden">
                                        <div class="bg-indigo-500 h-full shadow-[0_0_20px_#6366f1]" style="width:${(report.confidence || 0.95)*100}%"></div>
                                    </div>
                                    <div class="mt-12 space-y-4 pt-6 border-t border-white/5 uppercase text-[8px] font-black tracking-widest text-slate-500">
                                        <div class="flex justify-between"><span>Veto Status</span><span class="text-emerald-400">Clear</span></div>
                                        <div class="flex justify-between"><span>Protocol</span><span>v4.0.0</span></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                if (window.MathJax) MathJax.typeset();
            } catch (e) {
                resArea.innerHTML = `<div class="p-24 glass text-red-500 text-center font-black">KERNEL_ERROR: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Execute Tactical Analysis";
            }
        }

        function downloadPDF() {
            const element = document.getElementById('report-content');
            const btns = document.querySelectorAll('.no-print');
            btns.forEach(b => b.style.display = 'none');
            html2pdf().set({ margin: 0.5, filename: 'DecisionOS_Report.pdf', html2canvas: { scale: 2, useCORS: true, backgroundColor: '#020617' } }).from(element).save().then(() => { btns.forEach(b => b.style.display = 'flex'); });
        }
    </script>
</body>
</html>
