<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v7.3 | Production Ready</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2.5rem; }
        .ai-card { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 2rem; }
        .chart-box { background: rgba(0,0,0,0.5); padding: 2rem; border-radius: 2rem; margin: 2rem 0; min-height: 350px; border: 1px solid rgba(99, 102, 241, 0.3); box-shadow: 0 20px 40px -15px rgba(0,0,0,0.5); }
        .data-table { width: 100%; margin: 2rem 0; border-radius: 1rem; overflow: hidden; border-collapse: collapse; }
        .data-table th { background: linear-gradient(to right, #4338ca, #6366f1); padding: 15px; color: white; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; text-align: left; }
        .data-table td { background: rgba(255,255,255,0.03); padding: 15px; border: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; color: #cbd5e1; }
        .btn-main { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-main:hover { transform: translateY(-4px); box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.5); }
        .btn-main:active { scale: 0.95; }
    </style>
</head>
<body class="p-4 md:p-10 lg:p-16">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-8">
            <div>
                <h1 class="text-6xl font-extrabold tracking-tighter">Decision<span class="text-indigo-500 italic">OS</span></h1>
                <div class="flex items-center gap-3 mt-2">
                    <span class="h-px w-8 bg-indigo-500/50"></span>
                    <p class="text-[10px] uppercase tracking-[0.4em] text-slate-500">v7.3 Final Visualizer</p>
                </div>
            </div>
            <div id="kernel-status" class="flex items-center gap-3 px-5 py-2 glass rounded-full border-emerald-500/30 text-emerald-400 text-[10px] font-black tracking-widest">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_10px_#10b981]"></span> KERNEL: ONLINE
            </div>
        </header>

        <section class="glass p-8 md:p-12 mb-12 shadow-2xl relative">
            <textarea id="incidentInput" class="w-full h-44 bg-transparent text-slate-200 text-xl outline-none resize-none placeholder:text-slate-700 font-light" placeholder="Analiz görevi girin (Örn: GSYH veya Enflasyon analizi yapın.)"></textarea>
            <button onclick="analyzeIncident()" id="actionBtn" class="w-full py-6 rounded-3xl btn-main text-white font-black text-xl mt-6 shadow-2xl">INITIATE GLOBAL ANALYTICS</button>
        </section>

        <div id="resultArea" class="hidden transition-all duration-1000"></div>
    </div>

    <script>
        // --- v7.3 ULTRA-CLEAN RENDERER ---
        const ultraRender = (text) => {
            if (!text) return "";

            let clean = text;

            // JSON Kirliliği Temizleme: Eğer AI ham JSON bloğu gönderirse sadece analysis kısmını ayıkla
            if (clean.trim().startsWith('{')) {
                try {
                    const parsed = JSON.parse(clean.replace(/\\n/g, "\n").replace(/\\"/g, '"'));
                    clean = parsed.analysis || parsed.report_output || parsed.analysis_output || clean;
                } catch(e) {
                    // JSON bozuksa tırnakları ve gereksiz anahtarları regex ile süpür
                    clean = clean.replace(/\\n/g, "\n").replace(/\\"/g, '"');
                    clean = clean.replace(/^\{[\s\S]*?\"analysis\":\s*\"/, "").replace(/\"\,[\s\S]*\}$/, "");
                }
            } else {
                clean = clean.replace(/\\n/g, "\n").replace(/\\"/g, '"');
            }

            // 1. Grafik İşleme (Chart.js)
            clean = clean.replace(/```chart\s*([\s\S]*?)\s*```/g, (match, config) => {
                const id = `chart-${Math.random().toString(36).substr(2, 9)}`;
                setTimeout(() => {
                    try { 
                        const ctx = document.getElementById(id).getContext('2d');
                        new Chart(ctx, JSON.parse(config.trim())); 
                    } catch(e) { console.error("Chart Error", e); }
                }, 500);
                return `<div class="chart-box"><canvas id="${id}"></canvas></div>`;
            });

            // 2. Tablo İşleme (Markdown to HTML)
            clean = clean.replace(/(^|\n)((?:\|.+?\|(?:\n|$))+)/g, (match, prefix, tableContent) => {
                const rows = tableContent.trim().split("\n").filter(r => r.includes("|"));
                if (rows.length < 2) return match;
                const header = rows[0].split("|").filter(c => c.trim().length > 0);
                const body = rows.slice(2).map(r => r.split("|").filter(c => c.trim().length > 0));

                return `${prefix}<div class="overflow-x-auto my-8"><table class="data-table"><thead><tr>${header.map(h => `<th>${h.trim()}</th>`).join("")}</tr></thead><tbody>${body.map(row => `<tr>${row.map(cell => `<td>${cell.trim()}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;
            });

            // 3. LaTeX İşleme (Matematik)
            clean = clean.replace(/\$\$(.*?)\$\$/g, '<div class="text-center my-10 text-3xl font-light text-indigo-400">$$$1$$</div>');

            return clean.replace(/\n/g, "<br>");
        };

        async function analyzeIncident() {
            const input = document.getElementById('incidentInput').value;
            const resArea = document.getElementById('resultArea');
            const btn = document.getElementById('actionBtn');
            if(!input.trim()) return;

            btn.disabled = true;
            btn.innerHTML = "ORCHESTRATING DATA AGENTS...";
            resArea.classList.remove('hidden');
            resArea.innerHTML = `<div class="glass p-32 text-center text-indigo-500 font-black tracking-[0.3em] animate-pulse">EXTRACTING KNOWLEDGE ENGINE...</div>`;

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                const report = data.report;

                // Dashboard Render
                resArea.innerHTML = `
                    <div id="report-content" class="glass p-10 md:p-16 border-b-8 border-indigo-600 shadow-[0_35px_60px_-15px_rgba(0,0,0,0.6)]">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 no-print gap-6">
                            <h2 class="text-5xl font-black uppercase italic tracking-tighter text-white">${report.final_decision || "ANALİZ RAPORU"}</h2>
                            <button onclick="downloadPDF()" class="px-8 py-3 bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 rounded-full text-[10px] font-black uppercase hover:bg-emerald-500 hover:text-white transition-all shadow-lg active:scale-95">Download Analysis (PDF)</button>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
                            <div class="lg:col-span-8">
                                <div class="text-slate-300 leading-relaxed text-xl mb-12 border-l-4 border-indigo-500/50 pl-8 italic">
                                    ${ultraRender(report.analysis)}
                                </div>
                            </div>
                            <div class="lg:col-span-4">
                                <div class="ai-card p-8 sticky top-12 border border-white/5">
                                    <h4 class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-6">Security & Precision</h4>
                                    <div class="text-5xl font-black text-white mb-4">${((report.confidence || 0.96)*100).toFixed(0)}%</div>
                                    <div class="w-full bg-slate-900 h-2 rounded-full overflow-hidden shadow-inner">
                                        <div class="bg-gradient-to-right from-indigo-600 to-indigo-400 h-full shadow-[0_0_15px_#6366f1]" style="width:${(report.confidence || 0.96)*100}%"></div>
                                    </div>
                                    <div class="mt-12 p-6 bg-indigo-500/10 rounded-3xl border border-indigo-500/20 text-[9px] text-indigo-300 font-bold uppercase tracking-widest leading-loose">
                                        Kernel Status: Secure Protocol v4.0.0
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                if (window.MathJax) MathJax.typeset();
            } catch (e) {
                resArea.innerHTML = `<div class="p-24 glass text-red-500 text-center font-black">KERNEL_PANIC: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = "INITIATE GLOBAL ANALYTICS";
            }
        }

        function downloadPDF() {
            const element = document.getElementById('report-content');
            const btns = document.querySelectorAll('.no-print');
            btns.forEach(b => b.style.display = 'none');
            const opt = { 
                margin: 0.5, 
                filename: 'DecisionOS_Official_Report.pdf', 
                jsPDF: { format: 'a4', orientation: 'portrait' }, 
                html2canvas: { scale: 2, useCORS: true, backgroundColor: '#020617' } 
            };
            html2pdf().set(opt).from(element).save().then(() => { 
                btns.forEach(b => b.style.display = 'flex'); 
            });
        }
    </script>
</body>
</html>
