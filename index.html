<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DecisionOS v6.0 | Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #111; --accent: #0f8; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .dashboard { max-width: 900px; margin: 0 auto; background: var(--card); border-radius: 20px; padding: 30px; border: 1px solid #222; }
        h1 { color: var(--accent); margin: 0; font-size: 28px; }
        .status { font-family: 'JetBrains Mono'; font-size: 10px; color: #555; margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; padding: 15px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; display: none; }
        .full { grid-column: 1 / -1; }
        .card { background: #181818; padding: 20px; border-radius: 12px; border: 1px solid #222; }
        .label { color: var(--accent); font-size: 10px; font-family: 'JetBrains Mono'; display: block; margin-bottom: 8px; text-transform: uppercase; }
        .tl-item { border-left: 2px solid var(--accent); padding-left: 15px; margin-bottom: 12px; }
        .tl-time { color: var(--accent); font-size: 11px; font-weight: 600; display: block; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>DecisionOS</h1>
        <div class="status">KERNEL: <span id="st" style="color:#0f8">ENGINE_v1_READY</span></div>
        <textarea id="inp" placeholder="Senaryoyu detaylıca girin..."></textarea>
        <button id="btn">SENTEZİ BAŞLAT</button>
        <div id="res" class="grid"></div>
    </div>
    <script>
        document.getElementById('btn').onclick = async function() {
            const t = document.getElementById('inp').value.trim();
            if(!t) return;
            const res = document.getElementById('res');
            const st = document.getElementById('st');
            st.innerText = "İŞLENİYOR...";
            res.style.display = 'none';

            try {
                const r = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: t })
                });
                const d = await r.json();

                if (d.status === "success") {
                    st.innerText = "TAMAMLANDI";
                    res.style.display = 'grid';
                    let act = "";
                    if(d.report.action_plan) {
                        d.report.action_plan.forEach(function(a) {
                            const p = a.split(':');
                            act += '<div class="tl-item"><span class="tl-time">' + (p[0] || 'ADIM') + '</span><span style="font-size:13px; color:#ddd">' + (p[1] || a) + '</span></div>';
                        });
                    }

                    res.innerHTML = '<div class="card full" style="border-left:4px solid #f47"><span class="label">NİHAİ KARAR</span><b style="font-size:17px">' + d.report.final_decision + '</b></div>' +
                        '<div class="card"><span class="label">ANALİZ</span><p style="font-size:13px;color:#ccc;margin:0;line-height:1.6">' + d.report.analysis + '</p></div>' +
                        '<div class="card"><span class="label">AKSİYON PLANI</span>' + act + '</div>' +
                        '<div class="card full" style="background:#211; border-color:#522"><span class="label" style="color:#f47">VETO</span><p style="font-size:13px;margin:0;color:#ffb8b8">' + d.report.veto + '</p></div>';
                } else {
                    st.innerText = "HATA";
                    res.style.display = 'block';
                    res.innerHTML = '<div class="card full">Hata: ' + d.report + '</div>';
                }
            } catch (e) { st.innerText = "SERVER ÇEVRİMDIŞI"; }
        };
    </script>
</body>
</html>
