<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v8.4 | The Bulldozer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
        .chart-box { background: #000; padding: 2rem; border-radius: 2.5rem; margin: 2rem 0; border: 1px solid #6366f133; }
        .data-table { width: 100%; margin: 2rem 0; border-collapse: collapse; border-radius: 1rem; overflow: hidden; }
        .data-table th { background: #4338ca; padding: 12px; font-size: 0.7rem; text-transform: uppercase; text-align: left; }
        .data-table td { background: rgba(255,255,255,0.03); padding: 12px; border: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        .btn-main { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); transition: 0.3s; }
        .btn-main:hover { transform: scale(1.01); box-shadow: 0 0 40px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body class="p-6 md:p-12 lg:p-20">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-16">
            <h1 class="text-6xl font-black tracking-tighter italic">Decision<span class="text-indigo-500">OS</span></h1>
            <div class="glass px-6 py-2 text-emerald-400 text-[10px] uppercase font-black">Bulldozer Mode: ON</div>
        </header>

        <section class="glass p-8 md:p-12 mb-16 shadow-2xl border-white/5">
            <textarea id="incidentInput" class="w-full h-40 bg-transparent text-slate-200 text-2xl outline-none resize-none font-light" placeholder="Analiz emri..."></textarea>
            <button onclick="analyzeIncident()" id="actionBtn" class="w-full py-6 rounded-3xl btn-main text-white font-black text-2xl mt-8 tracking-tighter uppercase shadow-xl">Execute Tactical Analysis</button>
        </section>

        <div id="resultArea" class="hidden"></div>
    </div>

    <script>
        const ultraRender = (text) => {
            if (!text) return "";
            
            // 1. TÜM GÜRÜLTÜYÜ TEMİZLE (Kaba Kuvvet)
            let masterClean = text
                .replace(/\\n/g, "\n")
                .replace(/\\"/g, '"')
                .replace(/<br\s*\/?>/gi, "\n")
                .replace(/\\t/g, " ");

            // 2. GRAFİK KURTARMA (ZİNCİRLERİ KIRAN YENİ METOD)
            const chartRegex = /\{[\s\S]*?"type"\s*:\s*"(?:line|bar)"[\s\S]*?\}/;
            const hasChart = masterClean.match(chartRegex);

            if (hasChart) {
                const id = "chart-" + Math.random().toString(36).substr(2, 5);
                // JSON içindeki TÜM engelleri (br, boşluk, satırbaşı) siliyoruz
                let pureJson = hasChart[0].replace(/<br>/g, "").replace(/\n/g, "").replace(/\s+/g, " ");
                
                setTimeout(() => {
                    try {
                        const ctx = document.getElementById(id).getContext('2d');
                        new Chart(ctx, JSON.parse(pureJson));
                    } catch(e) { 
                        console.log("Json Repair Failed, Raw Print.");
                    }
                }, 800);
                
                // Grafiği metinden çıkar ve üst tarafa yerleştir
                masterClean = `<div class="chart-box"><canvas id="${id}"></canvas></div>` + masterClean.replace(hasChart[0], "");
            }

            // 3. TABLO MOTORU
            masterClean = masterClean.replace(/(?:^|\n)((?:\|.+?\|(?:\n|$))+)/g, (match, table) => {
                const rows = table.trim().split("\n").filter(r => r.includes("|") && !r.includes("---"));
                const h = rows[0].split("|").filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join("");
                const b = rows.slice(1).map(r => `<tr>${r.split("|").filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join("")}</tr>`).join("");
                return `<div class="overflow-x-auto"><table class="data-table"><thead><tr>${h}</tr></thead><tbody>${b}</tbody></table></div>`;
            });

            // 4. ÇÖP TEMİZLİK (Süslü parantezleri ve gereksiz JSON artıklarını gizle)
            return masterClean
                .replace(/\{[\s\S]*?\}/g, "") // Kalan süslü parantezli yapıları temizle
                .replace(/\n/g, "<​br>")
                .replace(/["'\[\]]/g, "") // Tırnak ve köşeli parantez artıklarını sil
                .replace(/&quot;/g, "")
                .trim();
        };

        async function analyzeIncident() {
            const input = document.getElementById('incidentInput').value;
            const resArea = document.getElementById('resultArea');
            const btn = document.getElementById('actionBtn');
            if(!input.trim()) return;

            btn.disabled = true;
            resArea.classList.remove('hidden');
            resArea.innerHTML = `<div class="glass p-24 text-center animate-pulse text-indigo-500 font-black uppercase tracking-widest text-xl">PROMETHEUS ENGINE REPAIRING...</div>`;

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                const report = data.report || {};

                resArea.innerHTML = `
                    <div id="report-content" class="glass p-12 border-t-8 border-indigo-600 shadow-2xl">
                        <div class="flex justify-between items-center mb-16 px-4">
                            <h2 class="text-4xl font-black italic uppercase text-white">${report.final_decision || "STRATEGIC REPORT"}</h2>
                            <button onclick="downloadPDF()" class="px-8 py-3 bg-indigo-600 text-white rounded-full text-[10px] font-black uppercase tracking-widest no-print hover:scale-110 transition-all">Export PDF</button>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
                            <div class="lg:col-span-8 text-slate-300 leading-relaxed text-xl">
                                ${ultraRender(report.analysis || "")}
                            </div>
                            <div class="lg:col-span-4">
                                <div class="glass p-8 sticky top-12 border-white/5">
                                    <div class="text-[10px] font-black text-indigo-500 mb-4 uppercase">Confidence</div>
                                    <div class="text-6xl font-black text-white mb-6">${((report.confidence || 0.95)*100).toFixed(0)}%</div>
                                    <div class="w-full bg-slate-950 h-3 rounded-full overflow-hidden">
                                        <div class="bg-indigo-500 h-full" style="width:${(report.confidence || 0.95)*100}%"></div>
                                    </div>
                                    <div class="mt-8 pt-8 border-t border-white/5 text-[9px] text-slate-500 font-bold uppercase tracking-widest leading-loose">
                                        Veto Status: CLEAR <br> Protocol: v8.4 Bulldozer
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (e) {
                resArea.innerHTML = `<div class="p-20 text-red-500 text-center glass font-bold">KERNEL ERROR: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        function downloadPDF() {
            const element = document.getElementById('report-content');
            html2pdf().set({ margin: 0.5, filename: 'DecisionOS_Report.pdf', html2canvas: { scale: 2, backgroundColor: '#020617' } }).from(element).save();
        }
    </script>
</body>
</html>
