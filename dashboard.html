<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecisionOS v4.0 Prometheus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0c; --card: #141417; --accent: #00ff88; --text: #e1e1e6; --danger: #ff4757; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .dashboard { width: 90%; max-width: 900px; background: var(--card); border-radius: 20px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid #2d2d35; }
        h1 { color: var(--accent); font-weight: 600; letter-spacing: -1px; margin-bottom: 5px; }
        #statusLight { font-size: 10px; color: #555; margin-bottom: 15px; font-family: 'JetBrains Mono'; }
        textarea { width: 100%; height: 120px; background: #1c1c21; border: 1px solid #333; border-radius: 12px; color: white; padding: 15px; font-family: inherit; resize: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--accent); color: black; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 15px; }
        .result-container { margin-top: 30px; padding: 20px; background: #1c1c21; border-radius: 12px; border-left: 4px solid var(--accent); display: none; }
        .report-section { margin-bottom: 25px; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 8px; border-left: 3px solid #333; }
        .section-title { color: var(--accent); font-family: 'JetBrains Mono'; font-size: 11px; text-transform: uppercase; margin-bottom: 10px; display: block; border-bottom: 1px solid #2d2d35; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>DecisionOS</h1>
        <div id="statusLight">● SINYAL: <span id="statusText">V4.2.0 - SECURE LINK</span></div>
        <textarea id="userInput" placeholder="Kriz senaryosunu buraya girin..."></textarea>
        <button id="startBtn">PROTOKOLÜ TETİKLE</button>
        <div id="resultArea" class="result-container">
            <div id="reportContent">Analiz sentezleniyor...</div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const userInput = document.getElementById('userInput');
        const resultArea = document.getElementById('resultArea');
        const reportContent = document.getElementById('reportContent');
        const statusText = document.getElementById('statusText');

        startBtn.addEventListener('click', async () => {
            const text = userInput.value.trim();
            if (text.length < 5) return alert("Senaryo girmelisiniz.");

            resultArea.style.display = 'block';
            statusText.innerText = "SENTEZLENİYOR...";
            statusText.style.color = "#ffaa00";
            reportContent.innerHTML = "<p style='color:#888;'>Protokol aktif. Strateji raporu oluşturuluyor...</p>";

            try {
                const response = await fetch('https://decisionos-v4.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const data = await response.json();

                if (data.report) {
                    statusText.innerText = "ONLINE - ANALİZ BAŞARILI";
                    statusText.style.color = "#00ff88";

                    // --- ATOMİK TEMİZLEYİCİ ---
                    let cleanText = data.report.trim();
                    const firstBrace = cleanText.indexOf('{');
                    const lastBrace = cleanText.lastIndexOf('}');
                    
                    if (firstBrace !== -1 && lastBrace !== -1) {
                        cleanText = cleanText.substring(firstBrace, lastBrace + 1);
                    }

                    try {
                        const reportObj = JSON.parse(cleanText);
                        reportContent.innerHTML = `
                            <div class="report-section" style="border-color:#00ff88; background:rgba(0,255,136,0.03);">
                                <span class="section-title">🛑 NİHAİ KARAR</span>
                                <p style="font-weight:600; margin:0;">${reportObj.final_decision}</p>
                            </div>
                            <div class="report-section">
                                <span class="section-title">📉 ANALİZ</span>
                                <p style="font-size:14px; color:#ccc; margin:0; line-height:1.7;">${reportObj.analysis}</p>
                            </div>
                            <div class="report-section">
                                <span class="section-title">🛠️ AKSİYON PLANI</span>
                                <ul style="margin-top:10px; color:#ddd; font-size:14px;">
                                    ${reportObj.action_plan.map(item => `<li style="margin-bottom:10px;">${item}</li>`).join('')}
                                </ul>
                            </div>
                            <div class="report-section" style="border-color:#ff4757; background:rgba(255,71,87,0.03);">
                                <span class="section-title" style="color:#ff4757;">⚠️ KRİTİK VETO</span>
                                <p style="color:#ffb8b8; margin:0; font-size:14px;">${reportObj.veto}</p>
                            </div>
                        `;
                    } catch (e) {
                        // Eğer temizlemeye rağmen JSON parse olmazsa ham metni göster
                        reportContent.style.whiteSpace = "pre-wrap";
                        reportContent.innerText = cleanText;
                    }
                }
            } catch (error) {
                statusText.innerText = "BAĞLANTI HATASI";
                statusText.style.color = "#ff4757";
                reportContent.innerText = "Hata oluştu. İnternet bağlantınızı kontrol edin.";
            }
        });
    </script>
</body>
</html>
